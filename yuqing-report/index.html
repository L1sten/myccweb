<!DOCTYPE html>
<html lang="zh-CN">
<head><script src="../auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>舆情报送与管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root{
  --primary:#0052d9;--primary-hover:#1a6ff0;--primary-bg:#e8f0fe;
  --orange:#ff7d00;--orange-bg:#fff7e8;
  --green:#00a870;--green-bg:#e8f8f0;
  --red:#f53f3f;--red-bg:#ffece8;
  --text-primary:#1d2129;--text-secondary:#4e5969;--text-tertiary:#86909c;--text-quaternary:#c9cdd4;
  --border:#e5e7eb;--border-light:#f2f3f5;--bg-page:#f5f7fa;--bg-card:#fff;
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --transition:all .2s cubic-bezier(.645,.045,.355,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-page);color:var(--text-primary);-webkit-font-smoothing:antialiased}

/* ===== Login Page ===== */
.login-page{display:flex;height:100vh;width:100vw;position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#0052d9 0%,#1a6ff0 50%,#4096ff 100%)}
.login-left{flex:1;display:flex;flex-direction:column;justify-content:center;padding:80px;color:#fff}
.login-left h1{font-size:32px;font-weight:700;margin-bottom:16px}
.login-left p{font-size:16px;opacity:.85;line-height:1.8;max-width:400px}
.login-left .login-features{margin-top:40px;display:flex;flex-direction:column;gap:12px}
.login-left .login-feat{display:flex;align-items:center;gap:12px;font-size:14px;opacity:.9}
.login-left .login-feat i{font-size:20px;opacity:.8}
.login-right{width:480px;display:flex;align-items:center;justify-content:center;background:#fff}
.login-card{width:360px}
.login-card h2{font-size:22px;font-weight:700;margin-bottom:8px}
.login-card .login-sub{font-size:13px;color:var(--text-tertiary);margin-bottom:32px}
.login-input{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:var(--radius-md);background:#fff;color:#333;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
.login-input::placeholder{color:#aaa}
.login-input:focus{border-color:var(--primary)}
.login-dingbtn{width:100%;padding:14px;border:2px solid var(--primary);border-radius:var(--radius-md);font-size:15px;font-weight:600;color:var(--primary);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:var(--transition);margin-bottom:16px;font-family:inherit}
.login-dingbtn:hover{background:var(--primary-bg)}
.login-dingbtn i{font-size:22px}
.login-dingbtn.full{background:var(--primary);color:#fff;border-color:var(--primary)}
.login-dingbtn.full:hover{background:var(--primary-hover)}
.login-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-quaternary);font-size:12px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border-light)}
.login-role-select{display:flex;flex-direction:column;gap:8px}
.login-role-btn{padding:12px 16px;border:1px solid var(--border-light);border-radius:var(--radius-md);cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:12px;font-family:inherit;background:#fff;text-align:left}
.login-role-btn:hover{border-color:var(--primary);background:var(--primary-bg)}
.login-role-btn.active{border-color:var(--primary);background:var(--primary-bg)}
.login-role-btn .role-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.login-role-btn .role-name{font-size:14px;font-weight:600;color:var(--text-primary)}
.login-role-btn .role-desc{font-size:11px;color:var(--text-tertiary);margin-top:2px}

/* ===== App ===== */
.app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:240px;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{height:64px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px}
.sidebar-logo{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.sidebar-title{font-weight:600;font-size:15px;white-space:nowrap}
.sidebar-nav{flex:1;padding:0 12px;overflow-y:auto}
.nav-label{font-size:11px;font-weight:500;color:var(--text-quaternary);letter-spacing:1px;padding:16px 12px 4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:0 12px;border-radius:var(--radius-md);cursor:pointer;transition:var(--transition);margin-bottom:2px}
.nav-item:hover{background:var(--bg-page)}
.nav-item.active{background:var(--primary)}
.nav-item .nav-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nav-item .nav-icon i{font-size:18px;color:var(--text-secondary)}
.nav-item.active .nav-icon i{color:#fff}
.nav-item .nav-text{padding:8px 0}
.nav-item .nav-title{font-size:14px;font-weight:400;color:var(--text-secondary);line-height:21px}
.nav-item .nav-subtitle{font-size:10px;color:var(--text-tertiary);line-height:15px;opacity:.7}
.nav-item.active .nav-title,.nav-item.active .nav-subtitle{color:#fff;font-weight:500}
.nav-section{padding-top:17px;border-top:1px solid var(--border-light);margin:0 12px}
.sidebar-footer{border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px 0 20px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#fff;flex-shrink:0}
.avatar-blue{background:var(--primary)}.avatar-green{background:var(--green)}
.user-info{display:flex;flex-direction:column;min-width:0}
.user-name{font-size:13px;font-weight:500;line-height:20px}
.user-org{font-size:11px;color:var(--text-tertiary);line-height:17px}

/* Main */
.topbar{height:56px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:17px;font-weight:600}
.topbar-tag{background:var(--primary-bg);color:var(--primary);font-size:11px;font-weight:500;padding:3px 8px;border-radius:999px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-avatar{width:28px;height:28px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff}
.topbar-username{font-size:13px;font-weight:500}
.topbar-role{font-size:11px;color:var(--text-tertiary);background:var(--border-light);padding:2px 8px;border-radius:999px}
.topbar-logout{font-size:16px;color:var(--text-tertiary);cursor:pointer;margin-left:4px}.topbar-logout:hover{color:var(--red)}

/* Pages */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.page-container{flex:1;min-width:0;overflow-y:auto;padding:40px 24px}
.page{display:none}.page.active{display:block}

/* Summary */
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px}
.page-header-left .page-heading{font-size:18px;font-weight:600;margin-bottom:2px}
.page-header-left .page-desc{font-size:13px;color:var(--text-tertiary)}
.page-header-actions{display:flex;gap:8px;align-items:center}
.btn-use{background:var(--text-quaternary);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius-md);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:var(--transition);font-family:inherit}
.btn-use.enabled{background:var(--primary)}.btn-use.enabled:hover{background:var(--primary-hover)}
.summary-stats{display:flex;gap:12px;margin-bottom:12px}
.stat-card{flex:1;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-md);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:var(--transition)}
.stat-card:hover{border-color:var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-icon.blue{background:var(--primary-bg);color:var(--primary)}
.stat-icon.orange{background:var(--orange-bg);color:var(--orange)}
.stat-icon.green{background:var(--green-bg);color:var(--green)}
.stat-icon.red{background:var(--red-bg);color:var(--red)}
.stat-info{display:flex;flex-direction:column}
.stat-num{font-size:20px;font-weight:700;line-height:1.2}
.stat-label{font-size:11px;color:var(--text-tertiary);margin-top:2px}
.search-bar{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:14px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.search-input-wrap{flex:1;min-width:180px;position:relative}
.search-input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-quaternary);font-size:16px}
.search-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-md);padding:9px 16px 9px 40px;font-size:13px;outline:none;font-family:inherit;color:var(--text-primary)}
.search-input::placeholder{color:rgba(29,33,41,.5)}.search-input:focus{border-color:var(--primary)}
.filter-select{border:1px solid var(--border);border-radius:var(--radius-md);padding:9px 12px;font-size:13px;outline:none;background:#fff;font-family:inherit;min-width:110px;cursor:pointer;color:var(--text-secondary)}
.filter-date{border:1px solid var(--border);border-radius:var(--radius-md);padding:8px 10px;font-size:12px;outline:none;background:#fff;font-family:inherit;color:var(--text-secondary);width:130px}
.filter-date:focus{border-color:var(--primary)}
.filter-sep{font-size:12px;color:var(--text-quaternary);padding:0 2px}
.action-bar{display:flex;align-items:center;gap:12px;padding:0 4px;margin-bottom:8px}
.select-all-btn{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;background:none;border:none;font-family:inherit}
.list-count{font-size:11px;color:var(--text-quaternary)}
.yq-used{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap}
.yq-used-yes{background:var(--green-bg);color:var(--green)}
.yq-used-no{background:var(--border-light);color:var(--text-quaternary)}

/* Yuqing Cards */
.yuqing-list{display:flex;flex-direction:column;gap:8px}
.yuqing-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:16px;display:flex;align-items:flex-start;gap:16px;transition:var(--transition);cursor:pointer}
.yuqing-card:hover{box-shadow:var(--shadow-md);border-color:var(--border)}
.yuqing-card.selected{border-color:var(--primary);background:var(--primary-bg)}
.yq-check{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;cursor:pointer;flex-shrink:0;margin-top:16px;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.yq-check.checked{background:var(--primary);border-color:var(--primary)}
.yq-check.checked::after{content:'\2713';color:#fff;font-size:11px;font-weight:700}
.yq-body{flex:1;min-width:0}
.yq-meta{display:flex;align-items:center;gap:8px}
.yq-id{font-size:11px;font-weight:500;color:var(--primary)}
.yq-tag{font-size:10px;font-weight:500;padding:3px 6px;border-radius:4px;white-space:nowrap}
.yq-tag-local{background:var(--primary-bg);color:var(--primary)}
.yq-tag-external{background:var(--orange-bg);color:var(--orange)}
.yq-tag-cat{background:var(--green-bg);color:var(--green)}
.yq-tag-btn{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:12px;transition:var(--transition);color:var(--text-quaternary)}
.yq-tag-btn:hover{background:var(--bg-page);color:var(--primary)}
.yq-location{display:flex;align-items:center;gap:2px;font-size:10px;color:var(--text-tertiary)}
.yq-location i{font-size:12px}
.yq-title{font-size:14px;font-weight:500;margin:6px 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.yq-footer{display:flex;align-items:center;gap:16px}
.yq-source,.yq-time{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-tertiary)}
.yq-source i,.yq-time i{font-size:12px}
.yq-time{color:var(--text-quaternary)}
.yq-more{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:16px;transition:var(--transition)}
.yq-more:hover{background:var(--bg-page)}.yq-more i{font-size:16px;color:var(--text-tertiary)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 20px;border-radius:var(--radius-md);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:var(--transition);font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.9}
.btn-outline{background:#fff;border-color:var(--border);color:var(--text-secondary)}.btn-outline:hover{background:var(--bg-page)}
.btn-ghost{background:transparent;color:var(--text-secondary)}.btn-ghost:hover{background:var(--bg-page)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#c92a2a}
.btn-sm{padding:5px 12px;font-size:12px}

/* Form */
.report-item-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:24px;max-width:800px;margin-bottom:12px}
.report-item-card .item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.report-item-card .item-number{font-size:14px;font-weight:600}
.form-row{display:flex;gap:16px;margin-bottom:16px}
.form-group{flex:1;display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;font-weight:500;color:var(--text-secondary)}
.form-group label .req{color:var(--red);margin-left:2px}
.form-control{border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 14px;font-size:13px;outline:none;font-family:inherit;color:var(--text-primary);transition:border-color .2s}
.form-control:focus{border-color:var(--primary)}
textarea.form-control{min-height:80px;resize:vertical;line-height:1.6}
.form-control.error{border-color:var(--red)}
.form-actions{display:flex;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border-light)}

/* Detail */
.detail-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:32px;max-width:900px}
.detail-meta{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.detail-title{font-size:20px;font-weight:600;margin-bottom:16px}
.detail-section{margin-bottom:24px}
.detail-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text-secondary)}
.detail-field{display:flex;margin-bottom:8px}
.detail-label{width:100px;font-size:13px;color:var(--text-tertiary);flex-shrink:0}
.detail-value{font-size:13px;color:var(--text-primary)}
.detail-content{font-size:14px;line-height:1.8;color:var(--text-secondary);background:var(--bg-page);padding:16px;border-radius:var(--radius-md)}

/* Doc Preview */
.doc-preview{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:48px 56px;max-width:900px;line-height:2}
.doc-preview .doc-header{text-align:center;margin-bottom:32px;padding-bottom:24px;border-bottom:2px solid var(--text-primary)}
.doc-preview .doc-title{font-size:22px;font-weight:700;letter-spacing:2px}
.doc-preview .doc-date{font-size:14px;color:var(--text-tertiary);margin-top:8px}
.doc-preview .doc-section{margin-bottom:24px}
.doc-preview .doc-section-title{font-size:15px;font-weight:700;margin-bottom:8px}
.doc-preview .doc-item{font-size:14px;color:var(--text-secondary);margin-bottom:4px;text-indent:2em}
.doc-preview .doc-item-title{font-weight:600;color:var(--text-primary)}
.doc-preview .doc-toc{font-size:12px;color:var(--text-tertiary);line-height:1.8}
.doc-preview .doc-toc .toc-title{font-size:12px;font-weight:600;color:var(--text-secondary);margin:8px 0 4px}
.doc-preview .doc-toc .toc-entry{padding-left:1em;margin-bottom:2px}
.doc-preview .body-section-title{font-size:15px;font-weight:700;margin:28px 0 12px;padding-left:12px;border-left:3px solid var(--primary);color:var(--text)}

/* Edit Layout */
.edit-layout{display:flex;gap:24px;height:calc(100vh - 56px - 140px)}
.edit-main{flex:1;overflow-y:auto;padding-right:4px}
.edit-sidebar{width:300px;flex-shrink:0;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:20px;height:fit-content;max-height:100%;position:sticky;top:0;box-shadow:var(--shadow-md)}
.edit-sidebar h4{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text-secondary)}
.preview-item{font-size:12px;color:var(--text-secondary);padding:6px 0;border-bottom:1px solid var(--border-light);line-height:1.6}
.preview-item .pi-title{color:var(--text-primary);font-weight:500}
.edit-item-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;transition:var(--transition)}
.edit-item-card:hover{border-color:var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.edit-item-card .ei-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-light)}
.edit-item-card .ei-field{margin-bottom:10px}
.edit-item-card .ei-label{font-size:12px;font-weight:500;color:var(--text-tertiary);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.edit-item-card textarea{width:100%;border:1px solid var(--border-light);border-radius:var(--radius-md);padding:8px 12px;font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:60px;line-height:1.6;color:var(--text-secondary);transition:border-color .2s}
.edit-item-card textarea:focus{border-color:var(--primary)}
.edit-item-card .ei-title-input{width:100%;border:none;font-size:14px;font-weight:500;outline:none;padding:4px 0;border-bottom:1px solid var(--border-light);transition:border-color .2s}
.edit-item-card .ei-title-input:focus{border-bottom-color:var(--primary)}
.edit-toolbar{display:flex;gap:8px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-lg);margin-bottom:20px}
.edit-toolbar .spacer{flex:1}
.edit-stats{display:inline-flex;gap:10px}
.edit-stat-tag{font-size:12px;padding:4px 12px;border-radius:var(--radius-sm);font-weight:500}
.edit-section-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.edit-section-title::before{content:'';width:3px;height:16px;background:var(--primary);border-radius:2px}

/* Empty */
.empty-state{display:flex;flex-direction:column;align-items:center;padding:80px 20px;color:var(--text-tertiary)}
.empty-state i{font-size:48px;margin-bottom:16px;color:var(--text-quaternary)}

/* Toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:8px}
/* Update History */
.history-btn{display:flex;align-items:center;gap:4px;padding:5px 12px;background:#fff;border:1px solid var(--border-light);border-radius:14px;font-size:12px;color:var(--text-secondary);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .2s;white-space:nowrap;font-family:inherit}
.history-btn:hover{border-color:var(--primary-light);color:var(--primary)}
.toast{padding:12px 20px;border-radius:var(--radius-md);font-size:13px;font-weight:500;color:#fff;box-shadow:var(--shadow-md);animation:slideIn .3s ease;display:flex;align-items:center;gap:8px}
.toast-success{background:var(--green)}.toast-error{background:var(--red)}.toast-info{background:var(--primary)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:var(--radius-lg);width:560px;max-width:90vw;box-shadow:0 12px 32px rgba(0,0,0,.15);max-height:80vh;display:flex;flex-direction:column}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:600}

## 1. 产品概述

### 1.1 产品背景

省级宣传部门需要一套轻量化的舆情信息报送与管理工具，用于收集各地市上报的舆情事件、汇总查看、并编写舆情专报上报领导。本系统为简版，聚焦核心报送流程，去除数据分析、趋势预警等高级功能，降低使用门槛。

系统采用手机号密码登录方式，实现统一身份认证与权限管控。

### 1.2 产品目标

- 为各地市宣传部提供统一的舆情上报入口，规范报送流程
- 为舆情处提供舆情汇总查看、批量录用至报告的快捷操作
- 提供轻量的报告编写、预览与发布能力
- 实现组织内统一登录与权限管控

### 1.3 用户角色与权限

系统定义三种用户角色，权限严格区分：

- **地市人员**
  - 所属组织：各地市宣传部（如杭州市宣传部、温州市宣传部等）
  - 核心权限：上报本地舆情信息
  - 数据可见范围：仅可查看本单位上报的舆情记录
  - 可用功能模块：舆情汇总（限本单位数据）、舆情上报
  - 不可用功能：报告管理、录用至报告、系统管理

- **舆情处人员**
  - 所属组织：省委宣传部舆情处
  - 核心权限：舆情汇总管理与报告编写
  - 数据可见范围：全部地市上报舆情 + 外省镜鉴舆情
  - 可用功能模块：舆情汇总（全部数据）、报告管理（含录用、编辑、预览、发布）
  - 不可用功能：系统管理

- **系统管理员**
  - 所属组织：省委宣传部
  - 核心权限：系统运维与权限配置
  - 数据可见范围：全部
  - 可用功能模块：全部功能 + 系统管理（用户管理、角色管理、部门管理）

## 2. 登录认证

### 2.1 登录方式

系统提供手机号密码登录方式，登录流程如下：

- 用户打开系统后显示登录页
- 输入手机号、密码和验证码完成身份认证
- 系统校验手机号和密码匹配后，自动获取用户姓名、所属部门、角色等信息
- 根据用户在系统中的角色配置，自动进入对应权限的主界面
- 若不填写手机号和密码，直接点击登录可进入系统（原型演示模式）

### 2.2 登录页信息展示

- 左侧展示系统名称、功能简介、核心特性列表
- 右侧为登录操作区域，包含以下字段：
  - **手机号**：文本输入框，占位文字"请输入手机号"，限制 11 位
  - **密码**：密码输入框，占位文字"请输入密码"
  - **验证码**：文本输入框（限制 4 位）+ 右侧图形验证码画布
    - 展示规则：画布显示 4 位随机字符（大小写字母+数字），配干扰线和干扰点
    - 交互规则：点击画布刷新验证码内容
  - **登录按钮**：点击执行登录
- 底部显示体验提示信息

### 2.3 登录后初始化

- 自动填充用户信息至顶部导航栏（头像取姓名首字）
- 根据角色动态构建侧边栏导航菜单
- 默认进入"舆情汇总"页面

### 2.4 退出登录

- 顶部导航栏右侧提供退出按钮
- 点击后清除当前会话，返回登录页

## 3. 全局导航

### 3.1 侧边栏结构

侧边栏采用统一的导航结构，各菜单项的可见性根据用户角色通过配置控制：

- **顶部 Logo 区**
  - 系统名称"舆情报送与管理系统"，配蓝色圆角图标

- **功能菜单**
  - 舆情汇总：所有角色可见。地市人员仅可查看本单位上报数据，舆情处和管理员可查看全部数据并使用录用功能
  - 报告管理：仅舆情处和管理员可见。地市人员无此入口

- **系统管理**（仅管理员可见）
  - 部门管理
  - 用户管理
  - 角色管理

> 舆情上报功能通过舆情汇总页右上角按钮进入，不在侧边栏中单独展示。原型演示中默认展示全部菜单，实际系统根据用户角色动态控制菜单项的显示与隐藏。

### 3.2 顶部导航栏

- **左侧**
  - 当前页面标题，随页面切换动态更新

- **右侧**
  - 用户头像（姓名首字）
  - 用户姓名
  - 退出登录图标按钮

## 4. 舆情汇总

### 4.1 功能说明

查看系统中已上报的舆情信息列表。根据用户角色不同，数据范围和操作权限有显著差异：

- 地市人员：仅展示本单位上报的舆情记录，无录用功能
- 舆情处/管理员：展示全部上报舆情，支持多选后批量录用至报告

### 4.2 统计概览

页面标题下方展示 4 张统计卡片，实时反映当前筛选结果。

- **取数规则**：统计基于当前筛选条件过滤后的舆情列表
- **更新规则**：筛选条件变化时实时重新计算

各卡片字段：

1. **上报总数**
   - 展示规则：蓝色图标，显示数字 + "上报总数"标签
   - 数据规则：当前筛选结果中的舆情总条数

2. **已录用**
   - 展示规则：橙色图标，显示数字 + "已录用"标签
   - 数据规则：当前筛选结果中已被录用至任意报告的舆情条数（即录用状态为"已录用"）

3. **本省**
   - 展示规则：蓝色图标，显示数字 + "本省"标签
   - 数据规则：当前筛选结果中来源类型为"本省"的舆情条数

4. **外省镜鉴**
   - 展示规则：绿色图标，显示数字 + "外省镜鉴"标签
   - 数据规则：当前筛选结果中来源类型为"外省镜鉴"的舆情条数

### 4.3 搜索与筛选

#### 4.3.1 搜索框

- 展示规则：文本输入框，占位文字"搜索标题、地域、单位、内容..."
- 交互规则：输入后实时过滤列表，清空搜索框恢复全部数据
- 数据筛选规则：按舆情标题、地域、上报单位、内容摘要四个字段进行模糊匹配（包含即命中），取并集

#### 4.3.2 时间范围筛选

- 展示规则：两个日期选择器，组成"起始日期 至 结束日期"
- 交互规则：选择后立即过滤，可单独设置起始或结束，另一端不限
- 数据筛选规则：按舆情的上报时间字段进行范围匹配，仅显示上报时间在起止日期之间的舆情

#### 4.3.3 来源类型筛选

- 展示规则：下拉选择框
- 交互规则：选择后立即过滤列表
- 数据筛选规则：
  - 默认值："全部来源"（不限）
  - 选项："全部来源"、"本省"、"外省镜鉴"
  - 选中后按舆情的来源类型字段精确匹配

#### 4.3.4 单位类型筛选

- 展示规则：下拉选择框
- 交互规则：选择后立即过滤列表
- 数据筛选规则：
  - 默认值："全部单位"（不限）
  - 选项及匹配方式：
    - "省级"：上报单位包含"省委"或"省网信"
    - "地市"：上报单位包含"市宣传部"

#### 4.3.5 录用状态筛选

- 展示规则：下拉选择框
- 交互规则：选择后立即过滤列表
- 数据筛选规则：
  - 默认值："录用状态"（不限）
  - 选项及匹配方式：
    - "已录用"：舆情已被至少一个报告收录
    - "未录用"：舆情未被任何报告收录

#### 4.3.6 地域筛选

- 展示规则：二级级联控件（省→市），第一级省份下拉，第二级城市下拉（选择省份后显示）
- 交互规则：选择后立即过滤，支持仅选省份或选省份+城市
- 数据筛选规则：
  - 第一级含"全部省份"选项，选具体省份后按舆情地域的省份字段精确匹配
  - 第二级含"全部城市"选项，选具体城市后按舆情地域的城市字段精确匹配
  - 两级均选时取交集

#### 4.3.7 舆情分类筛选

- 展示规则：下拉选择框
- 交互规则：选择后立即过滤列表
- 数据筛选规则：
  - 默认值："全部分类"（不限）
  - 选项："刑事案件"、"治安事件"、"交通事故"、"执法不当及违纪违法"、"非正常死亡或失踪"、"其他"
  - 选中后按舆情的分类字段精确匹配，未打标分类的舆情不显示

#### 4.3.8 筛选组合规则

- 搜索关键词、时间范围、来源类型、单位类型、录用状态、地域、舆情分类七个筛选条件可同时生效，取交集
- 所有筛选条件变化后实时更新列表和统计数据

### 4.4 操作栏

- **全选按钮**（仅舆情处/管理员可见）
  - 展示规则：按钮文字"全选"/"取消全选"
  - 交互规则：点击后勾选/取消当前筛选结果中的所有舆情，仅对当前可见列表生效
  - 数据规则：不包含被筛选条件隐藏的条目

- **信息计数**
  - 展示规则：文字"共 N 条上报信息"
  - 数据规则：N = 当前筛选结果的总条数，随筛选条件变化实时更新

### 4.5 舆情列表

- **取数规则**：从舆情数据集中读取。地市人员仅读取上报单位与本单位匹配的记录，舆情处和管理员读取全部记录
- **数据筛选规则**：在角色数据范围基础上，叠加 4.3 中所有筛选条件，取交集
- **数据排序规则**：默认按上报时间倒序排列（最新在上）

#### 4.5.1 列表项展示字段

每条舆情以卡片形式展示，从左到右包含：

1. **勾选框**（仅舆情处/管理员可见）
   - 展示规则：圆形复选框
   - 交互规则：点击切换选中/取消，选中后卡片左侧出现蓝色边框，背景变为浅蓝色

2. **舆情元信息行**
   - **舆情编号**：展示规则：蓝色文字。数据规则：系统自动生成，格式 YQ-YYYYMMDD-NNN（NNN 为当日序号，从 001 递增）
   - **来源类型标签**：展示规则：本省为蓝色浅底标签，外省镜鉴为橙色浅底标签。数据规则：取舆情的来源类型字段
   - **地域**：展示规则：地市名称，配地理位置图标。数据规则：取舆情的地域字段（省+市拼接）
   - **分类标签**（已打标时显示）：展示规则：绿色浅底标签。数据规则：取舆情的分类字段，未打标不显示
   - **录用状态标签**：展示规则：已录用显示绿色浅底标签，未录用显示灰色浅底标签。数据规则：判断该舆情是否被任意报告收录

3. **舆情标题**
   - 展示规则：单行显示，超出部分省略号
   - 交互规则：点击进入舆情详情页

4. **底部信息行**
   - **上报单位**：展示规则：配建筑图标。数据规则：取舆情的上报单位字段
   - **上报时间**：展示规则：格式 YYYY-MM-DD HH:mm，配时钟图标。数据规则：取舆情的上报时间字段

#### 4.5.2 空状态

- 无数据时展示"未找到匹配的舆情信息"提示，配大号图标辅助说明

### 4.6 舆情分类打标

拥有权限的用户（舆情处和管理员）可对舆情进行分类打标。

- 展示规则：每条舆情卡片右侧显示打标按钮（标签图标）
- 交互规则：
  1. 点击后弹出分类选择弹窗，以单选列表形式展示分类选项
  2. 已有分类的舆情默认选中当前分类
  3. 选择后点击"确认"完成打标
  4. 支持重复打标覆盖原有分类
- 数据规则：
  - 分类选项固定为："刑事案件"、"治安事件"、"交通事故"、"执法不当及违纪违法"、"非正常死亡或失踪"、"其他"
  - 确认后将选中的分类写入该舆情的分类字段
  - 打标后舆情卡片元信息行即时显示绿色分类标签

### 4.7 录用至报告交互流程

> 仅舆情处和管理员可操作

- 交互规则：
  1. 勾选一条或多条舆情（通过列表勾选框或全选按钮）
  2. "录用至报告"按钮从灰色变为蓝色可点击态
  3. 点击后弹出报告选择弹窗
  4. 用户选择目标报告后点击"确认录用"
  5. 系统将选中舆情添加到目标报告的舆情列表中（已存在的不会重复添加）
  6. 弹窗关闭，显示成功提示
  7. 自动跳转至该报告的编辑页面
- 数据规则（弹窗报告列表）：
  - 取数规则：从报告数据集中读取所有状态为"草稿"的报告
  - 数据排序规则：按创建时间倒序排列
  - 每项展示：报告编号 + 报告标题

## 5. 舆情上报

### 5.1 功能说明

地市人员通过此页面上报本地舆情信息。支持一次填写多条舆情，批量提交。

> 舆情处和管理员也可使用此功能（通过汇总页右上角按钮进入）。

### 5.2 多条上报机制

- 展示规则：页面默认展示 1 条舆情填写表单，每条为独立卡片，标题显示"第 N 条舆情"
- 交互规则：
  - 点击"添加一条舆情"按钮在下方新增一条空白表单
  - 第 1 条不显示移除按钮，第 2 条及以后每条右上角显示移除按钮
  - 点击移除按钮后该卡片以滑出动画消失
  - 页面右上角实时显示当前表单总数："共 N 条"
  - 底部提交按钮同步显示条数："提交上报（N 条）"

### 5.3 单条表单字段

每条舆情表单包含以下字段：

1. **上报时间**
   - 展示规则：日期时间选择器，精确到分钟
   - 交互规则：必填，未填时边框变红
   - 数据规则：写入舆情记录的上报时间字段

2. **舆情地域**
   - 展示规则：二级级联控件（省→市），第一级省份下拉，第二级城市下拉（选择省份后启用）
   - 交互规则：必填，选择后自动触发"报送单位"字段的填充
   - 数据规则：写入舆情记录的地域字段（省+市）

3. **报送单位**
   - 展示规则：下拉选择框，默认选中当前用户所属单位
   - 交互规则：非必填，用户可从下拉列表中手动切换报送单位
   - 取数规则：下拉选项取数来源为部门树中所有末级部门（地市宣传部）

4. **标题**
   - 展示规则：文本输入框，占位文字"请输入舆情标题"
   - 交互规则：必填，未填时边框变红
   - 数据规则：写入舆情记录的标题字段

5. **内容**
   - 展示规则：多行文本输入框，占位文字"请详细描述舆情事件经过、传播情况、影响范围等..."
   - 交互规则：必填，未填时边框变红
   - 数据规则：写入舆情记录的内容摘要字段

### 5.4 操作按钮

位于所有表单卡片下方：

1. **添加一条舆情**
   - 展示规则：轮廓样式按钮，带加号图标
   - 交互规则：点击后在最下方新增一条空白表单

2. **重置**
   - 展示规则：轮廓样式按钮，带刷新图标
   - 交互规则：点击后清空所有已填写的表单卡片，恢复为仅 1 条空白表单的初始状态

3. **提交上报（N 条）**
   - 展示规则：主按钮样式，带发送图标，N 随当前表单数量动态变化
   - 交互规则：
     - 点击后逐一校验所有表单中的必填字段（上报时间、地域、标题、内容）
     - 未填写的必填字段边框变红，弹出错误提示指明需完善第几条表单
     - 校验通过后弹出成功提示，显示实际上报条数，延迟后自动跳转回舆情汇总页
   - 数据规则：
     - 舆情编号生成规则：格式 YQ-YYYYMMDD-NNN，YYYYMMDD 取上报日期，NNN 为当日序号（从 001 递增）
     - 来源类型：根据上报用户所属单位自动判定（地市人员上报的为"本省"）
     - 录用状态：默认"未录用"
     - 分类字段：默认为空（待后续打标）
     - 写入舆情数据集

点击舆情列表中的标题，进入该条舆情的完整信息展示页。

- 取数规则：根据当前点击的舆情编号，从舆情数据集中读取该条记录的全部字段

### 6.2 页面顶部

- "返回列表"按钮，点击回到舆情汇总页

### 6.3 信息展示

- 地域：配图标，取地域字段

**舆情标题**

- 完整摘要内容，灰色背景区域展示，取内容摘要字段

- **"返回列表"按钮**
  - 展示规则：轮廓样式，带左箭头图标
  - 交互规则：点击回到舆情汇总页

## 7. 报告管理

### 7.1 功能说明

舆情处和管理员在此编写、预览和管理舆情报告。报告由多条舆情信息按【内容提要】+ 一、本省舆情 + 二、外省舆情镜鉴的结构组合而成。

> 地市人员无此模块入口。

### 7.2 报告列表

- 取数规则：从报告数据集中读取所有报告记录
- 数据筛选规则：舆情处和管理员可查看全部报告
- 数据排序规则：按创建时间倒序排列（最新在上）

#### 7.2.1 页面标题区

- 标题"报告管理"
- 右侧"新建报告"按钮（蓝色主按钮）

#### 7.2.2 报告卡片展示字段

每条报告以卡片形式展示：

1. **报告编号**
   - 展示规则：蓝色文字
   - 数据规则：系统自动生成，格式 BG-YYYYMMDD-NNN（NNN 为当日序号，从 001 递增）

2. **报告状态标签**
   - 展示规则：草稿为灰色标签，已发布为绿色标签
   - 数据规则：取报告的状态字段

3. **报告标题**
   - 展示规则：单行显示
   - 数据规则：取报告的标题字段

4. **底部信息**
   - 创建时间：展示规则：日期时间格式。数据规则：取报告的创建时间字段
   - 包含舆情条数：展示规则：显示"N 条舆情"。数据规则：该报告收录的舆情总数

#### 7.2.3 操作按钮显示规则

根据报告状态显示不同的按钮组合：

- **草稿状态**
  - "编辑"按钮（蓝色小按钮）：进入报告编辑页
  - "预览"按钮（轮廓小按钮）：进入报告预览页
  - 删除按钮（红色图标按钮）：删除报告（需二次确认）

- **已发布状态**
  - "预览"按钮（轮廓小按钮）：进入报告预览页

#### 7.2.4 新建报告

- 交互规则：点击"新建报告"按钮，创建后立即进入报告编辑页
- 数据规则：
  - 报告编号：系统自动生成，格式 BG-YYYYMMDD-NNN
  - 报告标题：默认为空，由用户在编辑页手动输入
  - 状态：默认"草稿"
  - 舆情列表：默认为空
  - 创建时间：取当前时间
  - 写入报告数据集

### 7.3 报告预览

#### 7.3.1 入口

- 点击报告管理列表中的报告卡片（任意状态）
- 点击报告卡片上的"预览"按钮
- 从报告编辑页点击"预览"按钮

#### 7.3.2 页面布局

- 顶部操作栏：
  - 左侧"返回"按钮
  - 右侧按钮组根据报告状态不同：
    - 草稿：显示"编辑"按钮 + "导出 Word"按钮
    - 已发布：显示"导出 Word"按钮

#### 7.3.3 预览内容格式（公文格式）

- 取数规则：根据当前报告 ID 从报告数据集中读取报告信息及其收录的舆情列表
- 数据排序规则：先展示"本省"来源的舆情，再展示"外省镜鉴"来源的舆情；各来源内部按舆情编号正序排列

预览以正式公文样式展示，结构如下：

1. **标题区**
   - 居中显示报告标题（大号加粗，字间距加大）
   - 下方显示报告日期
   - 底部双横线分隔

2. **【内容提要】**（目录样式，小号字体）
   - 一、省内舆情：列出所有"本省"类型舆情的序号 + 标题
   - 二、外省舆情镜鉴：列出所有"外省镜鉴"类型舆情的序号 + 标题
   - 数据规则：序号按各分组内顺序从 1 递增；若无外省舆情则不显示外省子板块

3. **一、本省舆情**
   - 每条"本省"舆情独立一段：
     - 序号 + 标题（加粗）
     - 完整摘要内容
     - 建议意见（如有，橙色图标 + 灰色文字）
     - 来源和时间（灰色小字）

4. **二、外省舆情镜鉴**
   - 每条"外省镜鉴"舆情独立一段，格式与本省舆情一致
   - 若无外省舆情则不显示此板块

### 7.4 报告编辑

#### 7.4.1 入口

- 草稿报告的"编辑"按钮
- 新建报告后自动进入
- 从舆情汇总页录用舆情后自动跳转

#### 7.4.2 页面布局

页面分为左右两栏：

**左栏 — 编辑区**

顶部操作按钮栏（工具条样式，左对齐操作按钮 + 右对齐发布按钮）：
- 左侧："选取舆情"按钮（轮廓样式）：弹出舆情选择弹窗
- 左侧："保存草稿"按钮（轮廓样式）：保存当前编辑内容
- 右侧："预览"按钮（蓝色主按钮）：跳转预览页
- 右侧："发布"按钮（绿色主按钮）：发布报告

顶部标题栏：
- 左侧："返回"按钮 + 报告编辑状态标题
- 右侧：统计标签（"本省 N" + "外省 N"）

基本信息区：
- **报告标题**（必填）：文本输入框，默认取自动生成的日期标题
- **报告日期**：日期选择器

统计标签：
- "本省: N"（蓝色浅底标签）：数据规则 = 当前报告中来源为"本省"的舆情条数
- "外省: N"（橙色浅底标签）：数据规则 = 当前报告中来源为"外省镜鉴"的舆情条数

舆情列表分为两个区块（每个区块标题带蓝色竖线装饰）：

- **本省舆情（N）**
  - 每条舆情以可编辑卡片形式展示
  - 卡片头部：序号 + 编号 + 来源类型标签 + 删除按钮（红色图标）
  - 卡片内容：
    - 标题输入框：可直接修改标题文字
    - "正文内容"文本区：可直接修改正文，默认取舆情摘要
    - "建议意见"文本区：可填写建议

- **外省舆情镜鉴（N）**
  - 结构与本省舆情相同
  - 无外省舆情时不显示此区块

**右栏 — 实时预览面板**

- **【内容提要】预览**
  - 一、省内舆情：所有本省舆情的序号 + 标题
  - 二、外省舆情镜鉴：所有外省舆情的序号 + 标题
  - 若无外省舆情则不显示外省子板块

> 右侧预览随左侧编辑内容实时更新。

#### 7.4.3 编辑交互

- **修改标题**：在卡片中的标题输入框直接编辑，右侧预览面板同步更新
- **修改正文**：在"正文内容"文本区直接编辑
- **修改建议意见**：在"建议意见"文本区直接编辑
- **删除舆情**：点击卡片右上角的删除按钮，该条目从报告中移除，列表和预览同步更新
- **添加舆情**：
  1. 点击"选取舆情"按钮
  2. 弹窗展示当前未收录到本报告的所有舆情列表
  3. 每条展示来源类型标签、地域、标题
  4. 支持多选（复选框）
  5. 点击"确认"后，选中舆情添加到报告的舆情列表中
  6. 已存在的舆情不会重复添加
  - 数据规则（弹窗舆情列表）：
    - 取数规则：从舆情数据集中读取所有未被当前报告收录的舆情
    - 数据排序规则：按上报时间倒序排列

#### 7.4.4 保存与发布

- **保存草稿**
  - 交互规则：将当前编辑内容保存，状态保持"草稿"，弹出成功提示
  - 数据规则：将报告标题、报告日期、舆情列表（含修改后的标题/正文/建议意见）写入报告数据集

- **发布**
  - 交互规则：校验报告标题是否为空，为空则提示错误；校验通过后弹出成功提示，自动跳转回报告管理列表
  - 数据规则：报告状态字段更新为"已发布"

- **预览**
  - 交互规则：先自动保存草稿，跳转至公文格式预览页

---

## 8. 系统管理

> 仅系统管理员可访问此模块。

### 8.1 用户管理

#### 8.1.1 功能说明

管理系统中的用户账号。支持新增、编辑用户，角色分配与状态管理。

#### 8.1.2 页面标题区

- 标题"用户管理"
- 右侧"新增用户"按钮

#### 8.1.3 用户列表

- 取数规则：从用户数据集中读取所有用户记录
- 数据筛选规则：默认展示全部用户，无额外筛选
- 数据排序规则：按用户 ID 正序排列

以表格形式展示所有用户，列字段如下：

1. **姓名**
   - 展示规则：普通文字
   - 数据规则：取用户的姓名字段

2. **手机号**
   - 展示规则：普通文字
   - 数据规则：取用户的手机号字段

3. **所属部门**
   - 展示规则：普通文字，多个部门以分号（；）分隔展示
   - 数据规则：取用户关联的部门名称列表

4. **角色**
   - 展示规则：多个角色名称以分号（；）分隔展示
   - 数据规则：取用户被分配的角色名称列表

5. **状态**
   - 展示规则：滑动开关，启用显示绿色圆点+绿色文字"正常"，停用显示灰色圆点+灰色文字"停用"
   - 交互规则：点击切换启用/停用，切换后立即生效，显示成功提示
   - 数据规则：取用户的状态字段（"正常"或"停用"）

6. **操作**
   - 展示规则："编辑"按钮（蓝色小按钮）
   - 交互规则：点击弹出编辑弹窗，修改用户姓名、手机号、所属部门和角色分配

#### 8.1.4 新增用户

- 交互规则：
  1. 点击"新增用户"按钮弹出弹窗
  2. 填写表单字段（见下方）
  3. 校验通过后确认添加
- 弹窗表单字段：
  - **姓名**：文本输入框，必填
  - **手机号**：文本输入框，必填，校验 11 位格式，不可与已有用户重复
  - **密码**：密码输入框，必填，至少 8 个字符，必须包含大写字母、小写字母、数字、符号（!@#$%^&*?）
  - **确认密码**：密码输入框，必填，需与密码一致
  - **所属部门**：复选框多选，至少选择一个
    - 数据规则：取数来源为部门树中所有末级部门，选项以"省 / 市 / 县"路径形式展示
  - **角色**：复选框多选，至少选择一个
- 数据规则：
  - 确认后新增到用户数据集
  - 用户 ID：自动生成
  - 状态：默认"正常"
  - 密码：取用户填写的密码值
  - 同时在每个选中部门的人员列表中添加该用户

#### 8.1.5 编辑用户

- 交互规则：
  1. 点击用户列表中的"编辑"按钮弹出弹窗
  2. 修改表单字段后保存
- 弹窗表单字段：
  - **姓名**：文本输入框，预填当前姓名
  - **手机号**：文本输入框，预填当前手机号
  - **重置密码**：密码输入框，非必填
    - 展示规则：占位文字"留空则不修改密码"，下方灰色提示"留空表示不修改密码，填写需至少8位且包含大写、小写、数字、符号"
    - 交互规则：留空则不修改密码，填写则校验至少 8 位且包含大写字母、小写字母、数字、符号（!@#$%^&*?）
  - **所属部门**：复选框多选，预选当前已关联的部门
  - **角色**：复选框多选，预选当前角色

### 8.2 角色管理

#### 8.2.1 功能说明

查看和配置系统角色及其功能权限。系统预置三种角色，每种角色对应不同的功能权限范围。支持新增自定义角色、删除角色、编辑角色信息、分配功能权限。

#### 8.2.2 页面布局

页面采用左右分栏布局：

**左栏 — 角色列表**

- 取数规则：从角色数据集中读取所有角色
- 数据筛选规则：搜索框支持按角色名称和描述模糊匹配
- 数据排序规则：按角色 ID 正序排列

- 顶部区域：
  - 标题"角色列表"
  - "新增"按钮（蓝色小按钮）
  - 搜索框：支持按角色名称和描述模糊搜索
- 角色列表：
  - 每项显示角色名称
  - 鼠标悬停时右侧显示删除按钮（红色图标）
  - 当前选中项蓝色背景高亮
  - 点击切换右侧内容

**右栏 — 角色详情（自适应宽度）**

通过顶部标签页切换三个视图：

1. **角色编辑**标签页
   - 角色名称：文本输入框，修改后左侧列表实时同步
   - 角色描述：文本输入框

2. **功能权限分配**标签页
   - 展示规则：以树形结构展示系统功能模块及子权限，每个节点前有复选框
   - 交互规则：
     - 父节点勾选：子节点全部勾选
     - 子节点全部勾选：父节点自动勾选
     - 子节点部分勾选：父节点显示半选状态（横线图标）
     - 底部"保存"按钮保存权限配置
   - 权限树结构：
     - 舆情汇总：舆情上报、录用至报告、舆情分类打标
     - 报告管理：新建报告、编辑报告、删除报告、预览报告、发布报告
     - 系统管理：用户管理、角色管理、部门管理

3. **用户管理**标签页
   - 取数规则：从用户数据集中读取属于当前角色的用户列表
   - 数据筛选规则：搜索框支持按姓名、所属部门模糊匹配
   - 数据排序规则：按用户 ID 正序排列
   - 顶部操作区：
     - 左侧："添加用户"按钮（蓝色小按钮）：弹出弹窗，多选未属于当前角色的用户，确认后加入当前角色
     - 左侧："移除用户"按钮（轮廓小按钮）：勾选用户后出现，点击后弹出确认弹窗，批量移除选中用户
     - 右侧：搜索框
   - 用户列表以表格形式展示，列字段：
     - 勾选框：支持单选和全选，选中后"移除用户"按钮出现
     - 姓名
     - 所属部门
     - 状态标签：已开通（绿色）、已停用（橙色）
     - 操作："移除"链接，点击弹出确认弹窗后移除单个用户
   - 底部显示用户总数
   - 无用户时展示空状态提示

#### 8.2.3 新增角色

- 交互规则：点击左栏"新增"按钮弹出弹窗，填写角色名称（必填）和角色描述，确认后添加
- 数据规则：新增到角色数据集，权限默认为空

#### 8.2.4 删除角色

- 交互规则：鼠标悬停角色项时显示删除按钮，点击后弹出确认弹窗
- 数据规则：从角色数据集中删除该角色。系统至少保留一个角色，不可全部删除

#### 8.2.5 预置角色权限配置

1. **地市人员**
   - 描述：各地市宣传部工作人员
   - 权限：舆情上报

2. **舆情处人员**
   - 描述：省委宣传部舆情处工作人员
   - 权限：舆情上报、录用至报告、舆情分类打标、新建报告、编辑报告、预览报告、发布报告

3. **系统管理员**
   - 描述：系统运维管理员
   - 权限：全部功能权限

### 8.3 部门管理

#### 8.3.1 功能说明

管理系统的组织架构。管理员可手动创建、编辑、删除部门层级结构，部门数据作为用户管理中"所属部门"复选框选项的数据源，也作为角色管理中"添加用户"弹窗的人员数据源。

- 取数规则：从部门数据集中读取完整的树形结构数据

#### 8.3.2 页面标题区

- 标题"部门管理"
- 右侧"新增部门"按钮（蓝色小按钮）：点击后弹窗填写部门名称，确认后添加到组织树顶层

#### 8.3.3 统计概览

无统计概览卡片。

#### 8.3.4 组织树展示

以可展开/折叠的树形结构展示组织架构，最多支持两级层级，支持动态增删改：

- 展示规则：
  - 第一级：如"浙江省""杭州市"，左侧文件夹图标，展开后显示下属部门
  - 第二级：如"杭州市宣传部""萧山区宣传部"，为末级节点，直接展示该部门下的人员
  - 不支持在第二级下继续添加子部门

每个层级节点展示：

- 展开/折叠箭头（仅第一级节点）
- 节点名称
- 操作按钮组：
  - "添加部门"图标按钮：仅第一级节点显示，点击后弹窗填写子部门名称，确认后在该节点下新增子部门
  - "编辑"图标按钮：点击后弹窗修改部门名称
  - "删除"图标按钮：点击后弹出二次确认弹窗，确认后删除该部门及其子部门

末级节点展示：

- 部门名称（配建筑图标）
- 操作按钮组（编辑、删除）
- 人员列表：每人以头像胶囊形式展示（头像首字 + 姓名），停用人员标注"(停用)"

#### 8.3.5 部门操作规则

- **新增部门**：
  1. 点击页面标题区"新增部门"按钮
  2. 弹窗填写部门名称（必填）
  3. 确认后添加到部门数据集顶层，自动生成唯一 ID

- **添加子部门**：
  1. 点击任意节点上的"添加部门"图标按钮
  2. 弹窗填写子部门名称（必填）
  3. 确认后添加到该节点的子节点列表中，自动生成唯一 ID
  4. 支持在任意层级节点下添加子部门，不限层级深度

- **编辑部门**：
  1. 点击节点上的"编辑"图标按钮
  2. 弹窗显示当前部门名称，可修改
  3. 确认后更新部门数据集中的部门名称

- **删除部门**：
  1. 点击节点上的"删除"图标按钮
  2. 弹出二次确认弹窗，提示该部门下的子部门和人员将一并移除
  3. 确认后从部门数据集中删除该部门及其所有子部门

#### 8.3.6 数据使用场景

- **新增用户**弹窗中的"所属部门"复选框选项：取数来源为部门数据集中所有末级部门，选项以路径形式展示
- **编辑用户**弹窗中的"所属部门"复选框选项：取数来源同上
- **角色管理-添加用户**弹窗中的可选人员列表：取数来源为部门数据集中所有人员，按省市分组展示，每条显示姓名头像 + 姓名 + 所属部门路径

## 9. 系统配置

### 9.1 登录认证

- 系统采用手机号+密码登录方式
- 登录后用户信息自动填充至系统各处（侧边栏、顶部导航栏）

- 用户头像自动取姓名首字

### 10.1 消息提示

- **操作成功**：顶部绿色轻提示，显示成功图标和操作结果文字，2.5 秒后自动消失

- 点击遮罩层可关闭弹窗

- 侧边栏导航点击切换页面，当前激活项以蓝色背景高亮
- 顶部导航栏标题随页面切换同步更新
- 页面内容区滚动位置自动回到顶部

  }
  for(let i=0;i<30;i++){
    ctx.fillStyle='rgba('+Math.floor(Math.random()*200)+','+Math.floor(Math.random()*200)+','+Math.floor(Math.random()*200)+',0.5)';
    ctx.beginPath();ctx.arc(Math.random()*canvas.width,Math.random()*canvas.height,1.2,0,Math.PI*2);ctx.fill();
  }
  const colors=['#1a6ff0','#e8590c','#2f9e44','#862e9c','#e8590c'];
  for(let i=0;i<4;i++){
    ctx.save();ctx.font=(20+Math.random()*4)+'px Arial';
    ctx.fillStyle=colors[Math.floor(Math.random()*colors.length)];
    ctx.translate(16+i*22,26+Math.random()*6-3);
    ctx.rotate((Math.random()-0.5)*0.4);
    ctx.fillText(captchaCode[i],0,0);ctx.restore();
  }
}

function doLogin(){
  const phone=document.getElementById('loginPhone').value.trim();
  const pwd=document.getElementById('loginPwd').value;
  let user=adminUsers[0];
  if(phone&&pwd){
    const found=adminUsers.find(u=>u.phone===phone&&u.password===pwd);
    if(found) user=found;
  }
  if(user.status==='停用'){showToast('error','账号已停用，请联系管理员');return}
  loginUser={name:user.name,org:user.orgs[0],orgs:user.orgs,roles:user.roles};
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appContainer').style.display='flex';
  buildSidebar();updateUserUI();navigate('summary');
}

/* Tree helper: collect all leaf departments (those with users) */
function getDeptLeaves(nodes){const r=[];(nodes||[]).forEach(n=>{if(n.children&&n.children.length){r.push(...getDeptLeaves(n.children))}else{r.push(n)}});return r}
/* Tree helper: get full path of a department */
function getDeptPath(nodes,targetId,path){path=path||[];for(const n of nodes){if(n.id===targetId)return[...path,n.name];if(n.children){const r=getDeptPath(n.children,targetId,[...path,n.name]);if(r)return r}}return null}
/* Tree helper: collect all users from tree */
function getAllDeptUsers(nodes){const r=[];(nodes||[]).forEach(n=>{if(n.users)n.users.forEach(u=>r.push({...u,deptName:n.name,deptId:n.id}));if(n.children)r.push(...getAllDeptUsers(n.children))});return r}
/* Tree helper: count all users */
function countDeptUsers(nodes){let c=0;(nodes||[]).forEach(n=>{if(n.users)c+=n.users.length;if(n.children)c+=countDeptUsers(n.children)});return c}

	    +'<select class="filter-select" id="filterCategory" onchange="filterList()"><option value="">全部分类</option>'+yqCategories.map(c=>'<option>'+c+'</option>').join('')+'</select></div>'

function filterList(){
  const kw=(document.getElementById('searchInput')||{}).value;const kwStr=kw?kw.toLowerCase():'';
  const dateStart=(document.getElementById('filterDateStart')||{}).value||'';
  const dateEnd=(document.getElementById('filterDateEnd')||{}).value||'';
  const typeF=(document.getElementById('filterSource')||{}).value||'';
  const unitF=(document.getElementById('filterUnit')||{}).value||'';
  const usedF=(document.getElementById('filterUsed')||{}).value||'';
  const provF=(document.getElementById('filterProv')||{}).value||'';
  const cityF=(document.getElementById('filterCity')||{}).value||'';
  const catF=(document.getElementById('filterCategory')||{}).value||'';
  const usedIds=getUsedIds();
  let data=yuqingData;
  data=data.filter(item=>{
    if(typeF&&item.type!==typeF)return false;
    if(provF){if(cityF){if(item.region!==provF+'/'+cityF)return false}else{if(!item.region.startsWith(provF+'/'))return false}}
    if(catF&&item.category!==catF)return false;
    if(unitF){
      if(unitF==='省级'&&!item.reporter.includes('省委')&&!item.reporter.includes('省网信'))return false;
      if(unitF==='地市'&&!item.reporter.includes('市宣传部'))return false;
    }
    if(dateStart){const d=item.time.slice(0,10);if(d<dateStart)return false}
    if(dateEnd){const d=item.time.slice(0,10);if(d>dateEnd)return false}
    if(usedF==='yes'&&!usedIds.has(item.id))return false;
    if(usedF==='no'&&usedIds.has(item.id))return false;
    if(kwStr){const hay=(item.title+item.region+item.source+item.summary).toLowerCase();if(!hay.includes(kwStr))return false}
    return true;
  });
  updateStats(data);
  renderList(data,usedIds);
}

function updateStats(data){
  const total=data.length;
  const local=data.filter(i=>i.type==='本省').length;
  const external=data.filter(i=>i.type==='外省镜鉴').length;
  const usedIds=getUsedIds();
  const used=data.filter(i=>usedIds.has(i.id)).length;
  const el=document.getElementById('summaryStats');if(!el)return;
  el.innerHTML=
    '<div class="stat-card"><div class="stat-icon blue"><i class="ri-file-list-3-line"></i></div><div class="stat-info"><div class="stat-num">'+total+'</div><div class="stat-label">上报总数</div></div></div>'
    +'<div class="stat-card"><div class="stat-icon orange"><i class="ri-check-double-line"></i></div><div class="stat-info"><div class="stat-num">'+used+'</div><div class="stat-label">已录用</div></div></div>'
    +'<div class="stat-card"><div class="stat-icon blue"><i class="ri-map-pin-line"></i></div><div class="stat-info"><div class="stat-num">'+local+'</div><div class="stat-label">本省</div></div></div>'
    +'<div class="stat-card"><div class="stat-icon green"><i class="ri-compass-3-line"></i></div><div class="stat-info"><div class="stat-num">'+external+'</div><div class="stat-label">外省镜鉴</div></div></div>';
}

function renderList(data,usedIds){
  const list=document.getElementById('yuqingList');if(!list)return;
  if(!data.length){list.innerHTML='<div class="empty-state"><i class="ri-inbox-line"></i><p>未找到匹配的舆情信息</p></div>';document.getElementById('listCount').textContent='共 0 条';return}
  const uid=usedIds||getUsedIds();
  list.innerHTML=data.map(item=>{
    const checked=selectedIds.has(item.id);
    const tagCls=item.type==='本省'?'yq-tag-local':'yq-tag-external';
    const used=uid.has(item.id);
    const catTag=item.category?'<span class="yq-tag yq-tag-cat">'+item.category+'</span>':'';
    return '<div class="yuqing-card '+(checked?'selected':'')+'">'
      +'<div class="yq-check '+(checked?'checked':'')+'" onclick="event.stopPropagation();toggleCheck(\''+item.id+'\')"></div>'
      +'<div class="yq-body" onclick="navigate(\'detail\',\''+item.id+'\')">'
        +'<div class="yq-meta"><span class="yq-id">'+item.id+'</span><span class="yq-tag '+tagCls+'">'+item.type+'</span>'+catTag+'<span class="yq-location"><i class="ri-map-pin-2-line"></i>'+item.region+'</span><span class="yq-used '+(used?'yq-used-yes':'yq-used-no')+'">'+(used?'已录用':'未录用')+'</span></div>'
        +'<div class="yq-title">'+item.title+'</div>'
        +'<div class="yq-footer"><span class="yq-source"><i class="ri-building-line"></i>'+item.source+'</span><span class="yq-time"><i class="ri-time-line"></i>'+item.time+'</span></div></div>'
      +'<div class="yq-tag-btn" onclick="event.stopPropagation();showTagModal(\''+item.id+'\')" title="打标"><i class="ri-price-tag-3-line"></i></div></div>';
  }).join('');
  document.getElementById('listCount').textContent='共 '+data.length+' 条';
}

function getVisibleIds(){const kw=(document.getElementById('searchInput')||{}).value;const kwStr=kw?kw.toLowerCase():'';const dateStart=(document.getElementById('filterDateStart')||{}).value||'';const dateEnd=(document.getElementById('filterDateEnd')||{}).value||'';const typeF=(document.getElementById('filterSource')||{}).value||'';const unitF=(document.getElementById('filterUnit')||{}).value||'';const usedF=(document.getElementById('filterUsed')||{}).value||'';const provF=(document.getElementById('filterProv')||{}).value||'';const cityF=(document.getElementById('filterCity')||{}).value||'';const catF=(document.getElementById('filterCategory')||{}).value||'';const usedIds=getUsedIds();return yuqingData.filter(i=>{if(typeF&&i.type!==typeF)return false;if(provF){if(cityF){if(i.region!==provF+'/'+cityF)return false}else{if(!i.region.startsWith(provF+'/'))return false}}if(catF&&i.category!==catF)return false;if(unitF){if(unitF==='省级'&&!i.reporter.includes('省委')&&!i.reporter.includes('省网信'))return false;if(unitF==='地市'&&!i.reporter.includes('市宣传部'))return false}if(dateStart){const d=i.time.slice(0,10);if(d<dateStart)return false}if(dateEnd){const d=i.time.slice(0,10);if(d>dateEnd)return false}if(usedF==='yes'&&!usedIds.has(i.id))return false;if(usedF==='no'&&usedIds.has(i.id))return false;if(kwStr){const h=(i.title+i.region+i.source+i.summary).toLowerCase();if(!h.includes(kwStr))return false}return true}).map(i=>i.id)}

function useToNewReport(){const id='BG-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+String(reportData.length+1).padStart(3,'0');const d=new Date();const r={id,title:d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日舆情信息专报',status:'draft',time:d.toISOString().slice(0,16).replace('T',' '),items:[]};yuqingData.filter(item=>selectedIds.has(item.id)).forEach(item=>{if(!r.items.find(i=>i.id===item.id))r.items.push(item)});reportData.unshift(r);closeModal();showToast('success','已录用 '+selectedIds.size+' 条至新报告');selectedIds.clear();const btn=document.getElementById('btnUse');if(btn)btn.classList.remove('enabled');setTimeout(()=>navigate('edit',id),500)}

function exportWord(reportId){
  const report=reportData.find(r=>r.id===reportId);if(!report)return;
  const li=report.items.filter(i=>i.type==='本省'),ei=report.items.filter(i=>i.type==='外省镜鉴');
  let body='<h1 style="text-align:center;font-family:方正小标宋,FangSong,serif">'+report.title+'</h1>';
  body+='<p style="text-align:center;color:#666;font-size:12pt">'+report.time+'</p><hr>';
  body+='<h2 style="font-family:黑体,SimHei,sans-serif">【内容提要】</h2>';
  if(li.length){body+='<p style="font-weight:bold">一、省内舆情</p>';li.forEach((it,i)=>{body+='<p style="text-indent:2em;font-size:11pt">'+(i+1)+'. '+it.title+'</p>'})}
  if(ei.length){body+='<p style="font-weight:bold;margin-top:8pt">二、外省舆情镜鉴</p>';ei.forEach((it,i)=>{body+='<p style="text-indent:2em;font-size:11pt">'+(i+1)+'. '+it.title+'</p>'})}
  function writeBodyItems(items,offset){items.forEach((it,i)=>{
    body+='<h2 style="font-family:黑体,SimHei,sans-serif">'+(offset+i+1)+'、'+it.title+'</h2>';
    body+='<p style="text-indent:2em">'+it.summary+'</p>';
    if(it.suggestion){body+='<p style="text-indent:2em;color:#666;font-size:12pt">建议意见：'+it.suggestion+'</p>'}
    body+='<p style="color:#999;font-size:10pt;text-indent:2em">（'+it.source+' | '+it.time+'）</p>';
  })}
  if(li.length){body+='<h2 style="font-family:黑体,SimHei,sans-serif">一、本省舆情</h2>';writeBodyItems(li,0)}
  if(ei.length){body+='<h2 style="font-family:黑体,SimHei,sans-serif">二、外省舆情镜鉴</h2>';writeBodyItems(ei,0)}
  const html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]--><style>@page{size:A4;margin:2.54cm}body{font-family:仿宋,FangSong,serif;font-size:14pt;line-height:28pt}h1{font-size:22pt;margin-bottom:12pt}h2{font-size:16pt;margin-top:16pt;margin-bottom:8pt}p{margin:4pt 0}</style></head><body>'+body+'</body></html>';
  const blob=new Blob(['\ufeff'+html],{type:'application/msword'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=report.title+'.doc';a.click();URL.revokeObjectURL(a.href);
  showToast('success','Word 文档已导出');
}

function addRootDept(){
  showModal('新增部门','<div class="form-group"><label>部门名称<span class="req">*</span></label><input class="form-control" id="newRootDeptName" placeholder="请输入部门名称"></div>','<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="confirmAddRootDept()">确认</button>');
}
function confirmAddRootDept(){
  const name=document.getElementById('newRootDeptName').value.trim();
  if(!name){showToast('error','请输入部门名称');return}
  departmentData.push({id:'dept-'+Date.now(),name:name,children:[],users:[]});
  closeModal();showToast('success','已添加部门"'+name+'"');renderDepartmentsPage();
}
function addChildDept(parentId){
  function getDepth(nodes,targetId,d){for(const n of nodes){if(n.id===targetId)return d;if(n.children){const r=getDepth(n.children,targetId,d+1);if(r!==null)return r}}return null}
  const depth=getDepth(departmentData,parentId,0);
  if(depth>=1){showToast('error','最多支持两级层级，无法继续添加');return}
  showModal('添加部门','<div class="form-group"><label>部门名称<span class="req">*</span></label><input class="form-control" id="newChildDeptName" placeholder="请输入部门名称"></div>','<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="confirmAddChildDept(\''+parentId+'\')">确认</button>');
}
function confirmAddChildDept(parentId){
  const name=document.getElementById('newChildDeptName').value.trim();
  if(!name){showToast('error','请输入部门名称');return}
  function findNode(nodes){
    for(const n of nodes){
      if(n.id===parentId)return n;
      if(n.children){const found=findNode(n.children);if(found)return found}
    }
    return null;
  }
  const parent=findNode(departmentData);
  if(!parent){showToast('error','未找到上级部门');return}
  if(!parent.children)parent.children=[];
  parent.children.push({id:'dept-'+Date.now(),name:name,children:[],users:[]});
  closeModal();showToast('success','已添加"'+name+'"');renderDepartmentsPage();
}
function editDept(deptId){
  const dept=findDeptById(departmentData,deptId);
  if(!dept){showToast('error','未找到部门');return}
  showModal('编辑部门','<div class="form-group"><label>部门名称<span class="req">*</span></label><input class="form-control" id="editDeptName" value="'+dept.name.replace(/"/g,'&quot;')+'" placeholder="请输入部门名称"></div>','<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="confirmEditDept(\''+deptId+'\')">确认</button>');
}
function confirmEditDept(deptId){
  const name=document.getElementById('editDeptName').value.trim();
  if(!name){showToast('error','请输入部门名称');return}
  const dept=findDeptById(departmentData,deptId);

}
function deleteDept(deptId,deptName){
  showModal('删除确认','<div style="font-size:14px;line-height:1.8">确定要删除部门<strong>"'+deptName+'"</strong>吗？<br><span style="color:var(--text-quaternary);font-size:12px">删除后该部门下的子部门和人员将一并移除，此操作不可恢复。</span></div>','<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="confirmDeleteDept(\''+deptId+'\')">确认删除</button>');
}
function confirmDeleteDept(deptId){
  function removeFrom(nodes){
    for(let i=0;i<nodes.length;i++){
      if(nodes[i].id===deptId){nodes.splice(i,1);return true}
      if(nodes[i].children&&removeFrom(nodes[i].children))return true;
    }
    return false;
  }
  removeFrom(departmentData);
  closeModal();showToast('success','已删除');renderDepartmentsPage();
}
function buildDeptTreeHTML(nodes,depth){
  let html='';
  nodes.forEach(node=>{
    const hasChildren=node.children&&node.children.length;
    const hasUsers=node.users&&node.users.length;
    const isLeaf=!hasChildren;
    const indent=depth*24;
    // 操作按钮（编辑+删除+添加子部门）
    const btns='<div style="display:flex;align-items:center;gap:2px;flex-shrink:0;margin-left:auto">'
      +(depth<1?'<button class="btn btn-ghost btn-sm" style="color:var(--primary);padding:2px 6px" onclick="event.stopPropagation();addChildDept(\''+node.id+'\')" title="添加部门"><i class="ri-add-line"></i></button>':'')
      +'<button class="btn btn-ghost btn-sm" style="color:var(--text-tertiary);padding:2px 6px" onclick="event.stopPropagation();editDept(\''+node.id+'\')" title="编辑"><i class="ri-edit-line"></i></button>'
      +'<button class="btn btn-ghost btn-sm" style="color:var(--red);padding:2px 6px" onclick="event.stopPropagation();deleteDept(\''+node.id+'\',\''+node.name.replace(/'/g,"\\'")+'\')" title="删除"><i class="ri-delete-bin-line"></i></button>'
      +'</div>';
    if(isLeaf){
      html+='<div class="dept-tree-node" style="padding-left:'+indent+'px">';
      html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border-light)">';
      html+='<i class="ri-building-line" style="color:var(--primary);font-size:16px;flex-shrink:0"></i>';
      html+='<div style="flex:1"><div style="font-size:13px;font-weight:500">'+node.name+'</div>';
      if(hasUsers){
        html+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">';
        node.users.forEach(u=>{
          html+='<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px 2px 2px;border-radius:999px;border:1px solid var(--border-light);font-size:12px">';
          html+='<span style="width:20px;height:20px;border-radius:50%;background:var(--primary-bg);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500">'+u.name.charAt(0)+'</span>';
          html+=u.name+(u.status==='停用'?'<span style="font-size:10px;color:var(--text-quaternary)">(停用)</span>':'');
          html+='</span>';
        });
        html+='</div>';
      }
      html+='</div>';
      html+=btns;
      html+='</div></div>';
    }else{
      html+='<div class="dept-tree-branch" style="padding-left:'+indent+'px">';
      html+='<div class="dept-tree-toggle" onclick="this.parentElement.classList.toggle(\'collapsed\')" style="display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border-light);user-select:none">';
      html+='<i class="ri-arrow-down-s-line dept-arrow" style="font-size:16px;color:var(--text-tertiary);transition:transform .2s;flex-shrink:0"></i>';
      html+='<i class="ri-folder-3-line" style="color:var(--orange);font-size:16px;flex-shrink:0"></i>';
      html+='<span style="font-size:13px;font-weight:500">'+node.name+'</span>';
      html+=btns;
      html+='</div>';
      html+='<div class="dept-tree-children">'+buildDeptTreeHTML(node.children,depth+1)+'</div>';
      html+='</div>';
    }
  });
  return html;
}

    +'<div class="form-group"><label>手机号<span class="req">*</span></label><input class="form-control" id="addUserPhone" type="tel" placeholder="请输入手机号" maxlength="11"></div>'
    +'<div class="form-group"><label>密码<span class="req">*</span></label><input class="form-control" id="addUserPwd" type="password" placeholder="至少8位，含大写、小写、数字、符号"></div>'
    +'<div class="form-group"><label>确认密码<span class="req">*</span></label><input class="form-control" id="addUserPwd2" type="password" placeholder="请再次输入密码"></div>'
    +'<div class="form-group"><label>所属部门（可多选）<span class="req">*</span></label><div style="border:1px solid var(--border-light);border-radius:var(--radius-md);padding:8px;max-height:150px;overflow-y:auto">'+leaves.map(d=>{const path=getDeptPath(departmentData,d.id);const label=path?path.join(' / '):d.name;return'<label style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer"><input type="checkbox" value="'+d.name+'" class="add-user-dept-cb" style="accent-color:var(--primary)"><span style="font-size:13px">'+label+'</span></label>'}).join('')+'</div></div>'
    +'<div class="form-group"><label>角色（可多选）<span class="req">*</span></label><div style="border:1px solid var(--border-light);border-radius:var(--radius-md);padding:8px">'+roleOpts+'</div></div></div>';
  showModal('新增用户',body,'<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="confirmAddUser()">确定</button>');
}
function confirmAddUser(){
  const name=document.getElementById('addUserName').value.trim();
  const phone=document.getElementById('addUserPhone').value.trim();
  const pwd=document.getElementById('addUserPwd').value;
  const pwd2=document.getElementById('addUserPwd2').value;
  if(!name){showToast('error','请输入姓名');return}
  if(!phone||phone.length!==11){showToast('error','请输入正确的11位手机号');return}
  if(!pwd){showToast('error','请输入密码');return}
  const pwdErr=validatePwd(pwd);if(pwdErr){showToast('error',pwdErr);return}
  if(pwd!==pwd2){showToast('error','两次输入的密码不一致');return}
  const deptCbs=document.querySelectorAll('.add-user-dept-cb:checked');
  const orgs=Array.from(deptCbs).map(cb=>cb.value);
  if(!orgs.length){showToast('error','请至少选择一个部门');return}
  if(adminUsers.find(u=>u.phone===phone)){showToast('error','该手机号已存在');return}
  const roleCbs=document.querySelectorAll('.add-user-role-cb:checked');
  const roles=Array.from(roleCbs).map(cb=>cb.getAttribute('data-role-name'));
  if(!roles.length){showToast('error','请至少分配一个角色');return}
  adminUsers.push({id:Date.now(),name:name,phone:phone,password:pwd,orgs:orgs,roles:roles,status:'正常'});
  orgs.forEach(orgName=>{const leaf=getDeptLeaves(departmentData).find(d=>d.name===orgName);if(leaf){if(!leaf.users)leaf.users=[];leaf.users.push({id:'du-'+Date.now(),name:name,status:'正常'})}});
  closeModal();showToast('success','用户 '+name+' 已添加');renderUsersPage();
}
function validatePwd(p){if(p.length<8)return'密码至少8个字符';if(!/[A-Z]/.test(p))return'密码必须包含大写字母';if(!/[a-z]/.test(p))return'密码必须包含小写字母';if(!/[0-9]/.test(p))return'密码必须包含数字';if(!/[!@#$%^&*?]/.test(p))return'密码必须包含符号(!@#$%^&*?)';return''}
function findDeptById(nodes,id){
  for(const n of nodes){
    if(n.id===id)return n;
    if(n.children){const found=findDeptById(n.children,id);if(found)return found}
  }
  return null;
}
function showEditUserModal(uid){
  const u=adminUsers.find(x=>x.id===uid);if(!u)return;
  const leaves=getDeptLeaves(departmentData);
  const roleOpts=adminRoles.map(r=>'<label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer"><input type="checkbox" value="'+r.id+'" data-role-name="'+r.name+'" class="edit-user-role-cb"'+(u.roles&&u.roles.includes(r.name)?' checked':'')+' style="accent-color:var(--primary)"><span style="font-size:13px">'+r.name+'</span></label>').join('');
  const deptOpts=leaves.map(d=>{const path=getDeptPath(departmentData,d.id);const label=path?path.join(' / '):d.name;return'<label style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer"><input type="checkbox" value="'+d.name+'" class="edit-user-dept-cb"'+(u.orgs&&u.orgs.includes(d.name)?' checked':'')+' style="accent-color:var(--primary)"><span style="font-size:13px">'+label+'</span></label>'}).join('');
  const body='<div style="display:flex;flex-direction:column;gap:12px">'
    +'<div class="form-group"><label>姓名</label><input class="form-control" id="editUserName" value="'+u.name+'"></div>'
    +'<div class="form-group"><label>手机号</label><input class="form-control" id="editUserPhone" type="tel" value="'+u.phone+'" maxlength="11"></div>'
    +'<div class="form-group"><label>重置密码</label><input class="form-control" id="editUserPwd" type="password" placeholder="留空则不修改密码"><div style="font-size:12px;color:var(--text-muted);margin-top:4px">留空表示不修改密码，填写需至少8位且包含大写、小写、数字、符号</div></div>'
    +'<div class="form-group"><label>所属部门（可多选）</label><div style="border:1px solid var(--border-light);border-radius:var(--radius-md);padding:8px;max-height:150px;overflow-y:auto">'+deptOpts+'</div></div>'
    +'<div class="form-group"><label>角色（可多选）</label><div style="border:1px solid var(--border-light);border-radius:var(--radius-md);padding:8px">'+roleOpts+'</div></div></div>';
  showModal('编辑用户',body,'<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="confirmEditUser('+uid+')">保存</button>');
}
function confirmEditUser(uid){
  const u=adminUsers.find(x=>x.id===uid);if(!u)return;
  u.name=document.getElementById('editUserName').value.trim()||u.name;
  u.phone=document.getElementById('editUserPhone').value.trim()||u.phone;
  const newPwd=document.getElementById('editUserPwd').value;
  if(newPwd){
    const pwdErr=validatePwd(newPwd);if(pwdErr){showToast('error',pwdErr);return}
    u.password=newPwd;
  }
  const deptCbs=document.querySelectorAll('.edit-user-dept-cb:checked');
  u.orgs=Array.from(deptCbs).map(cb=>cb.value);
  if(!u.orgs.length)u.orgs=[u.orgs[0]||''];
  const roleCbs=document.querySelectorAll('.edit-user-role-cb:checked');
  u.roles=Array.from(roleCbs).map(cb=>cb.getAttribute('data-role-name'));
  if(!u.roles.length)u.roles=['地市人员'];
  closeModal();showToast('success','用户信息已更新');renderUsersPage();
}

/* ===== Role Management ===== */
function renderRolesPage(){
  document.getElementById('pageContainer').innerHTML='<div class="page active"><div class="page-header"><div class="page-header-left"><div class="page-heading">角色管理</div></div></div><div class="role-layout"><div class="role-sidebar"><div class="role-sidebar-header"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="role-sidebar-title">角色列表</div><button class="btn btn-primary btn-sm" onclick="showAddRoleModal()"><i class="ri-add-line"></i>新增</button></div><input class="role-sidebar-search" placeholder="搜索角色..." oninput="filterRoleList(this.value)"></div><div class="role-list" id="roleList"></div></div><div class="role-main"><div class="role-tabs"><div class="role-tab active" onclick="switchRoleTab(0,this)">角色编辑</div><div class="role-tab" onclick="switchRoleTab(1,this)">功能权限分配</div><div class="role-tab" onclick="switchRoleTab(2,this)">用户管理</div></div><div class="role-tab-body" id="roleTabBody"></div></div></div></div>';
  renderRoleList();switchRoleTab(0,document.querySelector('.role-tab'));
}
function renderRoleList(){
  const list=document.getElementById('roleList');if(!list)return;
  list.innerHTML=adminRoles.map(r=>'<div class="role-list-item'+(r.id===activeRoleId?' active':'')+'" onclick="selectRole(\''+r.id+'\')"><span>'+r.name+'</span><i class="ri-delete-bin-line role-del" onclick="event.stopPropagation();deleteRole(\''+r.id+'\')"></i></div>').join('');
}
function filterRoleList(kw){
  const list=document.getElementById('roleList');if(!list)return;
  const k=kw.toLowerCase();
  list.innerHTML=adminRoles.filter(r=>r.name.toLowerCase().includes(k)||r.desc.toLowerCase().includes(k)).map(r=>'<div class="role-list-item'+(r.id===activeRoleId?' active':'')+'" onclick="selectRole(\''+r.id+'\')"><span>'+r.name+'</span><i class="ri-delete-bin-line role-del" onclick="event.stopPropagation();deleteRole(\''+r.id+'\')"></i></div>').join('');
}
function selectRole(id){activeRoleId=id;renderRoleList();switchRoleTab(currentRoleTab,document.querySelector('.role-tab.active'))}
function deleteRole(id){
  if(adminRoles.length<=1){showToast('error','至少保留一个角色');return}
  showModal('确认删除','<p style="font-size:14px;color:var(--text-secondary)">确定删除角色"'+adminRoles.find(r=>r.id===id).name+'"？</p>','<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" style="background:var(--red)" onclick="confirmDeleteRole(\''+id+'\')">确认</button>');
}
function confirmDeleteRole(id){
  adminRoles.splice(adminRoles.findIndex(r=>r.id===id),1);
  if(activeRoleId===id)activeRoleId=adminRoles[0].id;
  closeModal();showToast('success','角色已删除');renderRolesPage();
}
function showAddRoleModal(){
  showModal('新增角色','<div class="form-group"><label>角色名称</label><input class="form-control" id="newRoleName" placeholder="请输入角色名称"></div><div class="form-group" style="margin-top:12px"><label>角色描述</label><input class="form-control" id="newRoleDesc" placeholder="请输入角色描述"></div>','<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="confirmAddRole()">确定</button>');
}
function confirmAddRole(){
  const n=document.getElementById('newRoleName').value.trim();
  const d=document.getElementById('newRoleDesc').value.trim();
  if(!n){showToast('error','请输入角色名称');return}
  adminRoles.push({id:'r'+Date.now(),name:n,desc:d||n,perms:[]});
  closeModal();showToast('success','角色已添加');activeRoleId=adminRoles[adminRoles.length-1].id;renderRolesPage();
}
let currentRoleTab=0;
function switchRoleTab(idx,tabEl){
  currentRoleTab=idx;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  if(tabEl)tabEl.classList.add('active');
  const role=adminRoles.find(r=>r.id===activeRoleId);if(!role)return;
  const body=document.getElementById('roleTabBody');
  if(idx===0){
    body.innerHTML='<div class="role-edit-form"><div class="form-group"><label>角色名称</label><input class="form-control" id="editRoleName" value="'+role.name+'" oninput="updateRoleField(\'name\',this.value)"></div><div class="form-group"><label>角色描述</label><input class="form-control" id="editRoleDesc" value="'+role.desc+'" oninput="updateRoleField(\'desc\',this.value)"></div></div>';
  }else if(idx===1){
    let html='<ul class="perm-tree">';
    permTree.forEach(node=>{
      const checked=role.perms;
      const childrenChecked=node.children.map(c=>checked.includes(c.id));
      const allChecked=childrenChecked.every(Boolean);
      const someChecked=childrenChecked.some(Boolean);
      const parentCls=allChecked?'checked':someChecked?'partial':'';
      html+='<li class="perm-node"><div class="perm-node-row parent" onclick="togglePermParent(\''+node.id+'\')"><div class="perm-cb '+parentCls+'"></div><span>'+node.label+'</span></div><ul>';
      node.children.forEach(child=>{
        const cChecked=checked.includes(child.id);
        html+='<li class="perm-node"><div class="perm-node-row leaf" onclick="togglePermChild(\''+child.id+'\')"><div class="perm-cb '+(cChecked?'checked':'')+'"></div><span>'+child.label+'</span></div></li>';
      });
      html+='</ul></li>';
    });
    html+='</ul><div class="perm-save-bar"><button class="btn btn-primary" onclick="showToast(\'success\',\'权限已保存\')"><i class="ri-save-line"></i>保存</button></div>';
    body.innerHTML=html;
  }else if(idx===2){
    const users=adminUsers.filter(u=>u.roles&&u.roles.includes(role.name));
    if(!users.length){body.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="showAddRoleUserModal(\''+role.id+'\')"><i class="ri-user-add-line"></i>添加用户</button></div></div><div class="empty-state" style="padding:40px"><i class="ri-user-line"></i><p>暂无用户属于该角色</p></div>';return}
    body.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="showAddRoleUserModal(\''+role.id+'\')"><i class="ri-user-add-line"></i>添加用户</button><button class="btn btn-outline btn-sm" id="btnRemoveRoleUser" style="display:none" onclick="removeRoleUsers(\''+role.id+'\')"><i class="ri-user-minus-line"></i>移除用户</button></div><div style="position:relative"><i class="ri-search-line" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-quaternary);font-size:14px"></i><input style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px 6px 32px;font-size:12px;outline:none;width:180px;font-family:inherit" placeholder="搜索用户..." oninput="filterRoleUsers(this.value,\''+role.id+'\')"></div></div><div id="roleUserTable"></div>';
    renderRoleUserTable(users,role.id);
  }
}
function updateRoleField(field,val){
  const role=adminRoles.find(r=>r.id===activeRoleId);if(role){role[field]=val;renderRoleList()}
}
function togglePermParent(nodeId){
  const role=adminRoles.find(r=>r.id===activeRoleId);if(!role)return;
  const node=permTree.find(n=>n.id===nodeId);if(!node)return;
  const childIds=node.children.map(c=>c.id);
  const allChecked=childIds.every(id=>role.perms.includes(id));
  if(allChecked){role.perms=role.perms.filter(p=>!childIds.includes(p))}
  else{childIds.forEach(id=>{if(!role.perms.includes(id))role.perms.push(id)})}
  switchRoleTab(1,document.querySelector('.role-tab.active'));
}
function togglePermChild(permId){
  const role=adminRoles.find(r=>r.id===activeRoleId);if(!role)return;
  const idx=role.perms.indexOf(permId);
  if(idx>=0)role.perms.splice(idx,1);else role.perms.push(permId);
  switchRoleTab(1,document.querySelector('.role-tab.active'));
}

/* ===== Role User Management ===== */
let selectedRoleUserIds=new Set();
function renderRoleUserTable(users,roleId){
  const el=document.getElementById('roleUserTable');if(!el)return;
  selectedRoleUserIds.clear();
  if(!users.length){el.innerHTML='<div class="empty-state" style="padding:30px"><i class="ri-user-line"></i><p>无匹配用户</p></div>';updateRemoveBtn();return}
  el.innerHTML='<table class="admin-table" style="margin-bottom:12px"><thead><tr><th style="width:40px"><div class="yq-check" style="width:16px;height:16px;margin:0 auto" onclick="toggleAllRoleUsers('+JSON.stringify(users.map(u=>u.id))+')"></div></th><th>姓名</th><th>所属部门</th><th>状态</th><th style="width:60px">操作</th></tr></thead><tbody>'+users.map(u=>'<tr><td style="text-align:center"><div class="yq-check" style="width:16px;height:16px;margin:0 auto" id="ruc-'+u.id+'" onclick="toggleRoleUserCheck('+u.id+')"></div></td><td style="font-weight:500">'+u.name+'</td><td>'+(u.deptName||u.org||'')+'</td><td><span style="font-size:11px;padding:2px 8px;border-radius:999px;'+(u.status==='正常'?'background:var(--green-bg);color:var(--green)':'background:var(--orange-bg);color:var(--orange)')+'">'+(u.status==='正常'?'已开通':'已停用')+'</span></td><td><a style="font-size:12px;color:var(--primary);cursor:pointer" onclick="removeSingleRoleUser('+u.id+',\''+roleId+'\')">移除</a></td></tr>').join('')+'</tbody></table><div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0"><span style="font-size:11px;color:var(--text-quaternary)">共 '+users.length+' 条</span></div>';
  updateRemoveBtn();
}
function updateRemoveBtn(){const btn=document.getElementById('btnRemoveRoleUser');if(btn)btn.style.display=selectedRoleUserIds.size>0?'inline-flex':'none'}
function toggleRoleUserCheck(uid){if(selectedRoleUserIds.has(uid))selectedRoleUserIds.delete(uid);else selectedRoleUserIds.add(uid);const cb=document.getElementById('ruc-'+uid);if(cb)cb.classList.toggle('checked',selectedRoleUserIds.has(uid));updateRemoveBtn()}
function toggleAllRoleUsers(ids){const all=ids.every(id=>selectedRoleUserIds.has(id));if(all)ids.forEach(id=>selectedRoleUserIds.delete(id));else ids.forEach(id=>selectedRoleUserIds.add(id));ids.forEach(id=>{const cb=document.getElementById('ruc-'+id);if(cb)cb.classList.toggle('checked',selectedRoleUserIds.has(id))});updateRemoveBtn()}
function filterRoleUsers(kw,roleId){const role=adminRoles.find(r=>r.id===roleId);if(!role)return;const k=kw.toLowerCase();const users=adminUsers.filter(u=>u.roles&&u.roles.includes(role.name)&&(u.name.toLowerCase().includes(k)||u.org.toLowerCase().includes(k)));renderRoleUserTable(users,roleId)}
function removeSingleRoleUser(uid,roleId){const u=adminUsers.find(x=>x.id===uid);const role=adminRoles.find(r=>r.id===roleId);if(!u||!role)return;showModal('确认移除','<p style="font-size:14px;color:var(--text-secondary)">确定将 "'+u.name+'" 从 "'+role.name+'" 角色中移除？</p>','<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" style="background:var(--red)" onclick="confirmRemoveSingleRoleUser('+uid+',\''+roleId+'\')">确认</button>')}
function confirmRemoveSingleRoleUser(uid,roleId){const u=adminUsers.find(x=>x.id===uid);const role=adminRoles.find(r=>r.id===roleId);if(u&&role)u.roles=(u.roles||[]).filter(r=>r!==role.name);closeModal();showToast('success','已移除');selectedRoleUserIds.clear();switchRoleTab(2,document.querySelectorAll('.role-tab')[2])}
function removeRoleUsers(roleId){if(selectedRoleUserIds.size===0)return;const role=adminRoles.find(r=>r.id===roleId);showModal('确认移除','<p style="font-size:14px;color:var(--text-secondary)">确定将选中的 '+selectedRoleUserIds.size+' 个用户从 "'+role.name+'" 角色中移除？</p>','<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" style="background:var(--red)" onclick="confirmRemoveRoleUsers(\''+roleId+'\')">确认</button>')}
function confirmRemoveRoleUsers(roleId){const role=adminRoles.find(r=>r.id===roleId);adminUsers.filter(u=>selectedRoleUserIds.has(u.id)).forEach(u=>{if(role)u.roles=(u.roles||[]).filter(r=>r!==role.name)});closeModal();showToast('success','已移除 '+selectedRoleUserIds.size+' 个用户');selectedRoleUserIds.clear();switchRoleTab(2,document.querySelectorAll('.role-tab')[2])}
function showAddRoleUserModal(roleId){
  const role=adminRoles.find(r=>r.id===roleId);if(!role)return;
  const allTreeUsers=getAllDeptUsers(departmentData);
  const existingNames=new Set(adminUsers.filter(u=>u.roles&&u.roles.includes(role.name)).map(u=>u.name));
  const avail=allTreeUsers.filter(u=>!existingNames.has(u.name));
  if(!avail.length){showToast('info','所有用户已属于该角色');return}
  let opts='';
  departmentData.forEach(prov=>{
    const provUsers=getAllDeptUsers(prov.children||[]).filter(u=>!existingNames.has(u.name));
    if(!provUsers.length)return;
    opts+='<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:600;color:var(--text-tertiary);padding:4px 0 6px;text-transform:uppercase;letter-spacing:0.5px">'+prov.name+'</div>';
    provUsers.forEach(u=>{
      const path=getDeptPath(departmentData,u.deptId);
      const pathStr=path?path.slice(0,-1).join(' / '):'';
      opts+='<label style="display:flex;align-items:center;gap:10px;padding:6px 12px;border:1px solid var(--border-light);border-radius:var(--radius-md);cursor:pointer;margin-bottom:4px"><input type="checkbox" value="'+u.name+'" data-org="'+u.deptName+'" style="accent-color:var(--primary)"><div style="display:flex;align-items:center;gap:8px"><span style="width:22px;height:22px;border-radius:50%;background:var(--primary-bg);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500">'+u.name.charAt(0)+'</span><div><span style="font-size:13px;font-weight:500">'+u.name+'</span><span style="font-size:11px;color:var(--text-tertiary);margin-left:6px">'+pathStr+'</span></div></div></label>';
    });
    opts+='</div>';
  });
  showModal('添加用户至 "'+role.name+'"','<div style="max-height:400px;overflow-y:auto">'+opts+'</div>','<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="confirmAddRoleUsers(\''+roleId+'\')">确认添加</button>');
}
function confirmAddRoleUsers(roleId){const role=adminRoles.find(r=>r.id===roleId);if(!role)return;const ch=document.querySelectorAll('#modalBody input[type=checkbox]:checked');if(!ch.length){showToast('error','请选择用户');return}ch.forEach(cb=>{const name=cb.value;const u=adminUsers.find(x=>x.name===name);if(u){if(!u.roles)u.roles=[];if(!u.roles.includes(role.name))u.roles.push(role.name)}else{adminUsers.push({id:Date.now()+Math.random(),name:name,org:cb.getAttribute('data-org'),roles:[role.name],status:'正常'})}});closeModal();showToast('success','已添加 '+ch.length+' 个用户');switchRoleTab(2,document.querySelectorAll('.role-tab')[2])}

/* ===== Toast & Modal ===== */

## 1. 产品概述

### 1.1 产品背景

省级宣传部门需要一套轻量化的舆情信息报送与管理工具，用于收集各地市上报的舆情事件、汇总查看、并编写舆情专报上报领导。本系统为简版，聚焦核心报送流程，去除数据分析、趋势预警等高级功能，降低使用门槛。

系统采用手机号密码登录方式，实现统一身份认证与权限管控。

### 1.2 产品目标

- 为各地市宣传部提供统一的舆情上报入口，规范报送流程
- 为舆情处提供舆情汇总查看、批量录用至报告的快捷操作
- 提供轻量的报告编写、预览与发布能力
- 实现组织内统一登录与权限管控

### 1.3 用户角色与权限

系统定义三种用户角色，权限严格区分：

- **地市人员**
  - 所属组织：各地市宣传部（如杭州市宣传部、温州市宣传部等）
  - 核心权限：上报本地舆情信息
  - 数据可见范围：仅可查看本单位上报的舆情记录
  - 可用功能模块：舆情汇总（限本单位数据）、舆情上报
  - 不可用功能：报告管理、录用至报告、系统管理

- **舆情处人员**
  - 所属组织：省委宣传部舆情处
  - 核心权限：舆情汇总管理与报告编写
  - 数据可见范围：全部地市上报舆情 + 外省镜鉴舆情
  - 可用功能模块：舆情汇总（全部数据）、报告管理（含录用、编辑、预览、发布）
  - 不可用功能：系统管理

- **系统管理员**
  - 所属组织：省委宣传部
  - 核心权限：系统运维与权限配置
  - 数据可见范围：全部
  - 可用功能模块：全部功能 + 系统管理（用户管理、角色管理、部门管理）

## 2. 登录认证

### 2.1 登录方式

系统提供手机号密码登录方式，登录流程如下：

- 用户打开系统后显示登录页
- 输入手机号、密码和验证码完成身份认证
- 系统校验手机号和密码匹配后，自动获取用户姓名、所属部门、角色等信息
- 根据用户在系统中的角色配置，自动进入对应权限的主界面
- 若不填写手机号和密码，直接点击登录可进入系统（原型演示模式）

### 2.2 登录页信息展示

- 左侧展示系统名称、功能简介、核心特性列表
- 右侧为登录操作区域，包含以下字段：
  - **手机号**：文本输入框，占位文字"请输入手机号"，限制 11 位
  - **密码**：密码输入框，占位文字"请输入密码"
  - **验证码**：文本输入框（限制 4 位）+ 右侧图形验证码画布
    - 展示规则：画布显示 4 位随机字符（大小写字母+数字），配干扰线和干扰点
    - 交互规则：点击画布刷新验证码内容
  - **登录按钮**：点击执行登录
- 底部显示体验提示信息

### 2.3 登录后初始化

- 自动填充用户信息至顶部导航栏（头像取姓名首字）
- 根据角色动态构建侧边栏导航菜单
- 默认进入"舆情汇总"页面

### 2.4 退出登录

- 顶部导航栏右侧提供退出按钮
- 点击后清除当前会话，返回登录页

## 3. 全局导航

### 3.1 侧边栏结构

侧边栏采用统一的导航结构，各菜单项的可见性根据用户角色通过配置控制：

- **顶部 Logo 区**
  - 系统名称"舆情报送与管理系统"，配蓝色圆角图标

- **功能菜单**
  - 舆情汇总：所有角色可见。地市人员仅可查看本单位上报数据，舆情处和管理员可查看全部数据并使用录用功能
  - 报告管理：仅舆情处和管理员可见。地市人员无此入口

- **系统管理**（仅管理员可见）
  - 部门管理
  - 用户管理
  - 角色管理

> 舆情上报功能通过舆情汇总页右上角按钮进入，不在侧边栏中单独展示。原型演示中默认展示全部菜单，实际系统根据用户角色动态控制菜单项的显示与隐藏。

### 3.2 顶部导航栏

- **左侧**
  - 当前页面标题，随页面切换动态更新

- **右侧**
  - 用户头像（姓名首字）
  - 用户姓名
  - 退出登录图标按钮

## 4. 舆情汇总

### 4.1 功能说明

查看系统中已上报的舆情信息列表。根据用户角色不同，数据范围和操作权限有显著差异：

- 地市人员：仅展示本单位上报的舆情记录，无录用功能
- 舆情处/管理员：展示全部上报舆情，支持多选后批量录用至报告

### 4.2 统计概览

页面标题下方展示 4 张统计卡片，实时反映当前筛选结果。

- **取数规则**：统计基于当前筛选条件过滤后的舆情列表
- **更新规则**：筛选条件变化时实时重新计算

各卡片字段：

1. **上报总数**
   - 展示规则：蓝色图标，显示数字 + "上报总数"标签
   - 数据规则：当前筛选结果中的舆情总条数

2. **已录用**
   - 展示规则：橙色图标，显示数字 + "已录用"标签
   - 数据规则：当前筛选结果中已被录用至任意报告的舆情条数（即录用状态为"已录用"）

3. **本省**
   - 展示规则：蓝色图标，显示数字 + "本省"标签
   - 数据规则：当前筛选结果中来源类型为"本省"的舆情条数

4. **外省镜鉴**
   - 展示规则：绿色图标，显示数字 + "外省镜鉴"标签
   - 数据规则：当前筛选结果中来源类型为"外省镜鉴"的舆情条数

### 4.3 搜索与筛选

#### 4.3.1 搜索框

- 展示规则：文本输入框，占位文字"搜索标题、地域、单位、内容..."
- 交互规则：输入后实时过滤列表，清空搜索框恢复全部数据
- 数据筛选规则：按舆情标题、地域、上报单位、内容摘要四个字段进行模糊匹配（包含即命中），取并集

#### 4.3.2 时间范围筛选

- 展示规则：两个日期选择器，组成"起始日期 至 结束日期"
- 交互规则：选择后立即过滤，可单独设置起始或结束，另一端不限
- 数据筛选规则：按舆情的上报时间字段进行范围匹配，仅显示上报时间在起止日期之间的舆情

#### 4.3.3 来源类型筛选

- 展示规则：下拉选择框
- 交互规则：选择后立即过滤列表
- 数据筛选规则：
  - 默认值："全部来源"（不限）
  - 选项："全部来源"、"本省"、"外省镜鉴"
  - 选中后按舆情的来源类型字段精确匹配

#### 4.3.4 单位类型筛选

- 展示规则：下拉选择框
- 交互规则：选择后立即过滤列表
- 数据筛选规则：
  - 默认值："全部单位"（不限）
  - 选项及匹配方式：
    - "省级"：上报单位包含"省委"或"省网信"
    - "地市"：上报单位包含"市宣传部"

#### 4.3.5 录用状态筛选

- 展示规则：下拉选择框
- 交互规则：选择后立即过滤列表
- 数据筛选规则：
  - 默认值："录用状态"（不限）
  - 选项及匹配方式：
    - "已录用"：舆情已被至少一个报告收录
    - "未录用"：舆情未被任何报告收录

#### 4.3.6 地域筛选

- 展示规则：二级级联控件（省→市），第一级省份下拉，第二级城市下拉（选择省份后显示）
- 交互规则：选择后立即过滤，支持仅选省份或选省份+城市
- 数据筛选规则：
  - 第一级含"全部省份"选项，选具体省份后按舆情地域的省份字段精确匹配
  - 第二级含"全部城市"选项，选具体城市后按舆情地域的城市字段精确匹配
  - 两级均选时取交集

#### 4.3.7 舆情分类筛选

- 展示规则：下拉选择框
- 交互规则：选择后立即过滤列表
- 数据筛选规则：
  - 默认值："全部分类"（不限）
  - 选项："刑事案件"、"治安事件"、"交通事故"、"执法不当及违纪违法"、"非正常死亡或失踪"、"其他"
  - 选中后按舆情的分类字段精确匹配，未打标分类的舆情不显示

#### 4.3.8 筛选组合规则

- 搜索关键词、时间范围、来源类型、单位类型、录用状态、地域、舆情分类七个筛选条件可同时生效，取交集
- 所有筛选条件变化后实时更新列表和统计数据

### 4.4 操作栏

- **全选按钮**（仅舆情处/管理员可见）
  - 展示规则：按钮文字"全选"/"取消全选"
  - 交互规则：点击后勾选/取消当前筛选结果中的所有舆情，仅对当前可见列表生效
  - 数据规则：不包含被筛选条件隐藏的条目

- **信息计数**
  - 展示规则：文字"共 N 条上报信息"
  - 数据规则：N = 当前筛选结果的总条数，随筛选条件变化实时更新

### 4.5 舆情列表

- **取数规则**：从舆情数据集中读取。地市人员仅读取上报单位与本单位匹配的记录，舆情处和管理员读取全部记录
- **数据筛选规则**：在角色数据范围基础上，叠加 4.3 中所有筛选条件，取交集
- **数据排序规则**：默认按上报时间倒序排列（最新在上）

#### 4.5.1 列表项展示字段

每条舆情以卡片形式展示，从左到右包含：

1. **勾选框**（仅舆情处/管理员可见）
   - 展示规则：圆形复选框
   - 交互规则：点击切换选中/取消，选中后卡片左侧出现蓝色边框，背景变为浅蓝色

2. **舆情元信息行**
   - **舆情编号**：展示规则：蓝色文字。数据规则：系统自动生成，格式 YQ-YYYYMMDD-NNN（NNN 为当日序号，从 001 递增）
   - **来源类型标签**：展示规则：本省为蓝色浅底标签，外省镜鉴为橙色浅底标签。数据规则：取舆情的来源类型字段
   - **地域**：展示规则：地市名称，配地理位置图标。数据规则：取舆情的地域字段（省+市拼接）
   - **分类标签**（已打标时显示）：展示规则：绿色浅底标签。数据规则：取舆情的分类字段，未打标不显示
   - **录用状态标签**：展示规则：已录用显示绿色浅底标签，未录用显示灰色浅底标签。数据规则：判断该舆情是否被任意报告收录

3. **舆情标题**
   - 展示规则：单行显示，超出部分省略号
   - 交互规则：点击进入舆情详情页

4. **底部信息行**
   - **上报单位**：展示规则：配建筑图标。数据规则：取舆情的上报单位字段
   - **上报时间**：展示规则：格式 YYYY-MM-DD HH:mm，配时钟图标。数据规则：取舆情的上报时间字段

#### 4.5.2 空状态

- 无数据时展示"未找到匹配的舆情信息"提示，配大号图标辅助说明

### 4.6 舆情分类打标

拥有权限的用户（舆情处和管理员）可对舆情进行分类打标。

- 展示规则：每条舆情卡片右侧显示打标按钮（标签图标）
- 交互规则：
  1. 点击后弹出分类选择弹窗，以单选列表形式展示分类选项
  2. 已有分类的舆情默认选中当前分类
  3. 选择后点击"确认"完成打标
  4. 支持重复打标覆盖原有分类
- 数据规则：
  - 分类选项固定为："刑事案件"、"治安事件"、"交通事故"、"执法不当及违纪违法"、"非正常死亡或失踪"、"其他"
  - 确认后将选中的分类写入该舆情的分类字段
  - 打标后舆情卡片元信息行即时显示绿色分类标签

### 4.7 录用至报告交互流程

> 仅舆情处和管理员可操作

- 交互规则：
  1. 勾选一条或多条舆情（通过列表勾选框或全选按钮）
  2. "录用至报告"按钮从灰色变为蓝色可点击态
  3. 点击后弹出报告选择弹窗
  4. 用户选择目标报告后点击"确认录用"
  5. 系统将选中舆情添加到目标报告的舆情列表中（已存在的不会重复添加）
  6. 弹窗关闭，显示成功提示
  7. 自动跳转至该报告的编辑页面
- 数据规则（弹窗报告列表）：
  - 取数规则：从报告数据集中读取所有状态为"草稿"的报告
  - 数据排序规则：按创建时间倒序排列
  - 每项展示：报告编号 + 报告标题

## 5. 舆情上报

### 5.1 功能说明

地市人员通过此页面上报本地舆情信息。支持一次填写多条舆情，批量提交。

> 舆情处和管理员也可使用此功能（通过汇总页右上角按钮进入）。

### 5.2 多条上报机制

- 展示规则：页面默认展示 1 条舆情填写表单，每条为独立卡片，标题显示"第 N 条舆情"
- 交互规则：
  - 点击"添加一条舆情"按钮在下方新增一条空白表单
  - 第 1 条不显示移除按钮，第 2 条及以后每条右上角显示移除按钮
  - 点击移除按钮后该卡片以滑出动画消失
  - 页面右上角实时显示当前表单总数："共 N 条"
  - 底部提交按钮同步显示条数："提交上报（N 条）"

### 5.3 单条表单字段

每条舆情表单包含以下字段：

1. **上报时间**
   - 展示规则：日期时间选择器，精确到分钟
   - 交互规则：必填，未填时边框变红
   - 数据规则：写入舆情记录的上报时间字段

2. **舆情地域**
   - 展示规则：二级级联控件（省→市），第一级省份下拉，第二级城市下拉（选择省份后启用）
   - 交互规则：必填，选择后自动触发"报送单位"字段的填充
   - 数据规则：写入舆情记录的地域字段（省+市）

3. **报送单位**
   - 展示规则：下拉选择框，默认选中当前用户所属单位
   - 交互规则：非必填，用户可从下拉列表中手动切换报送单位
   - 取数规则：下拉选项取数来源为部门树中所有末级部门（地市宣传部）

4. **标题**
   - 展示规则：文本输入框，占位文字"请输入舆情标题"
   - 交互规则：必填，未填时边框变红
   - 数据规则：写入舆情记录的标题字段

5. **内容**
   - 展示规则：多行文本输入框，占位文字"请详细描述舆情事件经过、传播情况、影响范围等..."
   - 交互规则：必填，未填时边框变红
   - 数据规则：写入舆情记录的内容摘要字段

### 5.4 操作按钮

位于所有表单卡片下方：

1. **添加一条舆情**
   - 展示规则：轮廓样式按钮，带加号图标
   - 交互规则：点击后在最下方新增一条空白表单

2. **重置**
   - 展示规则：轮廓样式按钮，带刷新图标
   - 交互规则：点击后清空所有已填写的表单卡片，恢复为仅 1 条空白表单的初始状态

3. **提交上报（N 条）**
   - 展示规则：主按钮样式，带发送图标，N 随当前表单数量动态变化
   - 交互规则：
     - 点击后逐一校验所有表单中的必填字段（上报时间、地域、标题、内容）
     - 未填写的必填字段边框变红，弹出错误提示指明需完善第几条表单
     - 校验通过后弹出成功提示，显示实际上报条数，延迟后自动跳转回舆情汇总页
   - 数据规则：
     - 舆情编号生成规则：格式 YQ-YYYYMMDD-NNN，YYYYMMDD 取上报日期，NNN 为当日序号（从 001 递增）
     - 来源类型：根据上报用户所属单位自动判定（地市人员上报的为"本省"）
     - 录用状态：默认"未录用"
     - 分类字段：默认为空（待后续打标）
     - 写入舆情数据集

- **"返回列表"按钮**

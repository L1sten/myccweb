<html lang="zh-CN">

<title>主题详情 - 浙江公安</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #F5F7FA; color: #1A1A2E; line-height: 1.5;
    -webkit-font-smoothing: antialiased; max-width: 375px; margin: 0 auto;
    overflow-x: hidden;
  }
  a { text-decoration: none; color: inherit; }

  /* ===== Status Bar ===== */
  .status-bar {
    height: 44px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: #0D2B6B; position: sticky; top: 0; z-index: 100;
  }
  .status-bar .time { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
  .status-bar .icons { display: flex; align-items: center; gap: 6px; }
  .status-bar .icons svg { width: 18px; height: 18px; }

  /* ===== Back Button ===== */
  .back-btn {
    position: fixed; top: 52px; left: 16px; z-index: 200;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.25); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.2s, background 0.2s;
    border: none; outline: none;
  }
  .back-btn:active { opacity: 0.6; background: rgba(0,0,0,0.4); }
  .back-btn svg { width: 18px; height: 18px; }

  /* ===== Banner ===== */
  .banner {
    position: relative; width: 100%; height: 280px; overflow: hidden;
    background: linear-gradient(135deg, #091E52 0%, #0D2B6B 25%, #1E4FCC 80%, #2E5FD4 100%);
    display: flex; flex-direction: column; justify-content: center; padding: 0 24px;
  }

  /* Mountain silhouettes */
  .banner .mountains {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }

  /* Decorative seal */
  .banner-seal {
    position: absolute; top: 12px; right: 16px; width: 56px; height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,160,78,0.22) 0%, rgba(201,160,78,0.06) 60%, transparent 72%);
    pointer-events: none;
  }
  .banner-seal::before {
    content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
    border-radius: 50%; border: 1.5px solid rgba(201,160,78,0.25);
  }
  .banner-seal::after {
    content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid rgba(201,160,78,0.3);
  }

  /* Gold sparkle */
  .banner-sparkle {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: rgba(201,160,78,0.4); pointer-events: none;
  }

  /* Banner text */
  .banner-title { position: relative; z-index: 5; margin-top: -10px; }
  .banner-title h1 {
    font-size: 24px; font-weight: 700; color: #fff; line-height: 1.5;
    letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .banner-title h2 {
    font-size: 36px; font-weight: 800; color: #C9A04E; line-height: 1.3;
    margin-top: 4px; letter-spacing: 2px; text-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  /* Tag bar */
  .banner-tags {
    position: absolute; bottom: 20px; left: 24px; right: 24px; z-index: 5;
    display: flex; align-items: center; gap: 0;
    font-size: 13px; color: rgba(255,255,255,0.85); letter-spacing: 2px;
  }
  .banner-tags .tag-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #C9A04E;
    margin-right: 10px; flex-shrink: 0;
  }
  .banner-tags .sep { margin: 0 10px; color: rgba(255,255,255,0.4); }

  /* ===== Section Header ===== */
  .section-header {
    display: flex; align-items: center; height: 44px; padding: 0 16px; margin-top: 20px;
  }
  .section-header .left { display: flex; align-items: center; gap: 8px; }
  .section-header .left .bar {
    width: 4px; height: 18px; background: linear-gradient(180deg, #0D2B6B, #1E4FCC);
    border-radius: 2px;
  }
  .section-header .left .title { font-size: 17px; font-weight: 700; color: #1A1A2E; }
  .section-header .right {
    display: flex; align-items: center; gap: 4px; margin-left: auto;
    font-size: 13px; color: #6B7280; cursor: pointer;
  }
  .section-header .right svg { width: 14px; height: 14px; }

  /* ===== Article Swipe Wrapper ===== */
  .article-swipe {
    position: relative; margin-bottom: 10px; overflow: hidden; border-radius: 12px;
  }
  .article-delete-zone {
    position: absolute; top: 0; right: 0; bottom: 0; width: 80px;
    background: #EF4444; border-radius: 0 12px 12px 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .article-delete-zone:active { background: #DC2626; }
  .article-swipe-inner {
    position: relative; z-index: 2;
    transition: transform 0.25s ease;
  }
  .article-swipe-inner.swiped { transform: translateX(-80px); }

  /* ===== Article List ===== */
  .article-list { padding: 0 16px; }
  .article-card {
    display: flex; align-items: flex-start; gap: 12px;
    background: #FFFFFF; border-radius: 12px; padding: 12px;
    min-height: 101px;
    box-shadow: 0 2px 12px rgba(13,43,107,0.08);
    cursor: pointer; transition: transform 0.15s ease;
  }
  .article-card:active { transform: scale(0.99); }
  .article-thumb {
    position: relative; width: 112px; height: 76px; border-radius: 8px;
    flex-shrink: 0; overflow: hidden;
  }
  .article-thumb .gradient-bg { width: 100%; height: 100%; }
  .article-thumb .badge {
    position: absolute; top: 0; left: 0; width: 22px; height: 22px;
    background: #1E4FCC; color: #fff; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border-radius: 0 0 8px 0;
  }
  .article-info {
    flex: 1; min-width: 0; display: flex; flex-direction: column;
    justify-content: space-between; height: 76px;
  }
  .article-info .article-title {
    font-size: 14px; font-weight: 600; color: #1A1A2E; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; text-overflow: ellipsis;
  }
  .article-info .article-meta { font-size: 12px; color: #6B7280; margin-top: auto; }

  /* ===== Recommendation Section ===== */
  .recommend-list { padding: 0 16px; }
  .recommend-card {
    border-radius: 12px; margin-bottom: 12px; position: relative;
    box-shadow: 0 2px 12px rgba(13,43,107,0.08); cursor: pointer;
    transition: transform 0.15s ease; overflow: hidden;
  }
  .recommend-card:active { transform: scale(0.98); }

  /* Card 1 - Blue: 三大警务 */
  .card-1 {
    background: linear-gradient(135deg, #0D2B6B 0%, #1E4FCC 100%);
    height: 96px; display: flex; align-items: center;
    justify-content: space-between; padding: 0 16px;
  }
  .card-1 .card-text { position: relative; z-index: 2; }
  .card-1 .card-text h3 { font-size: 17px; font-weight: 700; color: #fff; }
  .card-1 .card-text p { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 6px; letter-spacing: 2px; }
  .card-1 .bg-text {
    position: absolute; right: 40px; top: 50%; transform: translateY(-50%);
    font-size: 52px; font-weight: 900; color: rgba(255,255,255,0.07);
    letter-spacing: 4px; pointer-events: none; white-space: nowrap;
  }
  .card-1 .circle-1 { position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.05); pointer-events: none; }
  .card-1 .circle-2 { position: absolute; bottom: -30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.04); pointer-events: none; }
  .card-1 .arrow { position: relative; z-index: 2; color: rgba(255,255,255,0.5); }
  .card-1 .arrow svg { width: 20px; height: 20px; }

  /* Card 2 - Orange: 三能浙警 */
  .card-2 {
    background: linear-gradient(135deg, #FFF7ED, #FFF1E0);
    height: 96px; display: flex; align-items: center; gap: 12px; padding: 0 16px;
  }
  .card-2 .deco-char {
    font-size: 68px; font-weight: 900; color: rgba(249,115,22,0.13);
    line-height: 1; flex-shrink: 0; user-select: none;
  }
  .card-2 .card-text { position: relative; z-index: 2; }
  .card-2 .card-text h3 { font-size: 22px; font-weight: 700; color: #9A3412; }
  .card-2 .card-text p { font-size: 13px; color: #C2734A; margin-top: 4px; letter-spacing: 2px; }
  .card-2 .arrow { margin-left: auto; color: #F97316; position: relative; z-index: 2; }
  .card-2 .arrow svg { width: 20px; height: 20px; }

  /* Card 3 - Purple: 百日攻坚 */
  .card-3 {
    background: linear-gradient(135deg, #F5F3FF, #EDE9FE);
    height: 96px; display: flex; align-items: center; padding: 0 16px;
  }
  .card-3 .purple-bar {
    position: absolute; left: 0; top: 12px; bottom: 12px; width: 4px;
    background: linear-gradient(180deg, #7C3AED, #A78BFA); border-radius: 0 2px 2px 0;
  }
  .card-3 .card-content { padding-left: 12px; flex: 1; position: relative; z-index: 2; }
  .card-3 .card-content h3 { font-size: 15px; font-weight: 700; color: #4C1D95; line-height: 1.3; }
  .card-3 .tag-row { display: flex; gap: 6px; margin-top: 10px; }
  .card-3 .tag-row .pill {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(124,58,237,0.12); color: #7C3AED; font-weight: 500;
  }
  .card-3 .dots-indicator { display: flex; gap: 4px; margin-top: 10px; }
  .card-3 .dots-indicator .dot { width: 5px; height: 5px; border-radius: 50%; background: #C4B5FD; }
  .card-3 .dots-indicator .dot.active { width: 14px; border-radius: 3px; background: #7C3AED; }
  .card-3 .arrow { color: #7C3AED; flex-shrink: 0; margin-left: 8px; position: relative; z-index: 2; }
  .card-3 .arrow svg { width: 20px; height: 20px; }

  /* Card 4 - Image: 道路交通 */
  .card-4 {
    background: linear-gradient(135deg, #0F2A52 0%, #0D4F6B 50%, #0E6B5E 100%);
    height: 96px; display: flex; flex-direction: column; justify-content: center; padding: 0 18px;
  }
  .card-4 .subtitle-top { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 1px; position: relative; z-index: 2; }
  .card-4 .subtitle-main { font-size: 26px; font-weight: 800; color: #fff; margin-top: 2px; letter-spacing: 4px; position: relative; z-index: 2; }
  .card-4 .arrow { position: absolute; top: 16px; right: 16px; color: rgba(255,255,255,0.35); z-index: 2; }
  .card-4 .arrow svg { width: 20px; height: 20px; }
  .card-4 .deco-circle { position: absolute; bottom: -15px; right: 10px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.04); pointer-events: none; }
  .card-4 .deco-circle-2 { position: absolute; top: -20px; left: 40%; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.03); pointer-events: none; }

  /* Card 5 - Pink: 藏蓝她声 */
  .card-5 {
    background: linear-gradient(135deg, #FDF2F8, #FCE7F3);
    height: 96px; display: flex; align-items: center; padding: 0 16px;
  }
  .card-5 .card-text h3 { font-size: 24px; font-weight: 800; color: #9D174D; letter-spacing: 3px; position: relative; z-index: 2; }
  .card-5 .wave-bars { display: flex; align-items: flex-end; gap: 3px; margin-left: 16px; height: 28px; position: relative; z-index: 2; }
  .card-5 .wave-bars .bar { width: 3px; border-radius: 2px; background: #EC4899; }
  .card-5 .circle-1 { position: absolute; top: -12px; right: 50px; width: 50px; height: 50px; border-radius: 50%; background: rgba(236,72,153,0.07); pointer-events: none; }
  .card-5 .circle-2 { position: absolute; bottom: -16px; left: 40px; width: 40px; height: 40px; border-radius: 50%; background: rgba(236,72,153,0.05); pointer-events: none; }
  .card-5 .arrow { margin-left: auto; color: #EC4899; position: relative; z-index: 2; }
  .card-5 .arrow svg { width: 20px; height: 20px; }

  /* ===== Confirm Dialog ===== */
  .confirm-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .confirm-overlay.show { opacity: 1; }
  .confirm-box {
    width: 280px; background: #fff; border-radius: 14px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .confirm-body { padding: 24px 20px 16px; text-align: center; }
  .confirm-body h3 { font-size: 17px; font-weight: 700; color: #1A1A2E; margin-bottom: 8px; }
  .confirm-body p { font-size: 14px; color: #6B7280; line-height: 1.5; }
  .confirm-actions { display: flex; border-top: 1px solid #E5E7EB; }
  .confirm-actions button {
    flex: 1; padding: 14px 0; border: none; background: none;
    font-size: 16px; font-weight: 500; font-family: inherit; cursor: pointer;
  }
  .confirm-actions button:active { background: #F3F4F6; }
  .confirm-cancel { color: #6B7280; }
  .confirm-ok { color: #EF4444; font-weight: 600; border-left: 1px solid #E5E7EB; }

  /* ===== Load More ===== */
  .load-more-btn {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    margin: 8px auto 10px; padding: 8px 20px; height: auto;
    border: none; border-radius: 20px;
    background: none; color: #6B7280;
    font-size: 13px; font-weight: 400; font-family: inherit;
    cursor: pointer; transition: color 0.2s;
  }
  .load-more-btn:active { color: #1E4FCC; }
  .load-more-btn svg { width: 12px; height: 12px; }
  .load-more-btn.hidden { display: none; }

  /* ===== Footer ===== */
  .footer { text-align: center; padding: 28px 16px 40px; font-size: 14px; color: #6B7280; letter-spacing: 1px; }

  .page-content { padding-bottom: 20px; }

  @media (prefers-reduced-motion: reduce) {
    .article-card, .recommend-card { transition: none; }
    html { scroll-behavior: auto; }
  }
</style>
</head>

    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">取消</button>
      <button class="confirm-ok" onclick="doDelete()">删除</button>
    </div>
  </div>
</div>

<script>
var pendingDeleteEl = null;
var confirmOverlay = document.getElementById('confirmOverlay');

function closeConfirm() { confirmOverlay.classList.remove('show'); pendingDeleteEl = null; }
function doDelete() {
  if (pendingDeleteEl) {
    pendingDeleteEl.style.transition = 'opacity 0.3s, max-height 0.3s, margin 0.3s, padding 0.3s';
    pendingDeleteEl.style.opacity = '0';
    pendingDeleteEl.style.maxHeight = '0';
    pendingDeleteEl.style.marginBottom = '0';
    pendingDeleteEl.style.overflow = 'hidden';
    setTimeout(function() { pendingDeleteEl.remove(); pendingDeleteEl = null; }, 300);
  }
  confirmOverlay.classList.remove('show');
}
confirmOverlay.addEventListener('click', function(e) { if (e.target === confirmOverlay) closeConfirm(); });

(function() {
  var articles = [
    { title: "台州三门'三大警务'奏响蓝色海洋交响曲，护航海洋经济高质量发展", source: "人民网", date: "2026/1/4 10:34:19" },
    { title: "浙江海洋伏季休渔期5月1日全面启动，千艘渔船有序回港休整", source: "人民日报", date: "2026/1/4 10:34:19" },
    { title: "警蓝护碧海，智治守生态！浙江省公安海防'蓝盾'护航海洋生态综述", source: "人民日报", date: "2026/1/4 10:34:19" },
    { title: "东海'大开渔'看联合执法如何护航渔民出海，筑牢海上安全防线", source: "人民日报", date: "2026/1/4 10:34:19" },
    { title: "浙江公安多措并举探索特色公安海防管理路径，构建现代化治理体系", source: "人民日报", date: "2026/1/4 10:34:19" },
    { title: "近千公里海岸线走私难逾越，浙江象山公安筑牢反走私'海上长城'", source: "法治日报", date: "2026/1/4 10:34:19" },
    { title: "浙江岱山公安创新警务护航大宗商品物流动脉畅通，人车船动态一链追踪", source: "法治日报", date: "2026/1/4 10:34:19" },
    { title: "浙江温岭公安'智慧海防+群防群治'反走私新体系显成效，打造治理样板", source: "民主与法制网", date: "2026/1/4 10:34:19" },
    { title: "筑牢海洋生态屏障绘就千岛平安画卷，舟山构建'大海防'格局助力海洋经济", source: "人民公安报", date: "2026/1/4 10:34:19" },
    { title: "创新'潮汐警务'保护'蓝色粮仓'，织密禁渔网络使海洋生物休养生息", source: "人民公安报", date: "2026/1/4 10:34:19" }
  ];
  var gradients = [
    ['#0D2B6B','#1E4FCC'], ['#1E4FCC','#4B7BF5'], ['#0A1F52','#2563EB'],
    ['#0D2B6B','#2E5FD4'], ['#142D6B','#3B6FE0'], ['#172554','#1E4FCC'],
    ['#0C2D6B','#2558D4'], ['#132D60','#2D5BD6'], ['#0F244D','#1E4FCC'],
    ['#0D2254','#1A44B8']
  ];
  var PAGE_SIZE = 5;
  var loaded = 0;
  var listEl = document.getElementById('articleList');
  var loadMoreBtn = document.getElementById('loadMoreBtn');

  function renderCard(i) {
    var a = articles[i], g = gradients[i];
    return '<div class="article-swipe"><div class="article-delete-zone">删除</div><div class="article-swipe-inner" data-idx="' + i + '"><div class="article-card"><div class="article-thumb"><div class="gradient-bg" style="background:linear-gradient(135deg,' + g[0] + ',' + g[1] + ')"></div><div class="badge">' + (i+1) + '</div></div><div class="article-info"><div class="article-title">' + a.title + '</div><div class="article-meta">' + a.source + ' · ' + a.date + '</div></div></div></div></div>';
  }

  function loadMore() {
    var end = Math.min(loaded + PAGE_SIZE, articles.length);
    var html = '';
    for (var i = loaded; i < end; i++) { html += renderCard(i); }
    listEl.insertAdjacentHTML('beforeend', html);
    loaded = end;
    if (loaded >= articles.length) { loadMoreBtn.classList.add('hidden'); }
    bindSwipe();
  }

  // Swipe logic
  var currentSwiped = null;
  var swipeTarget = null;
  var startX = 0, startY = 0, dragging = false;

  function resetSwipe() {
    if (currentSwiped) { currentSwiped.classList.remove('swiped'); currentSwiped = null; }
  }

  function bindSwipe() {
    var items = listEl.querySelectorAll('.article-swipe-inner');
    for (var i = 0; i < items.length; i++) {
      var el = items[i];
      if (el.dataset.bound) continue; // Avoid duplicate bindings
      el.dataset.bound = '1';
      // Touch events
      el.addEventListener('touchstart', onTouchStart, { passive: true });
      el.addEventListener('touchmove', onTouchMove, { passive: false });
      el.addEventListener('touchend', onTouchEnd);
      // Mouse events for desktop
      el.addEventListener('mousedown', onMouseDown);
      var delZone = el.parentElement.querySelector('.article-delete-zone');
      if (delZone) {
        delZone.dataset.bound = '1';
        delZone.addEventListener('click', onDeleteClick);
      }
    }
  }

  function onTouchStart(e) {
    var el = e.currentTarget;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging = true;
    swipeTarget = el;
    if (currentSwiped && currentSwiped !== el) resetSwipe();
  }

  function onTouchMove(e) {
    if (!dragging || !swipeTarget) return;
    var dx = e.touches[0].clientX - startX;
    var dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && dx < -20) {
      e.preventDefault();
      resetSwipe();
      swipeTarget.classList.add('swiped');
      currentSwiped = swipeTarget;
    } else if (dx > 20) {
      swipeTarget.classList.remove('swiped');
      if (currentSwiped === swipeTarget) currentSwiped = null;
    }
  }

  function onTouchEnd() { dragging = false; swipeTarget = null; }

  // Mouse events for desktop
  function onMouseDown(e) {
    if (e.button !== 0) return;
    var el = e.currentTarget;
    startX = e.clientX;
    startY = e.clientY;
    dragging = true;
    swipeTarget = el;
    if (currentSwiped && currentSwiped !== el) resetSwipe();
    e.preventDefault(); // Prevent text selection during drag
    function onMM(e2) {
      if (!dragging || !swipeTarget) return;
      var dx = e2.clientX - startX;
      var dy = e2.clientY - startY;
      if (Math.abs(dx) > Math.abs(dy) && dx < -20) {
        resetSwipe();
        swipeTarget.classList.add('swiped');
        currentSwiped = swipeTarget;
      } else if (dx > 20) {
        swipeTarget.classList.remove('swiped');
        if (currentSwiped === swipeTarget) currentSwiped = null;
      }
    }
    function onMU() {
      dragging = false;
      swipeTarget = null;
      document.removeEventListener('mousemove', onMM);
      document.removeEventListener('mouseup', onMU);
    }
    document.addEventListener('mousemove', onMM);
    document.addEventListener('mouseup', onMU);
  }

  function onDeleteClick(e) {
    var swipe = e.target.closest('.article-swipe');
    pendingDeleteEl = swipe;
    confirmOverlay.classList.add('show');
  }

  // Tap outside to reset
  document.addEventListener('touchstart', function(e) {
    if (currentSwiped && !e.target.closest('.article-swipe')) resetSwipe();
  }, { passive: true });

  loadMore();
  loadMoreBtn.addEventListener('click', loadMore);

  var waveEl = document.getElementById('waveBars');
  var heights = [8,16,10,22,12,28,14,6,18,10,24,8,20,12,16,6,14,10,22,8];
  var wh = '';
  for (var j = 0; j < heights.length; j++) {
    wh += '<div class="bar" style="height:' + heights[j] + 'px;opacity:' + (0.2+Math.random()*0.45).toFixed(2) + '"></div>';
  }
  waveEl.innerHTML = wh;
})();

// Notify parent iframe about navigation (for tab sync)
window.addEventListener('load', function() {
  try { window.parent.postMessage({ type: 'navigate', page: location.pathname.split('/').pop() }, '*'); } catch(ex) {}
});
</script>
</body>
</html>

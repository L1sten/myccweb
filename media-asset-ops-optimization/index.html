<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能媒资系统运营优化</title>
  <script src="../auth.js"></script>
  <style>
    :root {
      --brand: #2f66f4;
      --brand-strong: #1f52d9;
      --ink: #182033;
      --muted: #727d91;
      --line: #e6ebf3;
      --soft: #f4f7fb;
      --panel: #ffffff;
      --green: #29a852;
      --orange: #e79422;
      --red: #e34848;
      --shadow: 0 12px 30px rgba(37, 63, 103, .12);
      --sidebar: #f7f9fc;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 1180px;
      color: var(--ink);
      background: #edf3f9;
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .46; }

    .app-split { display: flex; height: 100vh; overflow: hidden; }
    .page-container { flex: 1; min-width: 0; position: relative; overflow: hidden; background: #edf3f9; }
    .prd-panel {
      width: 460px;
      flex-shrink: 0;
      display: flex;
      border-left: 1px solid var(--line);
      background: #fff;
      transition: width .2s ease, opacity .2s ease;
    }
    .prd-panel.collapsed { width: 0; opacity: 0; overflow: hidden; border-left: 0; }
    .split-drag {
      width: 4px;
      cursor: col-resize;
      flex-shrink: 0;
      background: #dde5f0;
      position: relative;
      z-index: 20;
    }
    .split-drag:hover { background: var(--brand); }
    .prd-toc {
      width: 178px;
      flex-shrink: 0;
      border-right: 1px solid var(--line);
      background: #fafcff;
      overflow-y: auto;
      padding: 14px 10px;
    }
    .prd-toc-title { font-size: 13px; font-weight: 900; color: #1f2937; margin: 0 0 10px 4px; }
    .prd-toc button {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      color: #667085;
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 8px;
    }
    .prd-toc button:hover { color: var(--brand); background: #eef4ff; }
    .prd-toc .toc-h2 { padding-left: 16px; }
    .prd-toc .toc-h3 { padding-left: 26px; font-size: 11px; }
    .prd-content {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 18px 22px 40px;
      color: #303848;
    }
    .prd-content h1 { font-size: 22px !important; margin: 0 0 14px !important; color: #172033 !important; }
    .prd-content h2 { font-size: 17px !important; margin: 22px 0 10px !important; color: #245ff0 !important; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
    .prd-content h3 { font-size: 15px !important; margin: 18px 0 8px !important; color: #1f2937 !important; }
    .prd-content h4, .prd-content h5 { font-size: 14px !important; margin: 14px 0 6px !important; color: #1f2937 !important; }
    .prd-content p { font-size: 13px !important; line-height: 1.75 !important; margin: 8px 0 !important; color: #4b5563 !important; }
    .prd-content ul.prd-list { margin: 8px 0 8px 20px !important; padding-left: 0 !important; }
    .prd-content ul.prd-list > li { margin: 6px 0 !important; list-style: disc !important; font-size: 13px !important; line-height: 1.7 !important; }
    .prd-content ul.prd-nested { margin: 2px 0 2px 18px !important; padding-left: 0 !important; list-style: circle !important; }
    .prd-content ul.prd-nested li { list-style: circle !important; font-size: 12px !important; color: #555 !important; line-height: 1.65 !important; }
    .prd-content hr { border: none !important; border-top: 1px solid var(--line) !important; margin: 16px 0 !important; }
    .prd-content table.prd-table{width:100% !important;border-collapse:collapse !important;margin:12px 0 !important;font-size:13px !important}
    .prd-content table.prd-table th{background:#f8f9fa !important;padding:8px 12px !important;text-align:left !important;border:1px solid var(--line) !important;font-weight:700 !important;color:#1f2937 !important;font-size:12px !important}
    .prd-content table.prd-table td{padding:8px 12px !important;border:1px solid var(--line) !important;color:#444 !important;font-size:13px !important;line-height:1.6 !important}
    .top-controls {
      position: fixed;
      top: auto;
      bottom: 18px;
      right: 14px;
      z-index: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .prd-toggle, .changelog-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 12px;
      color: #4b5563;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      white-space: nowrap;
    }
    .prd-toggle:hover, .changelog-btn:hover { border-color: #9cb7ff; color: var(--brand); }
    .toggle-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .prd-toggle.off .toggle-dot { background: #a9b2c0; }
    .changelog-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 500; }
    .changelog-overlay.show { display: block; }
    .changelog-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      width: 560px;
      max-height: 70vh;
      background: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      z-index: 501;
      overflow: hidden;
    }
    .changelog-modal.show { display: flex; flex-direction: column; }
    .changelog-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--line); }
    .changelog-header h3 { font-size: 15px; font-weight: 800; margin: 0; }
    .changelog-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; padding: 0 4px; line-height: 1; }
    .changelog-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .changelog-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .changelog-table th { text-align: left; padding: 8px 12px; background: #f8f9fa; color: #667085; font-weight: 700; border-bottom: 1px solid var(--line); }
    .changelog-table td { padding: 8px 12px; border-bottom: 1px solid var(--line); vertical-align: top; line-height: 1.6; }
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: linear-gradient(180deg, #d9ecff 0%, #eaf5ff 100%);
      border-bottom: 1px solid #cfe0f3;
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 20px; min-width: 310px; }
    .brand-mark {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      color: var(--brand);
    }
    .system-label { color: #646e80; font-weight: 700; margin-left: 6px; font-size: 16px; }
    .front-nav { flex: 1; display: flex; align-items: center; justify-content: center; gap: 36px; height: 100%; }
    .front-nav-item {
      height: 100%;
      border: 0;
      background: transparent;
      color: #111827;
      font-size: 16px;
      font-weight: 900;
      position: relative;
      padding: 0 2px;
    }
    .front-nav-item.active { color: var(--brand); }
    .front-nav-item.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 30px;
      height: 4px;
      background: var(--brand);
      transform: translateX(-50%);
    }
    .top-actions { display: flex; align-items: center; gap: 16px; }
    .tenant { display: flex; align-items: center; gap: 6px; color: #333b4d; font-weight: 600; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: #d2d6dd; display: grid; place-items: center; color: #fff; }
    .top-upload { border-radius: 18px; min-height: 34px; padding: 0 18px; }
    .user-entry { position: relative; }
    .user-trigger {
      height: 40px;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1f2937;
      font-weight: 800;
    }
    .user-menu {
      position: absolute;
      top: 48px;
      right: 0;
      width: 156px;
      background: #fff;
      border: 1px solid #e6ebf3;
      box-shadow: 0 12px 30px rgba(37, 63, 103, .16);
      display: none;
      padding: 8px 0;
      z-index: 120;
    }
    .user-menu.open { display: block; }
    .user-menu::before {
      content: "";
      position: absolute;
      top: -8px;
      right: 42px;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 8px solid #fff;
    }
    .user-menu-item {
      width: 100%;
      height: 38px;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      color: #1f2937;
      font-weight: 800;
      text-align: left;
    }
    .user-menu-item:hover { background: #f4f7fb; color: var(--brand); }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: #33405a;
      display: grid;
      place-items: center;
      position: relative;
    }
    .main { flex: 1; display: flex; }
    .frontend-mode .main { display: block; }
    .frontend-mode .sidebar { display: none; }
    .frontend-mode .workspace { padding: 0 12px 36px; overflow: visible; }
    .frontend-mode #assetsView .page-head,
    .frontend-mode #assetsView .divider { display: none; }
    .frontend-mode #assetsView { padding-top: 38px; }
    .frontend-mode #usersView { display: none !important; }
    .frontend-mode #menuFrontend { display: none; }
    .system-mode .front-nav,
    .system-mode .top-upload,
    .system-mode #menuSystem,
    .system-mode #navAssets { display: none; }
    .system-mode .topbar { background: rgba(255, 255, 255, .96); border-bottom-color: var(--line); }
    .system-mode .brand { min-width: 380px; }
    .sidebar {
      width: 224px;
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      padding: 18px 0;
    }
    .side-item, .side-group {
      width: 100%;
      height: 48px;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      color: #283247;
      font-weight: 700;
      text-align: left;
    }
    .side-item.active {
      color: #fff;
      background: linear-gradient(90deg, #285ef3, #3e73ff);
      box-shadow: 0 12px 24px rgba(47, 102, 244, .22);
    }
    .side-sub {
      padding: 8px 0 12px 48px;
      color: #667085;
      font-size: 13px;
      line-height: 28px;
    }

    .workspace {
      flex: 1;
      padding: 22px 24px 36px;
      overflow: hidden;
    }
    .view { display: none; }
    .view.active { display: block; }

    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .page-title {
      font-size: 20px;
      font-weight: 800;
      color: #245ff0;
      padding-bottom: 8px;
      border-bottom: 4px solid #2f66f4;
    }
    .head-actions { display: flex; align-items: center; gap: 12px; }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #283247;
      min-height: 38px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
    }
    .btn.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    .btn.ghost { background: #eef3fb; border-color: #eef3fb; }
    .btn.text { border: 0; background: transparent; color: var(--brand); padding: 0 6px; min-height: 28px; }
    .btn.warning { background: #fff7ea; border-color: #f7d89c; color: #a86200; }

    .divider { height: 6px; background: #edf1f6; margin: 0 0 16px; }
    .filter-row {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #fff;
      padding: 10px 12px;
      border: 1px solid var(--line);
      margin-bottom: 12px;
    }
    .filter-left, .filter-right { display: flex; align-items: center; gap: 10px; }
    .field-label { font-weight: 700; color: #273247; }
    .select, .input, .textarea {
      border: 1px solid #cfd8ea;
      background: #fff;
      color: #303b50;
      height: 38px;
      padding: 0 12px;
      min-width: 150px;
      outline: none;
    }
    .input.search { width: 260px; }
    .textarea {
      height: 126px;
      padding: 12px;
      width: 100%;
      resize: vertical;
      line-height: 1.6;
    }
    .textarea-wrap { position: relative; }
    .textarea-wrap .textarea { padding-bottom: 28px; }
    .textarea-count {
      position: absolute;
      right: 10px;
      bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      pointer-events: none;
      background: rgba(255, 255, 255, .9);
      padding-left: 6px;
    }
    .input-count-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 62px;
      gap: 12px;
      align-items: center;
    }
    .input-count-row .input,
    .input-count-row .textarea { min-width: 0; }
    .input-count-row.textarea-row { align-items: end; }
    .field-count { color: #1f2937; font-weight: 500; white-space: nowrap; }
    .compact-select { width: 180px; min-width: 180px; }

    .tab-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr)) 1.2fr;
      background: #eef4ff;
      border: 1px solid #dce6fb;
      margin-bottom: 12px;
    }
    .tab {
      border: 0;
      height: 46px;
      background: linear-gradient(#f8fbff, #edf3ff);
      color: #1e293b;
      font-weight: 800;
    }
    .tab.active { color: #fff; background: linear-gradient(135deg, #2d66f6, #5282ff); }
    .recycle { display: flex; align-items: center; padding-left: 18px; color: #64748b; font-weight: 700; }

    .bulkbar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f6f8fb;
      border: 1px solid var(--line);
      padding: 0 14px;
      margin-bottom: 14px;
    }
    .bulk-left, .bulk-actions { display: flex; align-items: center; gap: 12px; }
    .checkbox { width: 16px; height: 16px; accent-color: var(--brand); }
    .blue-text { color: var(--brand); font-weight: 800; }

    .asset-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }
    .asset-card {
      background: #fff;
      border: 1px solid var(--line);
      min-height: 226px;
      position: relative;
      box-shadow: 0 2px 8px rgba(28, 48, 84, .05);
    }
    .asset-card.selected { outline: 2px solid rgba(47, 102, 244, .7); }
    .asset-select { position: absolute; top: 12px; left: 12px; z-index: 3; }
    .asset-more { position: absolute; top: 10px; right: 10px; z-index: 3; width: 30px; height: 30px; border: 0; background: rgba(30, 41, 59, .42); color: #fff; }
    .thumb {
      height: 142px;
      overflow: hidden;
      background: #e9eef6;
      display: grid;
      place-items: center;
      color: #718096;
      position: relative;
      width: 100%;
      padding: 0;
      border: 0;
      cursor: pointer;
    }
    .thumb:hover img { transform: scale(1.02); }
    .thumb img { transition: transform .18s ease; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .play {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(17, 24, 39, .58);
      color: #fff;
      display: grid;
      place-items: center;
      left: calc(50% - 24px);
      top: calc(50% - 24px);
    }
    .file-thumb { font-size: 48px; font-weight: 900; color: #2f66f4; }
    .asset-body { padding: 12px 12px 10px; }
    .asset-title { font-weight: 800; line-height: 1.35; height: 38px; overflow: hidden; }
    button.asset-title { width: 100%; border: 0; background: transparent; padding: 0; text-align: left; color: var(--ink); cursor: pointer; }
    button.asset-title:hover { color: var(--brand); }
    .asset-meta { margin-top: 10px; display: flex; align-items: center; justify-content: space-between; color: #8a94a6; font-weight: 700; font-size: 12px; }
    .tag { padding: 2px 7px; font-size: 12px; background: #fff2e2; color: #c26c0a; }
    .card-actions {
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--line);
      padding: 10px 12px;
    }
    .card-actions .btn { flex: 1; min-height: 32px; padding: 0 10px; font-size: 13px; }

    .pager { display: flex; justify-content: space-between; align-items: center; color: #49566f; font-weight: 700; }
    .page-controls { display: flex; gap: 8px; align-items: center; }
    .page-num { width: 34px; height: 34px; border: 0; background: var(--brand); color: #fff; font-weight: 800; }

    .table-wrap {
      background: #fff;
      border: 1px solid var(--line);
      overflow: auto;
      max-height: calc(100vh - 220px);
    }
    table { width: 100%; border-collapse: collapse; min-width: 1280px; }
    th, td { height: 52px; border-bottom: 1px solid var(--line); padding: 0 12px; text-align: left; white-space: nowrap; }
    th { background: #f6f8fb; color: #1f2937; font-weight: 800; }
    td { color: #263246; }
    .status { font-weight: 800; }
    .status.ok { color: var(--green); }
    .status.off { color: var(--orange); }
    .link { color: var(--brand); font-weight: 800; border: 0; background: transparent; padding: 0; }

    .stats-tabs {
      display: flex;
      align-items: flex-end;
      height: 58px;
      padding: 0 10px;
      background: linear-gradient(180deg, #e2f2ff 0%, #eef7ff 100%);
      border: 1px solid #dce6fb;
      border-bottom: 0;
    }
    .stats-tab {
      width: 154px;
      height: 44px;
      border: 1px solid #dce6fb;
      border-bottom: 0;
      background: linear-gradient(#f9fbff, #eef4ff);
      color: #1f2937;
      font-weight: 900;
      border-radius: 8px 18px 0 0;
      margin-right: -8px;
      box-shadow: inset -1px 0 0 rgba(207, 216, 234, .7);
    }
    .stats-tab.active {
      position: relative;
      z-index: 2;
      color: #fff;
      background: linear-gradient(135deg, #2d66f6, #5282ff);
      border-color: #3c70f4;
      box-shadow: 0 10px 18px rgba(47, 102, 244, .18);
    }
    .stats-tools {
      min-height: 82px;
      padding: 20px 18px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-top: 0;
      background: #fff;
      align-items: flex-start;
    }
    .log-filter-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .custom-date-range { display: none; gap: 6px; align-items: center; color: var(--muted); font-size: 13px; }
    .custom-date-range.show { display: flex; }
    .custom-date-range .input { width: 130px; }
    .log-list { overflow: auto; padding: 8px 18px 18px; flex: 1; }
    .log-item {
      display: grid;
      grid-template-columns: 10px 1fr auto;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      align-items: start;
    }
    .log-title { font-weight: 900; margin-bottom: 4px; }
    .log-meta { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .empty { padding: 36px; text-align: center; color: var(--muted); font-weight: 700; }
    .stats-card { min-height: 620px; }
    .stats-content { padding: 0 18px 18px; background: #fff; border: 1px solid var(--line); border-top: 0; }
    .stats-table { min-width: 980px; }
    .preview-cell { display: flex; align-items: center; gap: 12px; }
    .sync-thumb { width: 58px; height: 38px; object-fit: cover; background: #eef3fb; }
    .format-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 42px; height: 30px; padding: 0 10px; color: var(--brand); background: #eef4ff; border: 1px solid #d6e4ff; border-radius: 4px; font-weight: 800; }
    .record-list { padding-top: 4px; }
    .record-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
      align-items: start;
    }
    .record-title { font-weight: 900; margin-bottom: 6px; }
    .record-meta { color: var(--muted); font-size: 13px; line-height: 1.7; }
    .record-actions { display: flex; align-items: center; gap: 8px; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .52);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(960px, 96vw);
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      box-shadow: var(--shadow);
      border: 1px solid #d8e0ef;
    }
    .modal.small { width: 620px; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--line); }

    .close { border: 0; background: transparent; color: #8a94a6; font-size: 24px; line-height: 1; }

    .preview-layout {
      display: grid;
      grid-template-columns: 1.45fr .9fr;
      gap: 18px;
      min-height: 460px;
    }
    .preview-stage {
      background: #111827;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      min-height: 420px;
    }
    .preview-stage img { width: 100%; height: 100%; object-fit: contain; }
    .preview-file {
      color: #dbeafe;
      font-size: 76px;
      font-weight: 900;
      border: 2px solid rgba(219, 234, 254, .28);
      padding: 42px 52px;
    }
    .nav-arrow {

      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 66px;
      border: 0;
      background: rgba(255,255,255,.16);
      color: #fff;
      font-size: 30px;
    }
    .nav-arrow.left { left: 0; }
    .nav-arrow.right { right: 0; }
    .preview-info { border: 1px solid var(--line); padding: 16px; background: #fbfcff; }
    .info-title { font-size: 18px; font-weight: 900; line-height: 1.4; margin-bottom: 12px; }
    .info-row { display: grid; grid-template-columns: 88px 1fr; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
    .info-row span:first-child { color: var(--muted); font-weight: 700; }
    .info-row span:last-child { font-weight: 700; }

    .asset-detail-view { background: #eef2f7; min-height: calc(100vh - 76px); padding: 12px 0 0; }
    .detail-toolbar {
      height: 64px;
      background: #fff;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .detail-shell {
      display: grid;
      grid-template-columns: minmax(640px, 1fr) 430px;
      gap: 14px;
      min-height: calc(100vh - 164px);
    }
    .detail-canvas, .detail-side {
      background: #fff;
      border: 1px solid var(--line);
    }
    .detail-canvas { padding: 18px; }
    .detail-image-tools {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 18px;
      color: #8c96a8;
      font-weight: 800;
    }
    .detail-stage {
      height: 520px;
      display: grid;
      place-items: center;
      background: #fff;
      overflow: hidden;
    }
    .detail-stage img { max-width: 82%; max-height: 100%; object-fit: contain; }
    .detail-file {
      color: #2f66f4;
      font-size: 88px;
      font-weight: 900;
      background: #eef4ff;
      padding: 72px 110px;
    }
    .detail-file-wrap { display: grid; place-items: center; height: 100%; }
    .detail-metrics {
      height: 58px;
      margin-top: 12px;
      background: #f6f7f9;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: center;
      padding: 0 28px;
      color: #1f2937;
      font-weight: 800;
    }
    .detail-metrics span { color: #4b5563; margin-left: 12px; font-weight: 700; }
    .detail-tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }
    .detail-tab {
      min-height: 48px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: #172033;
      font-weight: 900;
    }
    .detail-tab.active { color: var(--brand); background: #fff; }
    .detail-panel { padding: 22px 20px; }
    .detail-edit { display: flex; justify-content: flex-end; margin-bottom: 8px; }
    .detail-field {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      padding: 12px 0;
      font-size: 14px;
      line-height: 1.7;
    }
    .detail-field strong { color: #1f2937; font-weight: 900; }
    .detail-field span { color: #2d3748; font-weight: 700; }

    .form-grid { display: grid; gap: 16px; }
    .form-row { display: grid; grid-template-columns: 110px 1fr; gap: 12px; align-items: center; }
    .form-row label { font-weight: 800; text-align: right; }
    .required::before { content: "* "; color: var(--red); }
    .helper { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .radio-group { display: flex; align-items: center; gap: 18px; }
    .radio-inline { display: inline-flex; align-items: center; gap: 8px; }
    .radio-inline .input { width: 150px; height: 34px; }
    .user-tabs { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--line); margin-bottom: 22px; }
    .user-tab { height: 46px; border: 0; background: transparent; font-weight: 900; color: #99a1b2; border-bottom: 3px solid transparent; }
    .user-tab.active { color: var(--brand); border-color: var(--brand); }
    .pill-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { background: #eef3fb; color: #43516c; font-weight: 800; padding: 6px 10px; font-size: 12px; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: #1f2937;
      color: #fff;
      padding: 11px 18px;
      font-weight: 800;
      z-index: 150;
      transition: .2s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .prd-float {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      box-shadow: 0 8px 20px rgba(47, 102, 244, .22);
    }
  </style>
</head>

# 智能媒资系统运营优化 PRD

**版本**：v1.1
**日期**：2026-07-03
**适用范围**：智能媒资系统素材中心、资源动态、系统管理用户管理、角色权限分配

---

## 1. 产品概述

### 1.1 背景

智能媒资系统已具备素材上传、检索、下载、共享、详情查看、同步任务、用户管理和权限管理能力。当前素材运营存在三类效率问题：素材批量信息维护能力不足，下载和共享流转记录缺少统一统计入口，临时或试用账号缺少有效期管控。本期围绕素材运营和系统管理场景，补充批量编辑、资源动态、详情连续切换和用户有效期能力。

### 1.2 目标

- 素材支持批量编辑名称、作者、描述和来源类型，减少逐条维护素材信息的操作成本。
- 资源动态统一承载同步任务、下载记录和共享记录，便于管理员追溯系统流转行为。
- 素材详情页支持上一条、下一条连续切换，减少反复返回列表的浏览成本。
- 用户管理支持有效期配置和批量设置，到期后自动停用账号。

### 1.3 用户角色

- 采编人员：上传、检索、查看、下载、共享和维护本人或授权素材。
- 素材管理员：维护素材信息，批量编辑素材字段，追踪下载和共享情况。
- 系统管理员：管理用户状态、用户有效期、部门和角色权限。

### 1.4 使用场景

- 用户选择多条素材后，统一修改素材作者、来源类型，或批量覆盖/追加描述。
- 管理员进入资源动态，按时间范围和素材库查看下载记录或共享记录，并导出 Excel。
- 用户在素材详情页中通过上一条、下一条快速浏览当前列表上下文中的素材。
- 管理员为试用或临时账号设置截止日期，到期后账号不可登录。

### 1.5 本期范围

- 素材中心批量编辑。
- 资源动态：我同步的、我接收的、下载记录、共享记录。
- 素材详情页连续切换。
- 用户有效期配置和批量设置。
- 权限点配置补充。

### 1.6 非本期范围

- 不新增真实接口、数据库表、部署流程或后端技术实现说明。
- 不改变线上已有权限点名称、层级、勾选状态和既有控制范围。
- 不新增“试用账号”独立账号类型。

### 1.7 关键约束

- 线上已有权限点保持不变，本期新增权限点在“权限点配置”模块单独说明。
- 资源动态下载记录和共享记录定位为面向管理者的系统级追溯模块，记录范围不受用户原有素材库数据权限管控，是否可看由资源动态二级权限点控制。
- 批量编辑不改变列表筛选、排序、分页和选中状态。

---

## 2. 全局交互规则

### 2.1 页面入口与导航

- 前台顶部主导航展示：首页、搜索中心、素材中心、审批中心、资源动态、标签中心、全省资源库。
- “资源动态”替代原“同步中心”导航名称。
- 顶部右侧不再展示独立通知入口。
- 头像菜单保留系统管理、业务管理、退出登录；系统管理页可返回前台。

### 2.2 筛选与查询

- 时间范围筛选统一支持近 7 天、近 30 天、近 1 年、自定义、全部。
- 自定义时间需填写开始日期和结束日期；结束日期早于开始日期时不展示结果。
- 素材库筛选支持全部素材库、个人素材库、部门素材库、公共素材库。

### 2.3 分页与排序

- 素材列表维持当前分页和排序。
- 下载记录默认按下载时间倒序。
- 共享记录默认按共享时间倒序。
- 同步任务默认按开始时间倒序。

### 2.4 按钮与操作反馈

- 无选中素材时，批量编辑按钮置灰或点击提示需先选择素材。
- 下载、共享、批量编辑、导出等操作完成后展示轻提示。
- 下载记录和共享记录页签展示“导出”按钮，导出文件格式为 Excel。

### 2.5 空状态与异常状态

- 无素材、无记录、无同步任务时展示空状态。
- 批量编辑未填写任何字段时，提示需至少填写一个要更新的字段。
- 部分素材无权限时，保存结果需展示失败项或失败数量。

### 2.6 权限可见性

- 无对应模块权限时，不展示对应入口或操作按钮。
- 操作按钮仅控制对应功能入口，不改变素材查看、下载、上传、删除、移动、共享等既有权限。

---

## 3. 资源动态

### 3.1 模块目标与边界

- 资源动态承接原同步中心任务列表能力，并新增下载记录、共享记录统计能力。
- 资源动态包含四个页签：我同步的、我接收的、下载记录、共享记录。
- 下载记录和共享记录用于管理者查看系统级素材流转情况，不展示已读/未读状态，不展示红点，不提供全部已读。

### 3.2 页面结构

- 页签区：我同步的、我接收的、下载记录、共享记录。
- 筛选区：
  - 我同步的 / 我接收的：同步状态、文件类型、时间范围。
  - 下载记录 / 共享记录：时间范围、素材库、导出按钮。
- 内容区：
  - 同步任务使用列表或表格展示。
  - 下载记录和共享记录使用记录列表展示。

### 3.3 字段规则

我同步的 / 我接收的：

- 文件预览。
- 素材名称。
- 文件大小。
- 文件格式。
- 开始时间。
- 结束时间。
- 目标渠道。
- 状态。

下载记录：

- 下载时间。
- 素材名称。
- 素材库。
- 下载人。

共享记录：

- 共享时间。
- 素材名称。
- 来源素材库。
- 共享人。
- 目标素材库。

### 3.4 筛选规则

- 时间范围筛选作用于当前页签。
- 下载记录和共享记录支持素材库筛选。
- 切换页签后保留当前页签的默认筛选条件。
- 自定义时间按记录发生时间过滤。

### 3.5 操作规则

导出：

- 默认状态：仅下载记录和共享记录页签展示；具备当前页签导出权限时可点击。
- 点击反馈：导出当前页签、当前筛选条件下的 Excel 文件。
- 结果变化：不改变页面记录状态。

查看：

- 默认状态：当前记录关联素材可查看时展示。
- 点击反馈：进入对应素材详情页。
- 结果变化：不改变统计记录。

### 3.6 数据规则

- 同步任务沿用原同步中心数据口径。
- 下载记录取系统范围内全部素材下载记录，不受用户原有素材库数据权限管控。
- 共享记录取系统范围内全部素材共享记录，不受用户原有素材库数据权限管控。
- 下载记录和共享记录是否可查看，仅由资源动态对应二级权限点控制。
- 同一素材多次下载或多次共享分别记录，不合并。

### 3.7 验收标准

- 顶部导航显示“资源动态”，不再显示“同步中心”。
- 页面不展示独立通知入口、红点、未读点和全部已读。
- 我同步的、我接收的保留同步任务列表能力。
- 下载记录、共享记录支持时间范围和素材库筛选。
- 下载记录和共享记录页签的导出按钮生成 Excel 文件，内容与当前页签和筛选条件一致。

---

## 4. 批量编辑

### 4.1 模块目标与边界

- 将素材列表批量操作区的“批量备注”升级为“批量编辑”。
- 支持一次性编辑素材名称、素材作者、素材描述、素材来源类型。
- 上传弹窗中的素材描述继续保留，批量编辑用于上传后或列表中统一维护素材信息。

### 4.2 页面结构

- 素材列表批量操作区展示“批量编辑”按钮。
- 批量编辑弹窗包含字段：
  - 素材名称。
  - 素材作者。
  - 素材描述。
  - 描述写入方式：覆盖 / 追加。
  - 素材来源类型：原创 / AI生成 / 其他。
- 弹窗底部包含取消和保存按钮。

### 4.3 字段规则

素材名称：

- 非必填。
- 留空时不更新素材名称。
- 填写后选中素材统一覆盖为同一名称。

素材作者：

- 非必填。
- 留空时不更新素材作者。
- 填写后选中素材统一覆盖为同一作者。

素材描述：

- 非必填。
- 留空时不更新素材描述。
- 填写后按写入方式保存。

描述写入方式：

- 默认选择覆盖。
- 覆盖：用本次填写内容替换原描述。
- 追加：原描述为空时直接写入；原描述不为空时在原描述后追加本次内容。

素材来源类型：

- 非必填。
- 可选原创、AI生成、其他。
- 不选择时不更新来源类型。

### 4.4 操作规则

- 未选择素材时不可打开批量编辑，或提示需先选择素材。
- 未填写任何字段时不可保存。
- 保存成功后刷新素材列表和详情页中的字段展示。
- 批量编辑不改变列表筛选、排序、分页和选中状态。
- 混合选择不同素材库素材时，仅对具备对应素材库批量编辑权限且具备编辑权限的素材生效。

### 4.5 数据规则

- 未填写字段不更新原值。
- 素材名称、素材作者、素材来源类型按统一值覆盖。
- 素材描述按覆盖或追加规则写入。
- 批量编辑保存结果需能区分成功项和失败项。

### 4.6 验收标准

- 选择多条素材后可打开批量编辑弹窗。
- 填写名称、作者、来源类型后，选中素材统一更新。
- 描述选择覆盖时替换原描述。
- 描述选择追加时保留原描述并追加新内容。
- 未填写字段不改变原值。
- 无选中素材时不可执行批量编辑。

---

## 5. 素材详情连续切换

### 5.1 模块目标与边界

- 用户无需返回列表即可在素材详情页连续查看当前列表上下文中的素材。
- 不再在素材列表新增快速预览按钮。

### 5.2 页面结构

- 素材详情页采用页面式布局，不使用弹窗。
- 顶部操作区展示返回列表、上一条、下一条、下载、共享、以图搜图、图搜视频。
- 主区域展示素材预览、基础信息和详情页签。

### 5.3 操作规则

上一条 / 下一条：

- 切换范围取当前列表上下文。
- 首条素材的上一条置灰。
- 末条素材的下一条置灰。
- 不跨库、不跨文件夹、不循环。

返回列表：

- 返回当前素材列表。
- 保留列表筛选、排序、分页和选中状态。

下载：

- 点击后触发下载动作，并写入资源动态下载记录。

共享：

- 点击后触发共享动作，并写入资源动态共享记录。

### 5.4 验收标准

- 点击素材卡片缩略图、标题或更多操作可进入详情页。
- 详情页可按当前列表上下文上一条、下一条切换。
- 首尾切换按钮状态正确。
- 详情页下载和共享后，资源动态对应页签新增记录。

## 6. 用户有效期管理

### 6.1 模块目标与边界

- 系统管理 > 用户管理新增用户有效期能力，用于限制试用或临时账号。
- 用户有效期覆盖所有用户，不新增“试用账号”类型。

### 6.2 页面结构

- 用户列表新增“用户有效期”列，放在“当前状态”和“所属部门”之间。
- 新建/编辑用户弹窗在“用户信息”页签新增用户有效期字段。
- 用户管理批量操作区新增“设置有效期”按钮。

### 6.3 字段规则

用户有效期：

- 支持长期有效。
- 支持指定截止日期。
- 默认长期有效。
- 指定截止日期精度为日期。
- 截止日期当天 23:59:59 前可用，次日 00:00 起自动停用。

当前状态：

- 已开通：用户未被人工停用，且未超过有效期。
- 已停用：用户被人工停用，或有效期已到期。
- 已到期作为停用原因展示，不新增独立状态筛选项。

### 6.4 操作规则

新建 / 编辑用户：

- 正式账号可设置为长期有效。
- 临时账号可设置指定截止日期。
- 修改有效期不自动启用已停用用户。

批量设置有效期：

- 至少选择一个用户后可操作。
- 支持长期有效或指定截止日期。
- 保存后统一更新已选用户有效期。
- 已停用或已到期用户不会因修改有效期自动启用。

启用用户：

- 启用已到期用户时，若有效期仍早于当前日期，提示需先延长有效期。
- 已到期用户需先延长期限，再点击启用用户恢复。

登录拦截：

- 到期用户不可登录。
- 提示文案为“账号已到期，请联系管理员”。

### 6.5 验收标准

- 新建长期有效用户，列表展示长期有效，状态为已开通。
- 新建未来截止日期用户，到期前可正常登录。
- 到期次日 00:00 后，用户状态自动变为已停用。
- 到期用户登录被拦截并展示账号到期提示。
- 已到期用户延长期限后仍保持停用，点击启用后恢复已开通。
- 人工停用用户即使有效期未过，也不可登录。
- 可批量设置多个用户的有效期。

### 7.1 模块目标与边界

- 在系统管理的角色权限分配中，为本期新增能力补充权限点。
- 线上已有权限点保持不变，不调整既有权限点名称、层级、勾选状态和控制范围。
- 同步中心原有权限点改名为资源动态。
- 用户有效期配置和批量设置沿用现有用户管理权限，不新增独立权限点。

### 7.3 权限规则

资源动态：

- 有资源动态对应二级权限点时，用户可查看对应页签。
- 无对应二级权限点时，不展示对应页签。
- 下载记录和共享记录为管理者系统级追溯模块，展示系统全部记录，不受用户原有素材库数据权限管控。
- 资源动态权限不改变素材查看、下载、上传、删除、移动、共享等既有操作权限。

批量编辑：

- 有对应素材库批量编辑权限时，用户可对该素材库下有权编辑的素材执行批量编辑。
- 无对应素材库批量编辑权限时，该素材库场景下不展示批量编辑入口，或在混合选择时将无权限素材列为失败项。
- 批量编辑权限不改变素材查看、下载、上传、删除、移动、共享等既有权限。
- 当用户同时选择多个素材库的素材时，系统仅对用户具备批量编辑权限且具备编辑权限的素材执行更新。

### 7.4 验收标准

- 角色权限分配中可配置资源动态四个二级权限点。
- 角色权限分配中可在个人素材库、部门素材库、公共素材库下分别配置批量编辑权限点。
- 无资源动态对应页签权限的用户不展示对应页签。
- 无对应素材库批量编辑权限的用户不可对该素材库素材执行批量编辑。
- 新增权限点不影响线上已有权限点和已有角色授权。

    function renderStats() {
      const content = document.getElementById('statsContent');
      const syncFilters = document.getElementById('syncFilterGroup');
      const recordFilters = document.getElementById('recordFilterGroup');
      const exportBtn = document.getElementById('statsExportBtn');
      if (!content || !syncFilters || !recordFilters) return;
      syncFilters.style.display = isRecordStatsTab() ? 'none' : 'flex';
      recordFilters.style.display = isRecordStatsTab() ? 'flex' : 'none';
      if (exportBtn) exportBtn.style.display = isRecordStatsTab() ? 'inline-flex' : 'none';
      document.getElementById('statsCustomRange').classList.toggle('show', isRecordStatsTab() && document.getElementById('statsRange').value === 'custom');

      if (isRecordStatsTab()) {
        const logs = filterStatsLogs();
        if (!logs.length) {
          content.innerHTML = `<div class="empty">当前筛选条件下暂无${statsTab === 'download' ? '下载' : '共享'}记录</div>`;
          return;
        }
        content.innerHTML = `<div class="record-list">${logs.map(log => {
          const actionLine = statsTab === 'download'
            ? `下载时间：${log.time}　下载人：${log.person}`
            : `共享时间：${log.time}　共享人：${log.person}　目标素材库：${log.target}`;
          const sourceLine = statsTab === 'download'
            ? `素材库：${libraryNameFromPath(log.path)}`
            : `来源素材库：${libraryNameFromPath(log.path)}　目标素材库：${log.target}`;
          return `<div class="record-item">
            <div>
              <div class="record-title">${log.title}</div>
              <div class="record-meta">${actionLine}</div>
              <div class="record-meta">${sourceLine}</div>
            </div>
            <div class="record-actions"><button class="btn text" type="button" onclick="openRecordAsset('${log.title}')">查看</button></div>
          </div>`;
        }).join('')}</div>`;
        return;
      }

      const rows = filterSyncRecords();
      if (!rows.length) {
        content.innerHTML = '<div class="empty">当前筛选条件下暂无同步任务</div>';
        return;
      }
      content.innerHTML = `<div class="table-wrap"><table class="stats-table"><thead><tr><th>序号</th><th>文件预览</th><th>素材名称</th><th>文件格式</th><th>传输详情</th><th>目标渠道</th><th>状态</th></tr></thead><tbody>${rows.map((item, index) => `
        <tr>
          <td>${index + 1}</td>
          <td><div class="preview-cell"><img class="sync-thumb" src="${item.img}" alt=""></div></td>
          <td><strong>${item.title}</strong><div class="log-meta">${item.size}</div></td>
          <td><span class="format-pill">${item.format}</span></td>
          <td>开始时间：${item.start}<br>结束时间：${item.end}</td>
          <td>${item.channel}</td>
          <td><span class="status ${item.status === '成功' ? 'ok' : ''}">${item.status}</span></td>
        </tr>`).join('')}</tbody></table></div>`;
    }

    function filterSyncRecords() {
      const status = document.getElementById('syncStatusFilter').value;
      const type = document.getElementById('syncTypeFilter').value;
      return syncRecords.filter(item => {
        const directionOk = item.direction === statsTab;
        const statusOk = status === 'all' || item.status === status;
        const typeOk = type === 'all' || item.format === type;
        return directionOk && statusOk && typeOk;
      });
    }

    function filterStatsLogs() {
      const range = document.getElementById('statsRange').value;
      const library = document.getElementById('statsLibraryFilter').value;
      let logs = currentRecordLogs().filter(log => library === 'all' || libraryNameFromPath(log.path) === library);
      if (range === 'all') return logs;
      if (range === 'custom') {
        const startValue = document.getElementById('statsStartDate').value;
        const endValue = document.getElementById('statsEndDate').value;
        if (!startValue || !endValue) return [];
        const start = new Date(`${startValue}T00:00:00`);
        const end = new Date(`${endValue}T23:59:59`);
        if (end < start) return [];
        return logs.filter(log => {
          const time = new Date(log.time.replace(' ', 'T'));
          return time >= start && time <= end;
        });
      }
      const days = Number(range);
      const threshold = new Date(today);
      threshold.setDate(threshold.getDate() - days);
      return logs.filter(log => new Date(log.time.replace(' ', 'T')) >= threshold);
    }

    function exportStats() {
      if (!isRecordStatsTab()) return;
      const headers = isRecordStatsTab()
        ? (statsTab === 'download' ? ['下载时间', '素材名称', '素材库', '下载人'] : ['共享时间', '素材名称', '来源素材库', '共享人', '目标素材库'])
        : ['任务类型', '素材名称', '文件格式', '大小', '开始时间', '结束时间', '目标渠道', '状态'];
      const rows = isRecordStatsTab()
        ? filterStatsLogs().map(log => statsTab === 'download'
          ? [log.time, log.title, libraryNameFromPath(log.path), log.person]
          : [log.time, log.title, libraryNameFromPath(log.path), log.person, log.target])
        : filterSyncRecords().map(item => [statsTab === 'mine' ? '我同步的' : '我接收的', item.title, item.format, item.size, item.start, item.end, item.channel, item.status]);
      const table = `<table><thead><tr>${headers.map(item => `<th>${item}</th>`).join('')}</tr></thead><tbody>${rows.map(row => `<tr>${row.map(item => `<td>${String(item).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      const blob = new Blob([`\ufeff${table}`], { type: 'application/vnd.ms-excel;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `智能媒资${statsTab === 'download' ? '下载记录' : statsTab === 'share' ? '共享记录' : '同步任务'}.xls`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('已按当前页签和筛选条件导出');
    }

    function inlineFmt(s) {
      return s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    function renderPrdPanel() {
      const md = document.getElementById('prdMdSource').textContent
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&amp;/g, '&');
      const lines = md.split('\n');
      let h = '', toc = '<div class="prd-toc-title">PRD 目录</div>', listStack = [], liOpenStack = [], inTable = false, hid = 0;
      function closeLists(targetDepth) {
        while (listStack.length > targetDepth) {
          if (liOpenStack.pop()) h += '</li>';
          h += '</ul>';
          listStack.pop();
        }
      }
      function closeAllLists() { closeLists(0); }
      function openListItem(depth, text) {
        if (inTable) { h += '</tbody></table>'; inTable = false; }
        while (listStack.length < depth + 1) {
          h += listStack.length === 0 ? '<ul class="prd-list">' : '<ul class="prd-nested prd-level-' + listStack.length + '">';
          listStack.push(true);
          liOpenStack.push(false);
        }
        closeLists(depth + 1);
        if (liOpenStack[depth]) h += '</li>';
        liOpenStack[depth] = true;
        h += '<li>' + inlineFmt(text);
      }
      for (let j = 0; j < lines.length; j++) {
        const ln = lines[j], tr = ln.trim();
        if (!tr) {
          closeAllLists();
          continue;
        }
        if (/^---+$/.test(tr)) {
          closeAllLists();
          h += '<hr>';
          continue;
        }
        const hm = tr.match(/^(#{1,5})\s+(.+)$/);
        if (hm) {
          closeAllLists();
          const level = hm[1].length;
          const id = 'h-' + (++hid);
          h += '<h' + level + ' id="' + id + '">' + inlineFmt(hm[2]) + '</h' + level + '>';
          if (level <= 3) toc += `<button class="toc-h${level}" type="button" onclick="scrollPrdTo('${id}')">${hm[2]}</button>`;
          continue;
        }
        if (/^\|(.+)\|$/.test(tr)) {
          closeAllLists();
          if (!inTable) {
            const nxt = (j + 1 < lines.length) ? lines[j + 1].trim() : '';
            const isSep = /^\|[\s\-:]+\|$/.test(nxt);
            if (isSep) {
              h += '<table class="prd-table"><thead><tr>';
              const hdrCells = tr.replace(/^\|/,'').replace(/\|$/,'').split('|');
              for (let ci = 0; ci < hdrCells.length; ci++) h += '<th>' + inlineFmt(hdrCells[ci].trim()) + '</th>';
              h += '</tr></thead><tbody>';
              inTable = true;
              j++;
              continue;
            }
            h += '<table class="prd-table"><tbody>';
            inTable = true;
          }
          if (/^\|[\s\-:]+\|$/.test(tr)) continue;
          const cells = tr.replace(/^\|/,'').replace(/\|$/,'').split('|');
          h += '<tr>';
          for (let ci = 0; ci < cells.length; ci++) h += '<td>' + inlineFmt(cells[ci].trim()) + '</td>';
          h += '</tr>';
          continue;
        }
        if (inTable) { h += '</tbody></table>'; inTable = false; }
        const lm = ln.match(/^(\s*)- (.+)$/);
        if (lm) {
          openListItem(Math.floor(lm[1].replace(/\t/g, '  ').length / 2), lm[2]);
          continue;
        }
        closeAllLists();
        h += '<p>' + inlineFmt(tr) + '</p>';
      }
      closeAllLists();
      if (inTable) h += '</tbody></table>';
      document.getElementById('prdContent').innerHTML = h;
      document.getElementById('prdToc').innerHTML = toc;
    }

    function scrollPrdTo(id) {
      const node = document.getElementById(id);
      if (node) node.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function togglePrdPanel() {
      const panel = document.getElementById('prdPanel');
      const toggle = document.getElementById('prdToggle');
      const toggleText = document.getElementById('prdToggleText');
      panel.classList.toggle('collapsed');
      toggle.classList.toggle('off', panel.classList.contains('collapsed'));
      toggleText.textContent = panel.classList.contains('collapsed') ? 'PRD 展开' : 'PRD 收起';
    }

    function downloadPrd() {
      const md = document.getElementById('prdMdSource').textContent
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&amp;/g, '&');
      const blob = new Blob([md], { type: 'text/markdown;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '智能媒资系统运营优化PRD.md';
      a.click();
      URL.revokeObjectURL(url);
    }

    function toggleChangelog() {
      document.getElementById('changelogOverlay').classList.toggle('show');
      document.getElementById('changelogModal').classList.toggle('show');
    }

    }

    renderAssets();
    renderUsers();
    renderStats();
    renderPrdPanel();
    renderChangelog();
  </script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能媒资系统运营优化</title>
  <style>
    :root {
      --brand: #2f66f4;
      --brand-strong: #1f52d9;
      --ink: #182033;
      --muted: #727d91;
      --line: #e6ebf3;
      --soft: #f4f7fb;
      --panel: #ffffff;
      --green: #29a852;
      --orange: #e79422;
      --red: #e34848;
      --shadow: 0 12px 30px rgba(37, 63, 103, .12);
      --sidebar: #f7f9fc;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 1180px;
      color: var(--ink);
      background: #edf3f9;
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .46; }

    .app-split { display: flex; height: 100vh; overflow: hidden; }
    .page-container { flex: 1; min-width: 0; position: relative; overflow: hidden; background: #edf3f9; }
    .prd-panel {
      width: 460px;
      flex-shrink: 0;
      display: flex;
      border-left: 1px solid var(--line);
      background: #fff;
      transition: width .2s ease, opacity .2s ease;
    }
    .prd-panel.collapsed { width: 0; opacity: 0; overflow: hidden; border-left: 0; }
    .split-drag {
      width: 4px;
      cursor: col-resize;
      flex-shrink: 0;
      background: #dde5f0;
      position: relative;
      z-index: 20;
    }
    .split-drag:hover { background: var(--brand); }
    .prd-toc {
      width: 178px;
      flex-shrink: 0;
      border-right: 1px solid var(--line);
      background: #fafcff;
      overflow-y: auto;
      padding: 14px 10px;
    }
    .prd-toc-title { font-size: 13px; font-weight: 900; color: #1f2937; margin: 0 0 10px 4px; }
    .prd-toc button {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      color: #667085;
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 8px;
    }
    .prd-toc button:hover { color: var(--brand); background: #eef4ff; }
    .prd-toc .toc-h2 { padding-left: 16px; }
    .prd-toc .toc-h3 { padding-left: 26px; font-size: 11px; }
    .prd-content {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 18px 22px 40px;
      color: #303848;
    }
    .prd-content h1 { font-size: 22px !important; margin: 0 0 14px !important; color: #172033 !important; }
    .prd-content h2 { font-size: 17px !important; margin: 22px 0 10px !important; color: #245ff0 !important; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
    .prd-content h3 { font-size: 15px !important; margin: 18px 0 8px !important; color: #1f2937 !important; }
    .prd-content h4, .prd-content h5 { font-size: 14px !important; margin: 14px 0 6px !important; color: #1f2937 !important; }
    .prd-content p { font-size: 13px !important; line-height: 1.75 !important; margin: 8px 0 !important; color: #4b5563 !important; }
    .prd-content ul.prd-list { margin: 8px 0 8px 20px !important; padding-left: 0 !important; }
    .prd-content ul.prd-list > li { margin: 6px 0 !important; list-style: disc !important; font-size: 13px !important; line-height: 1.7 !important; }
    .prd-content ul.prd-nested { margin: 2px 0 2px 18px !important; padding-left: 0 !important; list-style: circle !important; }
    .prd-content ul.prd-nested li { list-style: circle !important; font-size: 12px !important; color: #555 !important; line-height: 1.65 !important; }
    .prd-content hr { border: none !important; border-top: 1px solid var(--line) !important; margin: 16px 0 !important; }
    .prd-content table.prd-table{width:100% !important;border-collapse:collapse !important;margin:12px 0 !important;font-size:13px !important}
    .prd-content table.prd-table th{background:#f8f9fa !important;padding:8px 12px !important;text-align:left !important;border:1px solid var(--line) !important;font-weight:700 !important;color:#1f2937 !important;font-size:12px !important}
    .prd-content table.prd-table td{padding:8px 12px !important;border:1px solid var(--line) !important;color:#444 !important;font-size:13px !important;line-height:1.6 !important}
    .top-controls {
      position: fixed;
      top: 76px;
      right: 14px;
      z-index: 400;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .prd-toggle, .changelog-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 12px;
      color: #4b5563;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      white-space: nowrap;
    }
    .prd-toggle:hover, .changelog-btn:hover { border-color: #9cb7ff; color: var(--brand); }
    .toggle-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .prd-toggle.off .toggle-dot { background: #a9b2c0; }
    .changelog-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 500; }
    .changelog-overlay.show { display: block; }
    .changelog-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      width: 560px;
      max-height: 70vh;
      background: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      z-index: 501;
      overflow: hidden;
    }
    .changelog-modal.show { display: flex; flex-direction: column; }
    .changelog-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--line); }
    .changelog-header h3 { font-size: 15px; font-weight: 800; margin: 0; }
    .changelog-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; padding: 0 4px; line-height: 1; }
    .changelog-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .changelog-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .changelog-table th { text-align: left; padding: 8px 12px; background: #f8f9fa; color: #667085; font-weight: 700; border-bottom: 1px solid var(--line); }
    .changelog-table td { padding: 8px 12px; border-bottom: 1px solid var(--line); vertical-align: top; line-height: 1.6; }
    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: linear-gradient(180deg, #d9ecff 0%, #eaf5ff 100%);
      border-bottom: 1px solid #cfe0f3;
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 20px; min-width: 310px; }
    .brand-mark {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      color: var(--brand);
    }
    .system-label { color: #646e80; font-weight: 700; margin-left: 6px; font-size: 16px; }
    .front-nav { flex: 1; display: flex; align-items: center; justify-content: center; gap: 36px; height: 100%; }
    .front-nav-item {
      height: 100%;
      border: 0;
      background: transparent;
      color: #111827;
      font-size: 16px;
      font-weight: 900;
      position: relative;
      padding: 0 2px;
    }
    .front-nav-item.active { color: var(--brand); }
    .front-nav-item.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 30px;
      height: 4px;
      background: var(--brand);
      transform: translateX(-50%);
    }
    .top-actions { display: flex; align-items: center; gap: 16px; }
    .tenant { display: flex; align-items: center; gap: 6px; color: #333b4d; font-weight: 600; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: #d2d6dd; display: grid; place-items: center; color: #fff; }
    .top-upload { border-radius: 18px; min-height: 34px; padding: 0 18px; }
    .user-entry { position: relative; }
    .user-trigger {
      height: 40px;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1f2937;
      font-weight: 800;
    }
    .user-menu {
      position: absolute;
      top: 48px;
      right: 0;
      width: 156px;
      background: #fff;
      border: 1px solid #e6ebf3;
      box-shadow: 0 12px 30px rgba(37, 63, 103, .16);
      display: none;
      padding: 8px 0;
      z-index: 120;
    }
    .user-menu.open { display: block; }
    .user-menu::before {
      content: "";
      position: absolute;
      top: -8px;
      right: 42px;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 8px solid #fff;
    }
    .user-menu-item {
      width: 100%;
      height: 38px;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      color: #1f2937;
      font-weight: 800;
      text-align: left;
    }
    .user-menu-item:hover { background: #f4f7fb; color: var(--brand); }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: #33405a;
      display: grid;
      place-items: center;
      position: relative;
    }
    .notice-dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 8px;
      height: 8px;
      background: var(--red);
      border-radius: 50%;
      box-shadow: 0 0 0 2px #fff;
    }

    .main { flex: 1; display: flex; }
    .frontend-mode .main { display: block; }
    .frontend-mode .sidebar { display: none; }
    .frontend-mode .workspace { padding: 0 12px 36px; overflow: visible; }
    .frontend-mode #assetsView .page-head,
    .frontend-mode #assetsView .divider { display: none; }
    .frontend-mode #assetsView { padding-top: 38px; }
    .frontend-mode #usersView { display: none !important; }
    .frontend-mode #menuFrontend { display: none; }
    .system-mode .front-nav,
    .system-mode .top-upload,
    .system-mode #menuSystem,
    .system-mode #navAssets { display: none; }
    .system-mode .topbar { background: rgba(255, 255, 255, .96); border-bottom-color: var(--line); }
    .system-mode .brand { min-width: 380px; }
    .sidebar {
      width: 224px;
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      padding: 18px 0;
    }
    .side-item, .side-group {
      width: 100%;
      height: 48px;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      color: #283247;
      font-weight: 700;
      text-align: left;
    }
    .side-item.active {
      color: #fff;
      background: linear-gradient(90deg, #285ef3, #3e73ff);
      box-shadow: 0 12px 24px rgba(47, 102, 244, .22);
    }
    .side-sub {
      padding: 8px 0 12px 48px;
      color: #667085;
      font-size: 13px;
      line-height: 28px;
    }

    .workspace {
      flex: 1;
      padding: 22px 24px 36px;
      overflow: hidden;
    }
    .view { display: none; }
    .view.active { display: block; }

    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .page-title {
      font-size: 20px;
      font-weight: 800;
      color: #245ff0;
      padding-bottom: 8px;
      border-bottom: 4px solid #2f66f4;
    }
    .head-actions { display: flex; align-items: center; gap: 12px; }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #283247;
      min-height: 38px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
    }
    .btn.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    .btn.ghost { background: #eef3fb; border-color: #eef3fb; }
    .btn.text { border: 0; background: transparent; color: var(--brand); padding: 0 6px; min-height: 28px; }
    .btn.warning { background: #fff7ea; border-color: #f7d89c; color: #a86200; }

    .divider { height: 6px; background: #edf1f6; margin: 0 0 16px; }
    .filter-row {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #fff;
      padding: 10px 12px;
      border: 1px solid var(--line);
      margin-bottom: 12px;
    }
    .filter-left, .filter-right { display: flex; align-items: center; gap: 10px; }
    .field-label { font-weight: 700; color: #273247; }
    .select, .input, .textarea {
      border: 1px solid #cfd8ea;
      background: #fff;
      color: #303b50;
      height: 38px;
      padding: 0 12px;
      min-width: 150px;
      outline: none;
    }
    .input.search { width: 260px; }
    .textarea {
      height: 126px;
      padding: 12px;
      width: 100%;
      resize: vertical;
      line-height: 1.6;
    }

    .tab-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr)) 1.2fr;
      background: #eef4ff;
      border: 1px solid #dce6fb;
      margin-bottom: 12px;
    }
    .tab {
      border: 0;
      height: 46px;
      background: linear-gradient(#f8fbff, #edf3ff);
      color: #1e293b;
      font-weight: 800;
    }
    .tab.active { color: #fff; background: linear-gradient(135deg, #2d66f6, #5282ff); }
    .recycle { display: flex; align-items: center; padding-left: 18px; color: #64748b; font-weight: 700; }

    .bulkbar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f6f8fb;
      border: 1px solid var(--line);
      padding: 0 14px;
      margin-bottom: 14px;
    }
    .bulk-left, .bulk-actions { display: flex; align-items: center; gap: 12px; }
    .checkbox { width: 16px; height: 16px; accent-color: var(--brand); }
    .blue-text { color: var(--brand); font-weight: 800; }

    .asset-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }
    .asset-card {
      background: #fff;
      border: 1px solid var(--line);
      min-height: 262px;
      position: relative;
      box-shadow: 0 2px 8px rgba(28, 48, 84, .05);
    }
    .asset-card.selected { outline: 2px solid rgba(47, 102, 244, .7); }
    .asset-select { position: absolute; top: 12px; left: 12px; z-index: 3; }
    .asset-more { position: absolute; top: 10px; right: 10px; z-index: 3; width: 30px; height: 30px; border: 0; background: rgba(30, 41, 59, .42); color: #fff; }
    .thumb {
      height: 142px;
      overflow: hidden;
      background: #e9eef6;
      display: grid;
      place-items: center;
      color: #718096;
      position: relative;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .play {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(17, 24, 39, .58);
      color: #fff;
      display: grid;
      place-items: center;
      left: calc(50% - 24px);
      top: calc(50% - 24px);
    }
    .file-thumb { font-size: 48px; font-weight: 900; color: #2f66f4; }
    .asset-body { padding: 12px 12px 10px; }
    .asset-title { font-weight: 800; line-height: 1.35; height: 38px; overflow: hidden; }
    .asset-desc { margin-top: 8px; color: var(--muted); font-size: 12px; height: 34px; line-height: 1.45; overflow: hidden; }
    .asset-meta { margin-top: 10px; display: flex; align-items: center; justify-content: space-between; color: #8a94a6; font-weight: 700; font-size: 12px; }
    .tag { padding: 2px 7px; font-size: 12px; background: #fff2e2; color: #c26c0a; }
    .card-actions {
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--line);
      padding: 10px 12px;
    }
    .card-actions .btn { flex: 1; min-height: 32px; padding: 0 10px; font-size: 13px; }

    .pager { display: flex; justify-content: space-between; align-items: center; color: #49566f; font-weight: 700; }
    .page-controls { display: flex; gap: 8px; align-items: center; }
    .page-num { width: 34px; height: 34px; border: 0; background: var(--brand); color: #fff; font-weight: 800; }

    .table-wrap {
      background: #fff;
      border: 1px solid var(--line);
      overflow: auto;
      max-height: calc(100vh - 220px);
    }
    table { width: 100%; border-collapse: collapse; min-width: 1280px; }
    th, td { height: 52px; border-bottom: 1px solid var(--line); padding: 0 12px; text-align: left; white-space: nowrap; }
    th { background: #f6f8fb; color: #1f2937; font-weight: 800; }
    td { color: #263246; }
    .status { font-weight: 800; }
    .status.ok { color: var(--green); }
    .status.off { color: var(--orange); }
    .expired-note { margin-left: 6px; color: var(--red); font-size: 12px; font-weight: 800; }
    .link { color: var(--brand); font-weight: 800; border: 0; background: transparent; padding: 0; }

    .drawer {
      position: fixed;
      right: 18px;
      top: 72px;
      width: 620px;
      max-height: calc(100vh - 92px);
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      z-index: 90;
      display: none;
      flex-direction: column;
    }
    .drawer.open { display: flex; }
    .drawer-head { padding: 18px 18px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); }
    .drawer-title { font-size: 18px; font-weight: 900; }
    .drawer-tools { padding: 12px 18px; display: flex; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--line); }
    .log-list { overflow: auto; padding: 8px 18px 18px; }
    .log-item {
      display: grid;
      grid-template-columns: 10px 1fr auto;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      align-items: start;
    }
    .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); margin-top: 8px; }
    .log-title { font-weight: 900; margin-bottom: 4px; }
    .log-meta { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .empty { padding: 36px; text-align: center; color: var(--muted); font-weight: 700; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .52);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(960px, 96vw);
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      box-shadow: var(--shadow);
      border: 1px solid #d8e0ef;
    }
    .modal.small { width: 620px; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--line); }
    .modal-title { font-size: 18px; font-weight: 900; }
    .modal-body { padding: 22px; }
    .modal-foot { display: flex; justify-content: flex-end; gap: 12px; padding: 16px 22px; border-top: 1px solid var(--line); background: #fbfcfe; }
    .close { border: 0; background: transparent; color: #8a94a6; font-size: 24px; line-height: 1; }

    .preview-layout {
      display: grid;
      grid-template-columns: 1.45fr .9fr;
      gap: 18px;
      min-height: 460px;
    }
    .preview-stage {
      background: #111827;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      min-height: 420px;
    }
    .preview-stage img { width: 100%; height: 100%; object-fit: contain; }
    .preview-file {
      color: #dbeafe;
      font-size: 76px;
      font-weight: 900;
      border: 2px solid rgba(219, 234, 254, .28);
      padding: 42px 52px;
    }
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 66px;
      border: 0;
      background: rgba(255,255,255,.16);
      color: #fff;
      font-size: 30px;
    }
    .nav-arrow.left { left: 0; }
    .nav-arrow.right { right: 0; }
    .preview-info { border: 1px solid var(--line); padding: 16px; background: #fbfcff; }
    .info-title { font-size: 18px; font-weight: 900; line-height: 1.4; margin-bottom: 12px; }
    .info-row { display: grid; grid-template-columns: 88px 1fr; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
    .info-row span:first-child { color: var(--muted); font-weight: 700; }
    .info-row span:last-child { font-weight: 700; }

    .form-grid { display: grid; gap: 16px; }
    .form-row { display: grid; grid-template-columns: 110px 1fr; gap: 12px; align-items: center; }
    .form-row label { font-weight: 800; text-align: right; }
    .required::before { content: "* "; color: var(--red); }
    .helper { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .radio-group { display: flex; align-items: center; gap: 18px; }
    .user-tabs { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--line); margin-bottom: 22px; }
    .user-tab { height: 46px; border: 0; background: transparent; font-weight: 900; color: #99a1b2; border-bottom: 3px solid transparent; }
    .user-tab.active { color: var(--brand); border-color: var(--brand); }
    .pill-list { display: flex; flex-wrap: wrap; gap: 8px; }

  <textarea id="prdMdSource" style="display:none"># 智能媒资系统运营优化 PRD

**版本**：v1.0

**日期**：2026-06-29

**适用范围**：智能媒资系统素材中心、通知中心、系统管理用户管理

---

## 1. 产品概述

### 1.1 背景

智能媒资系统已具备素材上传、检索、下载、详情查看、用户管理和权限管理能力。当前素材下载行为缺少集中追溯入口，批量补充素材描述效率较低，素材查看需要逐条进入详情页，试用或临时账号也缺少到期停用机制。本期面向素材运营和系统管理场景补充通知中心、批量备注、快速预览和用户有效期能力。

### 1.2 目标

- 下载过的素材统一写入通知中心，便于管理员和运营人员追溯下载行为。
- 素材支持批量追加备注，减少逐条编辑素材描述的操作成本。
- 素材列表支持快速预览，用户可在弹窗内连续浏览素材。
- 用户管理支持有效期配置，到期后自动停用账号，便于管理试用或临时账号。

### 1.3 用户角色

- 采编人员：检索、预览、下载、复用素材。
- 素材管理员：维护素材描述、检查素材使用和下载情况。
- 系统管理员：管理用户状态、用户有效期、部门和角色权限。
- 审计或运营人员：查看下载日志并按时间导出。

### 1.4 使用场景

- 用户下载素材后，管理员在通知中心查看下载时间、素材名称、路径位置和下载人。
- 运营人员筛选近 1 年下载日志，并导出 Excel 用于归档。
- 素材管理员选中多条素材后统一追加活动说明或素材描述。
- 采编人员在素材列表点击快速预览，使用左右箭头连续查看素材。
- 系统管理员创建试用账号时设置用户有效期，到期后账号自动停用。

### 1.5 本期范围

- 新增下载通知中心入口、红点提醒、日志查询和 Excel 导出。
- 素材中心新增批量追加备注入口和弹窗。
- 素材卡片新增快速预览入口和连续切换弹窗。
- 用户管理新增用户有效期字段、列表展示、新建/编辑配置和到期停用规则。

### 1.6 非本期范围

- 不新增素材下载审批流程。
- 不改变已有素材分享、移动、删除、同步规则。
- 不新增试用账号独立类型。
- 不改变角色、部门和权限分配的既有业务边界。
- 不新增在线编辑、转码或 AI 识别能力。

### 1.7 关键约束 / 待确认问题

- 原型按全员可见下载日志演示；生产环境中日志可见范围需遵循用户权限和审计要求。
- 用户有效期精度为日期，不精确到小时或分钟。
- 到期停用时间为有效期截止日期次日 00:00。

## 2. 全局交互规则

### 2.1 页面入口与导航

- 前台顶部主导航保留首页、搜索中心、素材中心、审批中心、同步中心、标签中心、全省资源库，不直接展示系统管理入口。
- 系统管理入口展示在右上角用户头像下拉菜单中；进入系统管理后，用户头像下拉菜单展示返回前台入口。
- 通知中心入口展示在顶部右侧用户信息附近。
- 素材中心保留原列表、筛选、上传和批量操作结构。
- 系统管理中保留用户管理、部门管理、角色管理入口，本期仅调整用户管理。

### 2.2 筛选与查询

- 素材中心支持按素材类型、修改时间、关键词筛选。
- 通知中心支持按下载时间筛选，预设近 7 天、近 30 天、近 1 年和自定义时间。
- 用户管理支持按用户状态筛选和关键词搜索，用户状态包含全部、已开通、已停用。
- 多个筛选条件同时使用时取交集。

### 2.3 分页与排序

- 素材列表沿用当前分页与排序规则。
- 下载日志默认按下载时间倒序排列。
- 用户列表默认按注册时间倒序排列。
- 空结果展示空状态，不保留上一轮查询结果。

### 2.4 按钮与操作反馈

- 无权限操作不展示入口；只读权限下展示内容但不展示编辑类按钮。
- 下载、导出、保存备注、保存用户等操作执行中展示进行中状态。
- 批量操作需根据选中数量启用或禁用。
- 高风险操作如停用用户需二次确认。
- 操作失败时展示失败原因，并保留用户已填写内容。

### 2.5 空状态与异常状态

- 通知中心无日志时展示空状态。
- 快速预览素材加载失败时展示占位，不影响切换下一条素材。
- 批量备注存在部分无权限素材时展示失败明细。
- 用户有效期已过但仍尝试启用时提示需先延长有效期。

### 2.6 权限与可见性

- 通知中心入口面向具备日志查看权限的用户展示。
- Excel 导出入口面向具备日志导出权限的用户展示。
- 批量备注入口面向具备素材编辑权限的用户展示。
- 用户有效期配置入口面向具备用户管理权限的管理员展示。

## 3. 下载通知中心

### 3.1 模块目标与边界

- 记录所有下载过的素材，形成可查询、可导出的下载日志。
- 本模块只记录下载行为，不改变下载权限和下载流程。

### 3.2 页面结构

- 顶部通知入口显示铃铛和红点。
- 通知中心弹层或页面包含时间筛选、导出按钮、全部已读按钮和日志列表。
- 日志列表展示下载时间、素材名称、路径位置、下载人、素材类型、来源素材库和阅读状态。

### 3.3 字段规则

下载时间：

- 展示规则：按年月日时分秒展示。
- 交互规则：支持作为时间筛选条件。
- 数据规则：取用户触发下载成功的时间；按下载时间倒序；按筛选时间范围过滤。

素材名称：

- 展示规则：显示素材标题或文件名，超长时省略。
- 交互规则：点击可进入素材详情或快速预览。
- 数据规则：取下载时素材记录中的名称；不涉及排序。

路径位置：

- 展示规则：展示素材所在库和文件夹路径。
- 交互规则：路径为空时显示素材库根目录。
- 数据规则：取下载时素材所在业务路径；不记录用户本机下载路径。

下载人：

- 展示规则：展示下载用户真实姓名。
- 交互规则：不支持在日志列表中编辑。
- 数据规则：取下载行为触发人；不涉及排序。

阅读状态：

- 展示规则：未读日志在通知入口形成红点提示。
- 交互规则：点击日志或全部已读后变为已读。
- 数据规则：按当前用户的阅读状态计算红点；不改变日志原始记录。

### 3.4 筛选规则

- 时间筛选默认近 30 天。
- 近 7 天、近 30 天、近 1 年为快捷筛选。
- 自定义时间需同时选择开始日期和结束日期，结束日期不可早于开始日期。
- 筛选后日志列表即时刷新，导出范围同步更新。

### 3.5 操作规则

下载记录写入：

- 默认状态：用户点击素材下载并下载成功后写入日志。
- 结果变化：新增日志记录，通知入口显示红点。
- 失败处理：下载失败不写入成功下载日志。

全部已读：

- 默认状态：存在未读日志时可点击。
- 点击反馈：标记当前筛选范围内未读日志为已读。
- 结果变化：若无剩余未读日志，红点消失。

Excel 导出：

- 默认状态：具备导出权限时展示。
- 点击反馈：导出当前筛选结果。
- 结果变化：不改变日志阅读状态。

### 3.6 数据规则

- 取数规则：取用户权限范围内可查看的下载日志；原型按全员日志展示。
- 数据筛选规则：按下载时间范围过滤。
- 数据排序规则：默认按下载时间倒序。
- 去重规则：同一素材多次下载分别记录，不合并。

### 3.7 验收标准

- 下载素材后通知中心新增一条下载日志。
- 未读下载日志存在时通知入口显示红点。
- 点击日志或全部已读后阅读状态更新。
- 近 1 年筛选仅展示近 1 年内日志。
- Excel 导出内容与当前筛选结果一致。

## 4. 批量追加备注

### 4.1 模块目标与边界

- 支持对选中的多条素材统一追加备注，提升素材描述补全效率。
- 本模块不覆盖原素材描述，不改变编目模板和审批规则。

### 4.2 页面结构

- 素材列表批量操作区新增批量备注按钮。
- 批量备注弹窗包含已选素材数量、素材清单摘要、备注输入框、取消和保存按钮。

### 4.3 字段规则

备注内容：

- 展示规则：多行文本框，展示字数统计。
- 交互规则：输入为空时不可保存；超出长度限制时提示。
- 数据规则：保存后追加到选中素材的现有描述后；不涉及筛选或排序。

已选素材：

- 展示规则：展示已选数量和前若干条素材名称。
- 交互规则：无选中素材时批量备注按钮禁用或点击提示。
- 数据规则：取当前列表中用户已勾选的素材；不涉及排序。

### 4.4 操作规则

- 默认状态：未选择素材时按钮不可用。
- 启用状态：至少选择一条且具备编辑权限时可点击。
- 保存反馈：保存成功后刷新素材描述摘要，并提示追加成功。
- 部分失败：存在无权限素材时展示成功数量和失败明细。

### 4.5 数据规则

- 取数规则：取当前用户有编辑权限且已选中的素材。
- 数据筛选规则：批量备注不改变列表筛选条件。
- 数据排序规则：批量备注不改变列表排序。
- 写入规则：原描述为空时直接写入备注；原描述不为空时在原描述后追加备注。

### 4.6 验收标准

- 选择多条素材后可打开批量备注弹窗。
- 保存备注后原描述保留，新备注追加在描述后。
- 未选择素材时不可执行批量备注。
- 备注为空或超长时不可保存。

## 5. 素材快速预览

### 5.1 模块目标与边界

- 用户无需进入详情页即可快速查看素材内容，并可在当前列表上下文连续切换。
- 本模块不替代详情页，详情页仍承载完整信息和完整操作。

### 5.2 页面结构

- 素材卡片新增快速预览入口。
- 快速预览弹窗包含素材预览区、素材信息区、左右切换按钮、下载按钮和查看明细按钮。

### 5.3 字段规则

素材预览：

- 展示规则：图片显示大图，视频显示封面和播放态，音频显示播放器，文件显示文件图标和基础信息。
- 交互规则：加载失败展示占位，可继续切换。
- 数据规则：取当前素材可预览内容；不涉及筛选或排序。

左右切换：

- 展示规则：首条素材的上一条置灰，末条素材的下一条置灰。
- 交互规则：点击后在当前列表上下文中切换素材，不循环。
- 数据规则：按进入预览时的列表筛选、排序和文件夹上下文取上一条或下一条。

查看明细：

- 展示规则：弹窗底部展示查看明细按钮。
- 交互规则：点击进入原素材详情页。
- 数据规则：详情页上下切换规则复用当前列表上下文，不跨库、不跨文件夹。

### 5.4 操作规则

- 点击快速预览打开弹窗，不改变列表选中状态。
- 点击下载后触发下载动作，并写入通知中心下载日志。
- 点击关闭回到原列表位置。

### 5.5 数据规则

- 取数规则：取当前用户在列表中可见且有权限查看的素材。
- 数据筛选规则：预览范围与当前列表筛选结果一致。
- 数据排序规则：预览切换顺序与当前列表排序一致。

### 5.6 验收标准

- 点击快速预览打开弹窗，不跳转详情页。
- 左右箭头按当前列表顺序切换素材。
- 首尾箭头置灰且不循环。
- 弹窗内下载素材后通知中心新增日志和红点。
- 点击查看明细进入详情页。

## 6. 用户有效期管理

### 6.1 模块目标与边界

- 在用户管理中新增用户有效期，用于限制试用账号或临时账号的使用周期。
- 本模块不新增账号类型，不改变现有部门、角色和权限分配规则。

### 6.2 页面结构

- 用户列表新增用户有效期列，位于当前状态和所属部门之间。
- 新建用户弹窗的用户信息页签新增用户有效期字段。
- 编辑用户弹窗支持查看和修改用户有效期。

### 6.3 字段规则

用户有效期：

- 展示规则：列表展示长期有效或具体截止日期；编辑弹窗展示长期有效和指定截止日期选择。
- 交互规则：选择指定截止日期时展示日期选择；截止日期不可早于当前日期。
- 数据规则：用于判断用户是否可登录和是否到期停用；不影响用户部门和角色权限。

当前状态：

- 展示规则：已开通展示正常可用状态，已停用展示停用状态；到期停用可附加已到期原因。
- 交互规则：启用已到期用户时，如有效期仍早于当前日期，提示需先延长有效期。
- 数据规则：人工停用和到期停用均归入已停用筛选；已到期不新增独立筛选项。

### 6.4 操作规则

新建用户：

- 默认状态：有效期默认为长期有效。
- 启用状态：管理员可选择指定截止日期。
- 提交反馈：校验通过后新增用户并刷新列表。

编辑用户：

- 默认状态：回填用户当前有效期。
- 保存反馈：修改有效期后刷新列表。
- 结果变化：仅修改有效期不自动启用用户。

启用用户：

- 默认状态：已停用用户可尝试启用。
- 校验规则：若用户已到期且有效期未延长到未来日期，不允许启用。
- 结果变化：有效期有效且无其他停用原因时恢复已开通。

到期停用：

- 生效规则：有效期截止到所选日期 23:59:59。
- 结果变化：次日 00:00 起用户状态变为已停用。
- 登录规则：到期用户不可登录，提示账号已到期，请联系管理员。

### 6.5 数据规则

- 取数规则：用户列表读取用户基础信息、状态、有效期、部门、角色、注册时间和最近登录时间。
- 数据筛选规则：状态筛选中，人工停用和到期停用均归入已停用。
- 数据排序规则：默认按注册时间倒序。
- 时间口径：有效期按自然日计算，截止日当天仍可使用。

### 6.6 验收标准

- 新建用户可设置长期有效或指定截止日期。
- 用户列表展示用户有效期。
- 到期次日零点后用户自动变为已停用。
- 到期用户登录被拦截并展示到期提示。
- 已到期用户需先延长期限，再点击启用恢复。
- 人工停用用户即使有效期未过，也不可登录。

    function renderLogs() {
      const range = document.getElementById('logRange').value;
      const list = document.getElementById('logList');
      const filtered = filterLogsByRange(range);
      if (!filtered.length) {
        list.innerHTML = '<div class="empty">当前时间范围内暂无下载日志</div>';
        return;
      }
      list.innerHTML = filtered.map(log => `<div class="log-item" onclick="readLog(${log.id})">
        <span class="${log.unread ? 'unread-dot' : ''}"></span>
        <div>
          <div class="log-title">${log.title}</div>
          <div class="log-meta">下载时间：${log.time}　下载人：${log.person}　类型：${log.type}</div>
          <div class="log-meta">路径位置：${log.path}　来源素材库：${log.library}</div>
        </div>
        <button class="btn text" type="button">查看</button>
      </div>`).join('');
      updateNoticeDot();
    }

    function filterLogsByRange(range) {
      if (range === 'all') return downloadLogs;
      const days = Number(range);
      const threshold = new Date(today);
      threshold.setDate(threshold.getDate() - days);
      return downloadLogs.filter(log => new Date(log.time.replace(' ', 'T')) >= threshold);
    }

    function readLog(id) {
      const log = downloadLogs.find(item => item.id === id);
      if (log) log.unread = false;
      renderLogs();

    function markAllRead() {
      filterLogsByRange(document.getElementById('logRange').value).forEach(log => log.unread = false);

    function exportLogs() {
      const filtered = filterLogsByRange(document.getElementById('logRange').value);
      const header = '下载时间,素材名称,路径位置,下载人,素材类型,来源素材库\n';
      const body = filtered.map(log => [log.time, log.title, log.path, log.person, log.type, log.library].map(value => `"${String(value).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([header + body], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '智能媒资下载日志.csv';
      a.click();
      URL.revokeObjectURL(url);

      const expiry = new Date(user.validity + 'T23:59:59');
      return today > expiry;

    function effectiveActive(user) {
      return user.active && !isExpired(user);

      const keyword = document.getElementById('userKeyword').value.trim();
      const tbody = document.getElementById('userTableBody');
      const filtered = users.filter(user => {
        const active = effectiveActive(user);
        const statusOk = status === 'all' || (status === 'active' && active) || (status === 'disabled' && !active);
        const keywordOk = !keyword || user.name.includes(keyword) || user.phone.includes(keyword);

    function saveUser() {
      const name = document.getElementById('userNameInput').value.trim();
      const phone = document.getElementById('userPhoneInput').value.trim();
      const mode = document.querySelector('input[name="validityMode"]:checked').value;
      const date = document.getElementById('validityDateInput').value;
      if (!name || !phone) {
        showToast('请填写真实姓名和手机号');
        return;
      }
      if (mode === 'date' && new Date(date + 'T23:59:59') < today) {
        showToast('用户有效期不可早于当前日期');
        return;
      }
      const payload = {
        name,
        phone,
        email: document.getElementById('userEmailInput').value.trim() || '--',
        validity: mode === 'forever' ? 'forever' : date,
        dept: document.getElementById('userDeptInput').value,
        role: document.getElementById('userRoleInput').value
      };
      if (editingUserId) {
        const user = users.find(item => item.id === editingUserId);
        Object.assign(user, payload);
      } else {
        users.unshift({
          id: Date.now(),
          checked: false,
          active: true,
          expiredReason: false,
          registered: '2026-06-29 18:30:00',
          login: '--',
          ...payload
        });
      }
      closeModal('userModal');
      renderUsers();
      showToast(editingUserId ? '用户信息已保存，仅修改有效期不会自动启用' : '新建用户成功');
    }

        if (inTable) { h += '</tbody></table>'; inTable = false; }
        while (listStack.length < depth + 1) {
          h += listStack.length === 0 ? '<ul class="prd-list">' : '<ul class="prd-nested prd-level-' + listStack.length + '">';
          listStack.push(true);
          liOpenStack.push(false);
        }
        closeLists(depth + 1);
        if (liOpenStack[depth]) h += '</li>';
        liOpenStack[depth] = true;
        h += '<li>' + inlineFmt(text);
      }
      for (let j = 0; j < lines.length; j++) {
        const ln = lines[j], tr = ln.trim();
        if (!tr) {
          closeAllLists();
          continue;
        }
        if (/^---+$/.test(tr)) {
          closeAllLists();
          h += '<hr>';
          continue;
        }
        const hm = tr.match(/^(#{1,5})\s+(.+)$/);
        if (hm) {
          closeAllLists();
          const level = hm[1].length;
          const id = 'h-' + (++hid);
          h += '<h' + level + ' id="' + id + '">' + inlineFmt(hm[2]) + '</h' + level + '>';
          if (level <= 3) toc += `<button class="toc-h${level}" type="button" onclick="scrollPrdTo('${id}')">${hm[2]}</button>`;
          continue;
        }
        if (/^\|(.+)\|$/.test(tr)) {
          closeAllLists();
          if (!inTable) {
            const nxt = (j + 1 < lines.length) ? lines[j + 1].trim() : '';
            const isSep = /^\|[\s\-:]+\|$/.test(nxt);
            if (isSep) {
              h += '<table class="prd-table"><thead><tr>';
              const hdrCells = tr.replace(/^\|/,'').replace(/\|$/,'').split('|');
              for (let ci = 0; ci < hdrCells.length; ci++) h += '<th>' + inlineFmt(hdrCells[ci].trim()) + '</th>';
              h += '</tr></thead><tbody>';
              inTable = true;
              j++;
              continue;
            }
            h += '<table class="prd-table"><tbody>';
            inTable = true;
          }
          if (/^\|[\s\-:]+\|$/.test(tr)) continue;
          const cells = tr.replace(/^\|/,'').replace(/\|$/,'').split('|');
          h += '<tr>';
          for (let ci = 0; ci < cells.length; ci++) h += '<td>' + inlineFmt(cells[ci].trim()) + '</td>';
          h += '</tr>';
          continue;
        }
        if (inTable) { h += '</tbody></table>'; inTable = false; }
        const lm = ln.match(/^(\s*)- (.+)$/);
        if (lm) {
          openListItem(Math.floor(lm[1].replace(/\t/g, '  ').length / 2), lm[2]);
          continue;
        }
        closeAllLists();
        h += '<p>' + inlineFmt(tr) + '</p>';
      }
      closeAllLists();
      if (inTable) h += '</tbody></table>';
      document.getElementById('prdContent').innerHTML = h;
      document.getElementById('prdToc').innerHTML = toc;
    }

    function scrollPrdTo(id) {
      const node = document.getElementById(id);
      if (node) node.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function togglePrdPanel() {
      const panel = document.getElementById('prdPanel');
      const toggle = document.getElementById('prdToggle');
      panel.classList.toggle('collapsed');
      toggle.classList.toggle('off', panel.classList.contains('collapsed'));
    }

    function downloadPrd() {
      const md = document.getElementById('prdMdSource').textContent
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&amp;/g, '&');
      const blob = new Blob([md], { type: 'text/markdown;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '智能媒资系统运营优化PRD.md';
      a.click();
      URL.revokeObjectURL(url);
    }

    function toggleChangelog() {
      document.getElementById('changelogOverlay').classList.toggle('show');
      document.getElementById('changelogModal').classList.toggle('show');
    }

    function renderChangelog() {
      document.getElementById('changelogBody').innerHTML = '<table class="changelog-table"><thead><tr><th>时间</th><th>说明</th></tr></thead><tbody><tr><td>2026-06-29</td><td>发布智能媒资系统运营优化合并项目，覆盖下载通知中心、批量追加备注、素材快速预览、用户有效期管理、前后台入口切换和内嵌 PRD 面板。</td></tr></tbody></table>';
    }

    renderAssets();
    renderUsers();
    renderLogs();
    renderPrdPanel();
    renderChangelog();
    updateNoticeDot();
  </script>
</body>
</html>

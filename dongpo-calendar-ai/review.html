  <textarea id="prdMdSource" style="display:none"># 《东坡行旅日历》一期产品需求文档

> 文档状态：首发版需求基线  
> 目标上线：2026 年 9 月，配合《东坡行旅日历·2027》发布  
> 适用对象：产品、设计、研发、测试、内容编辑及业务验收人员  
> 时间口径：除特别说明外，均以北京时间为准

## 1. 产品概述与本期边界

### 1.1 产品背景

《东坡行旅日历》微信小程序以实体日历为入口，将每日诗词阅读、AI 对话、苏轼生平行旅、用户身份和持续互动连接起来。用户通过实体日历二维码进入小程序，完成微信授权后获得唯一“苏粉”身份，并可围绕每日诗句进行听、藏、问、签、游和分享。

首发版目标是跑通“一码入东坡、每日可读可聊、行旅可探索、身份可沉淀”的核心闭环，为后续内容运营和产品迭代建立稳定的用户与行为基础。

### 1.2 产品目标

- 让实体日历用户扫码后快速感受到“每日一句 + AI 东坡”的核心价值。
- 建立与微信用户绑定的唯一苏粉身份，持续沉淀积分、收藏、签到和勋章。
- 通过每日内容、签到与积分机制促进日常打开和持续使用。
- 通过眉山至儋州的行旅地图，将苏轼生平、作品和真实地点连接起来。
- 支持诗句海报、苏粉名片分享，形成自然传播入口。

### 1.3 用户角色

| 用户角色 | 角色说明 | 主要诉求 |
| --- | --- | --- |
| 实体日历购买者 | 通过日历页二维码进入小程序的用户 | 查看对应日期内容、获得苏粉身份、持续签到 |
| 东坡文化爱好者 | 对苏轼诗词、生平、典故感兴趣的用户 | 听诗、收藏、提问、浏览行旅内容 |
| 行旅城市游客 | 身处东坡行旅城市或计划前往的用户 | 查看城市文化内容、实地打卡、获得勋章 |
| 后台运营人员 | 使用 Web 基础管理后台维护一期基础数据 | 管理内容、用户状态、预览配置和登录账号 |

### 1.4 核心使用场景

1. 用户扫描实体日历某一页二维码，完成微信授权后查看该页对应日期的诗句。
2. 用户直接打开小程序，查看当天诗句并完成听诗、收藏、提问和签到。
3. 用户进入行旅地图，查看 18 个地点的文化详情，并在真实地点完成定位打卡。
4. 用户进入“我的”，查看苏粉身份、积分等级、珍藏、签到记录和勋章。
5. 用户生成诗句海报或苏粉数字名片，保存到相册或分享给微信好友。

### 1.5 本期范围

- 微信授权登录与唯一苏粉身份。
- 实体日历二维码日期识别。
- 今日一句、吟诵、收藏、诗句海报。
- 问东坡自由提问与推荐问题。
- 每日签到、行为积分、五级苏粉成长体系和等级名片视觉。
- 2D 行旅地图、12 个篇章与 18 个地点、城市详情、真实定位打卡和城市勋章。
- 我的身份、徽章、行旅、珍藏、签到记录和数字名片。
- 用户业务数据跨设备同步。
- Web 基础管理后台：日历内容、行旅文化内容、问东坡配置、用户查询与启停、预览配置和后台账号。

### 1.6 非本期范围

- 亲子共读、儿童界面、诗词闯关和小游戏。
- 多东坡形象、语音提问和数字人视频对话。
- 苏粉广场、用户发帖、评论、点赞及内容审核。
- 会员、商城、积分兑换、AR 导览、票务和酒店预订。
- 积分消耗、兑换商城和用户自选名片主题。
- 对外开放的技术接口、数据表设计和部署方案。
- 真实服务端、用户增长、日活、留存、运营趋势、内容排行和城市排行。
- 多级审核、操作记录、历史版本、人工积分调整、补签和打卡修正。
- 地图点位编辑、后台角色与权限配置、独立素材库、超过近七天的问答历史和后台问答正文查询。

### 1.7 关键约束

- 用户首次进入必须完成微信授权登录，不提供游客模式。
- 每页二维码只识别日历日期，不与扫码用户形成独占关系，可被不同用户正常扫描。
- 所有每日次数、连续签到和积分防重均按北京时间自然日计算。
- 2027 年元旦前，直接打开小程序展示运营指定的预览日；扫描二维码仍展示二维码对应的 2027 日期。
- 原型中的 105 积分、连续签到 3 天和珍藏 6 篇仅为演示数据，生产新用户初始积分为 0。

## 2. 用户角色和核心使用流程

### 2.1 首次扫码流程

1. 用户扫描实体日历页二维码。
2. 小程序识别二维码对应的日历日期。
3. 未登录用户进入微信授权引导；已登录用户跳过授权步骤。
4. 用户授权成功后生成或读取唯一苏粉编号，并记录首次入籍日期。
5. 小程序打开二维码对应日期的诗句内容。
6. 用户返回“今日”首页时，恢复自然日内容；2027 年元旦前恢复运营预览日。

### 2.2 直接打开流程

1. 用户从微信最近使用或分享入口打开小程序。
2. 未登录用户先完成微信授权。
3. 2027 年元旦前展示运营预览日；2027 年起展示自然日内容。
4. 用户可通过底部导航进入今日、行旅、问东坡和我的。

### 2.3 每日互动闭环

1. 用户查看今日诗句。
2. 用户完整听完吟诵，首次获得 5 积分。
3. 用户收藏诗句或生成诗句海报。
4. 用户向东坡提问，当日首次成功提问获得 5 积分。
5. 用户完成每日签到，获得 10 积分。
6. 用户可生成并分享苏粉名片，当日首次成功分享获得 20 积分。
7. 所有结果同步至“我的”。

### 2.4 行旅打卡闭环

1. 用户进入行旅，地图默认展示 18 个地点的全貌。
2. 用户点击任一地点浏览文化详情；所有地点均可发起定位打卡。
3. 用户在真实城市点击“到此打卡”，阅读定位用途说明。
4. 用户授权定位并完成距离与精度验证。
5. 验证成功后点亮城市、记录打卡结果并获得专属勋章。
6. 用户可前往“我的徽章”查看已获得的行旅勋章。

## 3. 全局交互、登录、日期、权限、空状态和异常规则

### 3.1 页面入口与导航

- 底部主导航固定为“今日 / 行旅 / 问东坡 / 我的”。
- 今日、行旅、问东坡、我的四个一级页面展示底部导航。
- 珍藏详情、签到记录、城市详情和分享弹层不重复展示底部导航，使用明确的返回或关闭操作。
- 切换一级页面时保留用户已完成的登录、积分、收藏、签到、打卡和勋章状态。
- 返回“今日”时展示当前生效日期，不保留二维码历史日期。

### 3.2 微信授权登录

**授权状态：**

- 展示规则：未登录时展示产品名称、用途说明、微信授权按钮和拒绝后的提示；不展示业务首页。
- 交互规则：点击授权后进入处理中状态，处理中不可重复点击；成功后进入目标日期页面；失败后提供“重新授权”。
- 数据规则：同一微信用户只生成一个苏粉编号；重复授权读取原身份和全部用户数据，不生成新编号。不涉及筛选与排序。

**拒绝授权：**

- 用户拒绝后停留在授权引导页。
- 明确说明登录用于生成苏粉身份及同步收藏、积分、签到、打卡和勋章。
- 用户可以退出小程序或重新发起授权，不能绕过授权进入业务页面。

### 3.3 日期规则

**当前生效日期：**

- 展示规则：今日页展示日、月、星期、公历和农历；日期内容只读。
- 交互规则：直接打开显示自然日；扫码打开显示二维码对应日期；从扫码日期返回今日后恢复自然日或预览日。
- 数据规则：
  - 2027 年 1 月 1 日起，以北京时间自然日读取当日内容。
  - 2027 年元旦前，直接打开读取运营指定的预览日。
  - 二维码日期必须属于《东坡行旅日历·2027》有效日期范围。
  - 不涉及用户筛选；日期内容按精确日期匹配，不涉及排序。

**无对应内容：**

- 日期有效但内容缺失时，不展示其他日期内容替代。
- 页面显示“今日内容正在补录”，保留返回今日和重新加载操作。
- 缺失内容不允许收藏、听诗或生成海报。

### 3.4 全局操作反馈

| 状态 | 产品规则 |
| --- | --- |
| 默认 | 按钮显示明确动作名称；可用操作保持可点击 |
| 处理中 | 按钮显示处理中反馈并禁止重复提交 |
| 成功 | 使用轻提示或结果区说明操作结果，并即时刷新关联数据 |
| 失败 | 保留原数据，说明失败原因，并在可重试场景提供重试入口 |
| 重复操作 | 不重复产生积分、签到、收藏或勋章记录；明确提示已完成 |
| 数据同步中 | 本地页面可继续浏览，涉及新增数据的操作避免重复提交 |
| 同步失败 | 保留用户本次操作结果并提示稍后重试；恢复后重新同步 |

### 3.5 权限与可见性

| 权限 | 触发时机 | 拒绝后的影响 |
| --- | --- | --- |
| 微信登录授权 | 首次进入 | 不能进入业务首页，可重新授权 |
| 位置权限 | 用户在已解锁城市主动点击“授权定位并验证” | 不能完成城市打卡，可继续浏览城市内容 |
| 相册权限 | 用户保存诗句海报或数字名片时 | 不保存图片，可重新授权或改用微信分享 |
| 微信分享能力 | 用户点击分享诗句海报或数字名片时 | 不发放分享积分，保留当前分享内容 |

### 3.6 全局空状态与异常状态

- 首次加载失败：展示重新加载，不进入错误的默认数据。
- 登录身份读取失败：停留在登录后加载状态，避免生成重复苏粉编号。
- 用户数据为空：分别展示无收藏、无签到、无勋章的引导，不使用演示数据填充。
- 跨设备同步失败：展示最近一次有效数据，并明确“同步未完成”。
- 网络恢复后刷新当前页面关联数据，不改变用户所在页面和已输入但未提交的内容。

## 4. 今日一句

### 4.1 模块目标与页面结构

今日一句是首页核心内容，页面按以下顺序组织：

1. 产品名称与苏粉身份入口。
2. 日期信息。
3. 当日诗句、作者和出处。
4. 收藏与分享操作。
5. 吟诵播放。
6. 问东坡、签到和苏粉名片入口。

### 4.2 关键字段规则

**日期信息：**

- 展示规则：展示日、月、星期、公历、农历；预览日需标明“预览”。
- 交互规则：日期区域只读，不提供日期选择器。
- 数据规则：按第 3.3 节当前生效日期精确读取；不涉及筛选与排序。

**诗句正文：**

- 展示规则：展示编辑团队确认并发布的诗句，不截断；同时展示作者和完整出处。
- 交互规则：正文只读，可用于生成海报；内容缺失时禁用相关操作。
- 数据规则：
  - 2027 年从 1 月 1 日开始，每两个连续自然日关联同一首诗词作品，两天展示不同句子。
  - 同组两天共用作品标题、作者、出处、整首吟诵音频和基础海报素材。
  - 12 月 31 日为年度特别页，可配置独立诗句和独立音频。
  - 每个日历日期只对应一条已发布句子；同组两天句子不得完全相同。

**吟诵音频：**

- 展示规则：默认显示“听东坡吟诵”；未播放时不显示进度，播放后显示进度。
- 交互规则：支持播放、暂停和继续；暂停保留进度；播放完成后恢复未播放状态并隐藏进度。
- 数据规则：音频与诗词作品一一对应，同组两天共用整首吟诵；仅完整播放完成计为有效听诗。切换日期时停止原音频。听诗奖励仍按自然日判断，因此同组两天可分别获得当日首次听诗积分。

**收藏状态：**

- 展示规则：未收藏为空心书签，已收藏为实心书签；不额外显示“收藏诗句”文字。
- 交互规则：点击切换收藏/取消收藏；处理中禁止重复点击；成功后同步更新我的珍藏数量。
- 数据规则：同一用户、同一日历内容只保留一条有效收藏；收藏时间采用操作成功时间；珍藏列表按收藏时间倒序。

### 4.3 吟诵操作与积分

| 操作状态 | 按钮状态 | 结果与反馈 |
| --- | --- | --- |
| 未播放 | 可点击“听东坡吟诵” | 开始播放并显示进度 |
| 播放中 | 可点击暂停 | 暂停并保留当前进度 |
| 已暂停 | 可点击继续 | 从原进度继续播放 |
| 播放完成 | 恢复未播放 | 当日首次完整听完奖励 5 积分 |
| 音频加载失败 | 提供重试 | 不计为听诗完成，不发积分 |
| 当日重复听完 | 正常播放 | 不重复发积分，必要时提示“今日听诗积分已领取” |

### 4.4 诗句海报

**海报内容：**

- 展示规则：包含日期、诗句、作者、出处和产品标识；内容必须与当前生效诗句一致。
- 交互规则：首页右上角收藏与分享按钮并列；用户点击分享后生成预览，可选择保存图片、分享微信好友或分享到朋友圈。
- 数据规则：仅使用已确认发布的诗词与海报素材；海报生成不新增收藏，不发放积分。不涉及筛选与排序。

**保存与分享：**

- 保存前请求相册权限；成功后提示保存完成，失败时保留预览并支持重试。
- 分享好友与朋友圈均通过微信分享能力完成；Web 原型提供结果模拟和真实图片下载。
- 分享失败或取消不改变收藏和积分状态。
- 诗句海报分享不计入“分享数字名片 +20 积分”任务。

### 4.5 空状态与异常状态

- 诗句缺失：显示补录提示，禁用收藏、吟诵和海报操作。
- 音频缺失：诗句仍可阅读和收藏，播放入口显示暂不可用。
- 收藏失败：保持原收藏状态，不提前更新珍藏数量。
- 海报素材缺失：保留诗句阅读和收藏，海报入口显示暂不可用。

### 4.6 验收标准

- 直接打开、扫码进入和返回今日时，日期规则符合第 3.3 节。
- 未播放时不出现进度；播放、暂停、继续、完成状态正确。
- 当日仅首次完整听完发放 5 积分，失败和重复播放不重复发放。
- 收藏状态与我的珍藏实时一致，重复收藏不产生重复记录。
- 海报内容与当前诗句一致，可完成保存或微信分享。

## 5. 问东坡

### 5.1 模块目标与边界

问东坡提供基于已发布知识内容的 AI 文化对话体验，支持推荐问题、自由输入，以及在当前聊天界面回看本人近七天的成功问答。首发版不提供语音提问、多人会话、人工专家咨询、历史主动删除或超过近七天的问答查询。

### 5.2 页面结构

- 东坡身份与“内容由 AI 生成”说明。
- 近七天历史问答与当前会话组成的连续消息流。
- 按北京时间自然日展示的日期分隔。
- 首轮推荐问题。
- 自由输入框和发送按钮。
- 加载、失败和安全拒答反馈。

### 5.3 字段规则

**推荐问题：**

- 展示规则：每次进入页面均展示编辑团队预置的问题；用户在本次进入后发送第一条问题时收起推荐区。
- 交互规则：点击后等同于提交该问题；回答生成期间不可重复提交。
- 数据规则：仅展示当前有效且已启用的问题；按编辑团队配置顺序展示，不涉及用户筛选。

**自由问题：**

- 展示规则：输入框提示“问问东坡先生……”，不展示次数或额度。
- 交互规则：空内容不能发送；发送后清空输入框并进入回答生成状态；生成期间发送按钮禁用。
- 数据规则：推荐问题和自由问题均不限制每日提问次数；只有成功返回有效回答的提问进入历史记录。

**AI 回答：**

- 展示规则：区分用户问题与东坡回答；页面持续显示“内容由 AI 生成”。
- 交互规则：生成中展示等待状态；成功后追加到当前会话；失败时在对应问题后显示失败原因和重新提问入口。
- 数据规则：回答依据编辑团队确认的东坡诗文、生平、行迹、典故和文化知识范围；消息按发送时间正序展示。历史问答仅供回看，不作为新问题的 AI 对话上下文。

**近七天历史：**

- 展示规则：进入页面直接显示北京时间当天及前六个自然日内的本人成功问答，不另设历史入口或独立页面。
- 加载规则：首次加载最新 20 组问答并定位到消息底部；向上滚动继续加载较早记录，加载后保持原阅读位置。
- 分组规则：按北京时间自然日分组，显示“7 月 23 日 · 今日”“7 月 22 日”等日期分隔；到达边界时显示“仅展示近七天问答”。
- 清理规则：进入第八个自然日后，最早一天的记录不再展示；用户不能主动删除历史。
- 隐私规则：仅当前登录用户可见本人问答；后台只展示累计成功提问次数，不展示问题和回答正文。
- 临时欢迎语：每位用户每天首次进入页面展示一次，不写入历史记录。

### 5.4 提问积分

- 每个北京时间自然日首次成功获得有效回答奖励 5 积分；同日后续成功提问不重复奖励。
- 网络失败、回答超时、服务异常和安全拒答不保存为历史，也不占用当日首次积分机会。
- 同一成功问答在同步重试时不得生成重复记录或重复积分。

### 5.5 内容安全与异常状态

| 场景 | 产品反馈 | 历史与积分 |
| --- | --- | --- |
| 正常回答 | 展示 AI 回答 | 保存成功问答；当日首次成功回答加 5 分 |
| 网络失败 | 提示网络异常并允许重试 | 不保存，不加积分 |
| 回答超时 | 提示暂未回答并允许重新发送 | 不保存，不加积分 |
| 服务不可用 | 提示“东坡暂歇，请稍后再问” | 不保存，不加积分 |
| 不当或高风险问题 | 展示安全提示，不生成不当内容 | 不保存，不加积分 |
| 超出知识范围 | 明确说明暂无法可靠回答 | 作为安全有效回答保存；符合首次条件时加积分 |
| 历史读取失败 | 保留当前会话，提示重试历史加载 | 不影响继续提问 |

### 5.6 验收标准

- 推荐问题和自由问题均能持续提交，第 1、5、6、50 次成功提问均可正常回答。
- 当日首次成功提问只发放一次 5 积分。
- 失败、超时和安全拒答不保存、不奖励，也不影响后续正常提问。
- 重新进入页面直接显示近七天成功问答，不存在历史入口或独立历史页面。
- 首次加载 20 组、向上继续加载、日期分隔、七天边界和第八天自动清理均符合规则。
- 历史只属于当前用户且不进入 AI 上下文；后台无法查看问答正文。

## 6. 签到与积分

### 6.1 每日签到

**签到状态：**

- 展示规则：首页显示“今日签到 / +10 积分”或“已签到 / 当前积分”。
- 交互规则：未签到可点击；签到处理中不可重复点击；成功后即时更新积分、连续天数和签到记录。
- 数据规则：每位用户每天仅保留一条有效签到记录；按北京时间自然日去重；签到明细按签到时间倒序。

**连续签到：**

- 连续自然日均存在有效签到时，连续天数逐日增加。
- 当天未签到不立即清零；用户在下一自然日仍未补成连续时，新签到从 1 天开始。
- 不提供补签、签到撤销和签到记录删除。

### 6.2 积分规则

| 行为 | 单次积分 | 每日发放条件 | 防重规则 |
| --- | ---: | --- | --- |
| 每日签到 | +10 | 当天首次签到成功 | 同一用户同一自然日一次 |
| 完整听诗 | +5 | 当天首次完整播放任一生效诗句 | 同一用户同一自然日一次 |
| 问东坡 | +5 | 当天首次获得有效 AI 回答 | 同一用户同一自然日一次 |
| 分享数字名片 | +20 | 当天首次成功完成微信分享 | 同一用户同一自然日一次 |

- 新用户积分初始值为 0。
- 积分只增不减；首发版不提供兑换、扣减、转赠和人工调整入口。
- 同一行为重复操作仍可使用原功能，但不重复获得积分。
- 积分发放失败时不提前增加总积分；恢复后只补发一次。
- 积分明细按发生时间倒序，展示行为名称、积分值和发生时间。

### 6.3 苏粉等级与名片主题

| 等级 | 积分范围 | 等级题签 | 名片主题与识别元素 |
| --- | ---: | --- | --- |
| 青铜苏粉 | 0—199 | 初识东坡 | 暖米宣纸、青铜褐单线框、回纹角花和素圆印 |
| 白银苏粉 | 200—499 | 渐入诗境 | 月白纸、银灰双线框、流云水纹和银纹印 |
| 黄金苏粉 | 500—999 | 诗酒知味 | 杏金宣纸、古金包角、折枝梅与酒波纹和金印 |
| 东坡雅士 | 1000—1999 | 文心相契 | 青绿水墨、青黛框、竹叶书卷远山暗纹和雅士徽记 |
| 东坡知音 | 2000 及以上 | 千载知音 | 玄墨底、朱砂与暗金、金线山河纹和朱砂认证章 |

- 等级根据有效积分即时计算，达到门槛自动升级，不需要用户手动领取。
- 等级只升不降；首发版没有积分扣减，因此不处理降级。
- 升级后展示一次升级反馈；“我的”展示当前等级、当前区间进度和距离下一等级所需积分。
- 最高等级显示“已达最高等级”。
- 五级名片使用统一的信息结构，均展示产品标识、等级题签、原创东坡形象、苏粉编号、入籍日期、名片诗句、等级名称、徽记和印章。
- 纸色、边框、暗纹、头像外框、题签和印章随等级自动变化，不增加主题选择页面；核心功能不因等级受限。
- “我的”身份卡、数字名片预览、保存图片、分享好友和朋友圈使用同一等级主题，升级后立即同步切换。
- 名片正文须保持清晰可读，复杂纹样不得覆盖苏粉编号、诗句和日期等核心信息。

### 6.4 异常与防重

- 重复签到：提示“今日已经签到，明日再来”，不新增记录和积分。
- 重复行为奖励：功能正常执行，积分保持不变，可提示今日奖励已领取。
- 积分总数与明细不一致：展示最近一次确认总数并标记同步中，恢复后重新核对。
- 任何异常不得产生负积分、重复积分或覆盖原有明细。

### 6.5 验收标准

- 四类行为均按规定积分值发放，并严格按用户、行为和自然日防重。
- 连续签到在连续和中断场景下计算正确。
- 新用户从 0 分开始；199/200、499/500、999/1000、1999/2000 等积分边界等级计算准确。
- 积分总数等于全部有效积分明细之和，排序和时间口径正确。

## 7. 2D 行旅地图与城市打卡

页面包括：

1. 已点亮地点进度。
2. 地图状态图例。
3. 12 个篇章行程条。
4. 可上下左右拖动、缩放的行旅地图。
5. 城市交互点和行程序号。
6. 城市文化详情、资料来源、勋章和打卡操作。

### 7.3 全量开放规则

- 12 个篇章和 18 个地点始终可见，不与日历月份强绑定。
- 所有地点均可打开完整文化详情并发起定位打卡。
- 页面不展示锁定、未来解锁、本月城市或预览篇章状态。
- 点击篇章时地图定位到对应地点组；篇章顺序固定为第一程至第十二程。

### 7.4 地图浏览规则

- 首次进入默认展示地图全貌。
- 用户可通过手势上下左右拖动地图。
- 用户可放大、缩小、查看全貌和回到下一处未点亮地点。
- 达到最大或最小缩放级别时，对应缩放按钮禁用。
- 地图东部密集城市默认显示较小点位；首次点击先放大并聚焦，再次点击打开详情。
- 城市点位必须与地图真实地理区域对应，不因标签避让而改变城市锚点。
- 路线按 1—18 行程序号连接；路线只承担行程表达，不覆盖地点点击区域。

### 7.5 城市状态

| 状态 | 展示规则 | 点击结果 |
| --- | --- | --- |
| 未打卡 | 空心地点标识、行程序号、历史地名 | 打开完整地点详情，可发起定位打卡 |
| 已点亮 | 朱砂实心标识、行程序号、“已点亮” | 打开完整详情并展示打卡时间、验证距离和勋章 |

### 7.6 城市详情字段规则

**城市基本信息：**

- 展示规则：展示省份、历史时期、城市名称、篇章主题和地点故事。
- 交互规则：只读；用户可关闭详情返回原地图位置。
- 数据规则：仅展示编辑团队已发布的地点内容；历史地名与现代城市名称同时保留。不涉及筛选。

**历史与文化内容：**

- 展示规则：展示历史记载、相关遗迹和代表作；内容为空时显示“内容待补充”，不使用虚构信息。
- 交互规则：代表作和遗迹首发版只读，不新增站内详情页。
- 数据规则：资料来源需明确，优先采用权威文博、文旅或出版资料；同类内容按编辑配置顺序展示。

**资料来源：**

- 展示规则：城市详情展示“查看资料来源”。
- 交互规则：点击后打开对应权威资料；返回后保留当前城市详情状态。
- 数据规则：每个城市至少配置一个有效来源；来源失效时隐藏跳转并提示内容维护中。不涉及排序。

**城市勋章：**

- 展示规则：未打卡展示勋章预览，打卡成功后展示已获得状态。
- 交互规则：成功后可前往“我的徽章”查看，也可继续探索地图。
- 数据规则：每个行旅点对应一个地点勋章；同一用户、同一行旅点只获得一次。

### 7.7 定位打卡规则

**发起打卡：**

- 默认状态：未打卡地点显示“到此打卡”。
- 点击反馈：先展示定位用途、20 公里范围、精度要求和隐私说明，不立即请求系统权限。
- 权限状态：用户点击“授权定位并验证”后才请求位置权限。
- 重复打卡：已打卡城市显示“查看打卡勋章”，不重新发放。

**成功条件：**

- 用户到城市中心的球面距离不超过 20 公里，20.0 公里计为成功。
- 本次定位精度不高于 5 公里，精度值等于 5 公里可继续验证。
- 距离和精度两个条件必须同时满足。
- 成功后保存城市、打卡时间、验证距离和勋章结果，不保存原始经纬度。
- 打卡成功只发城市勋章，不增加积分。

**失败状态：**

| 失败类型 | 反馈规则 | 后续操作 |
| --- | --- | --- |
| 权限拒绝 | 提示在系统设置中允许位置访问 | 提供重新定位 |
| 请求超时 | 提示到开阔处后重试 | 提供重新定位 |
| 无法获取位置 | 提示检查网络和系统定位服务 | 提供重新定位 |
| 精度超过 5 公里 | 提示当前位置精度不足 | 提供重新定位 |
| 距城市中心超过 20 公里 | 展示约距离并说明进入范围后可打卡 | 提供重新定位或继续浏览 |
| 当前环境不支持 | 提示在支持定位的微信环境重试 | 不显示虚假成功 |

### 7.8 统计规则

- 行旅篇章数：固定为 12。
- 已点亮地点数：按当前用户已完成打卡的不同有效行旅点统计，分母固定为 18。
- 行旅勋章数：按城市勋章标识去重；重复打卡不增加。
- 统计只纳入当前用户有效数据，排除失败、取消、重复和未同步成功的打卡。
- 打卡成功后即时刷新地图、行旅进度和我的徽章。

### 7.9 验收标准

- 12 个篇章、18 个地点、历史地名、现代城市和行程顺序与本 PRD 一致。
- 所有地点均可查看详情和发起打卡，不出现锁定、月份解锁或“本月”状态。
- 地图支持四向拖动、缩放、全貌、回到未点亮地点和密集点位聚焦。
- 地点详情字段完整，资料来源可追溯。
- 19.9 公里成功、20.1 公里失败；定位精度边界符合规则。
- 拒绝、超时、无法定位、低精度、不支持和超范围均有明确反馈。
- 成功后地图、我的徽章和统计同步更新，原始经纬度不留存。

## 8. 苏粉身份、等级、徽章与数字名片

### 8.1 苏粉身份

**苏粉编号：**

- 展示规则：格式为“苏粉 No.数字编号”，在首页身份入口、我的和数字名片中保持一致。
- 交互规则：首页点击身份入口进入“我的”；编号只读，不允许用户修改。
- 数据规则：每个微信用户对应一个全局唯一苏粉编号；重复登录和跨设备登录读取原编号。不涉及筛选与排序。

**入籍日期：**

- 展示规则：展示用户首次完成授权并生成身份的北京时间日期。
- 交互规则：只读。
- 数据规则：首次生成后不可因重复登录、扫码或跨设备改变。不涉及筛选与排序。

### 8.2 我的首页

- 身份卡展示苏粉编号、入籍日期、当前积分、等级和升级进度。
- 数据概览展示连续签到天数、有效珍藏数和已获得勋章数。
- 个人记录入口包括“我的行旅 / 我的珍藏 / 签到记录”。
- 所有统计使用当前登录用户数据；读取失败时显示同步异常，不使用演示数据。

### 8.3 徽章规则

| 徽章 | 获得条件 | 重复规则 |
| --- | --- | --- |
| 苏粉初识 | 首次完成认证并生成苏粉身份 | 永久一次 |
| 诗声入耳 | 首次完整听完任一有效诗句 | 永久一次 |
| 七日雅集 | 首次达到连续签到 7 天 | 永久一次 |
| 行旅点专属勋章 | 在对应行旅点首次定位打卡成功 | 每行旅点一次 |

- 未获得徽章可展示名称和获得条件，但不得显示为已获得。
- 获得徽章后即时进入“我的徽章”。
- 徽章总数按徽章标识去重，排除预览、失败和重复记录。

### 8.4 数字名片

**名片内容：**

- 展示规则：包含产品名称、苏粉编号、入籍日期、代表诗句、等级名片主题、认证标识和本项目原创东坡形象。
- 交互规则：用户可预览、关闭、保存到相册或分享微信好友。
- 数据规则：
  - 2027 年元旦前，用户首次生成名片时从已发布且标记为“名片候选”的名篇中随机选择一句，保存诗句快照；同一用户后续生成和跨设备展示保持一致。
  - 2027 年 1 月 1 日起，名片使用北京时间当天的日历句子；扫码进入其他日期不改变名片诗句。
  - 当天日历内容未发布时暂停生成名片，提示“今日名片内容准备中”。
  - 等级名片主题根据有效积分自动计算，不提供手动主题选择。

**分享积分：**

- 当日首次成功完成数字名片微信分享奖励 20 积分。
- 保存到相册不视为分享，不发放 20 积分。
- 取消分享或分享失败不发积分。
- 同日重复分享正常执行，但不重复发积分。

### 8.5 验收标准

- 同一用户跨设备登录时苏粉编号、入籍日期及个人数据一致。
- 新用户自动获得苏粉初识；听诗和七日签到按规则发放徽章。
- 行旅勋章与城市打卡一一对应，不重复累计。
- 原创东坡主资产、头像裁切和名片裁切为同一人物体系，不使用已有文物实物图或影视人物形象。
- 数字名片信息准确，保存和分享状态明确，分享积分严格防重。

## 9. 我的珍藏与签到记录

### 9.1 我的珍藏

**列表范围与排序：**

- 取数规则：只纳入当前用户处于有效收藏状态的诗句，排除已取消、重复和无权访问内容。
- 筛选规则：首发版不提供用户筛选；默认展示全部有效珍藏。
- 排序规则：按收藏成功时间倒序；时间相同时按日历日期倒序。

**珍藏卡片：**

- 展示规则：展示收藏日期、诗句、作者、出处和已收藏标识。
- 交互规则：最新收藏位于最左侧；支持左右滑动和上一篇/下一篇按钮；到达两端时对应按钮禁用。
- 数据规则：当前序号和总数只统计有效收藏；切换只改变当前查看项，不改变收藏顺序。

**取消收藏：**

- 用户可在今日页取消当前诗句收藏。
- 取消成功后立即从我的珍藏移除，并更新珍藏数量。
- 若用户正在查看被取消的条目，返回珍藏时定位到原位置的下一条；若无下一条则定位到上一条。
- 取消最后一条收藏后展示空状态。

**空状态与异常：**

- 无收藏：展示“还没有珍藏诗句”和返回今日入口。
- 加载失败：保留最近一次有效列表并标记同步未完成，提供重试。
- 内容已下线：不展示正文，标记内容暂不可用；不计入有效收藏数。

### 9.2 签到记录

**概览字段：**

- 展示规则：展示连续签到、本月签到、当前积分。
- 交互规则：只读；月份随当前查看月份变化。
- 数据规则：
  - 连续签到按第 6.1 节计算。
  - 本月签到按北京时间当月有效签到日期去重。
  - 当前积分为全部有效积分明细之和。

**月历：**

- 展示规则：展示当前月份的星期和日期，区分今日与已签到日期。
- 交互规则：首发版不支持补签和点击日期编辑。
- 数据规则：默认当前自然月；预览期仍展示实际北京时间月份的签到记录。按日期正序排列，不涉及筛选。

**签到明细：**

- 展示规则：展示签到日期、签到类型和 +10 积分。
- 交互规则：只读。
- 数据规则：只纳入有效签到，按签到时间倒序；重复或失败记录不展示。

**空状态与异常：**

- 本月无签到：月历正常展示，明细区显示“本月还未签到”。
- 记录读取失败：不显示 0 替代真实数据，显示同步异常和重试。
- 积分与签到记录暂不一致：保留已确认值并标记同步中。

### 9.3 验收标准

- 珍藏按收藏时间倒序，最新在最左侧，滑动和按钮边界正确。
- 收藏/取消收藏后首页、珍藏列表和我的统计一致。
- 签到月历、连续天数、本月签到数和明细口径一致。
- 无数据、内容下线和同步失败均有明确状态，不填充演示数据。

## 10. Web 基础管理后台

### 10.1 后台目标与边界

一期后台是面向运营人员的基础管理工具，与小程序共用日历、行旅、问答配置、用户身份和预览配置。后台解决内容维护、发布、用户查询与状态控制，不承担运营分析。

- 固定菜单为：日历内容、行旅内容、问东坡配置、用户管理、预览配置、账号管理。
- 不设置“运营数据”菜单，不提供用户增长、日活、留存、行为趋势、热门内容或城市排行；此类数据使用微信官方能力。
- 内容流程为草稿、预览、发布和下线，不设置审核节点，不保留操作记录、审核记录和历史版本。
- 本期交付可替换真实接口的完整前端，演示环境使用本地结构化数据；真实服务端不在本期范围。

### 10.2 后台账号与权限边界

- 后台账号与小程序苏粉身份相互独立；所有有效后台账号使用同一套菜单和操作能力。
- 后台不设置角色字段，不建设组织架构、角色分级、权限配置或审批流。
- 登录账号可维护内容、查询和启停苏粉用户、管理预览配置、管理后台账号及恢复演示数据。
- 账号管理不得删除当前正在登录的账号；密码只能在新建账号或独立重置密码操作中设置。

### 10.3 登录与全局交互

- 登录字段为账号和密码，支持密码显示切换、登录中、账号密码错误、账号停用和网络异常反馈。
- 演示环境可提供预置账号快捷填充；不接入短信登录和密码找回。
- 框架采用顶部栏、左侧导航和内容工作区；新增、编辑和详情使用右侧抽屉，高影响操作使用居中确认弹窗。
- 所有列表和表单覆盖加载、保存中、成功、失败、空数据、查询无结果、禁用、网络异常和重试状态。
- 发布、下线、停用或恢复用户、删除后台账号及恢复演示数据必须二次确认。
- 重点适配 1440×900、1280×800 和 1024×768；窄屏侧栏收起，表格可横向滚动，弹层必须可关闭。

### 10.4 列表与编辑通用规则

- 后台登录后默认进入日历内容，不单独设置工作台。
- 每个模块由页面标题、主要操作、筛选区、列表和编辑抽屉组成。
- 筛选后导出必须遵循当前筛选条件；重置恢复该模块默认排序和全部状态。
- 编辑抽屉关闭、切换菜单或刷新页面时，存在未保存内容须提示用户确认。
- 保存草稿不影响小程序已发布内容；发布成功后小程序刷新读取新内容。
- 编辑页的手机预览只展示当前草稿效果，不修改小程序正式业务状态。

### 10.5 日历内容管理

**列表与筛选**

- 列表字段：日期、诗词作品、组内顺序、当日句子、作者、音频状态、名片候选、发布状态和操作。
- 默认按日期正序，可切换倒序；支持日期范围、作者、句子/作品/出处关键词、发布状态、音频状态和预览标记筛选，多个条件取交集。
- 支持按当前筛选结果导出 Excel。

**内容字段与规则**

- 日历句子字段：日期、公历、农历、星期、诗词作品编号、当日句子、组内顺序、是否允许作为预览日。
- 诗词作品字段：作品编号、作品标题、作者、完整出处、整首吟诵音频、基础海报素材、是否纳入预览期名片诗句池。
- 日期、作品编号、当日句子、作品标题、作者和出处必填；同一日期不得重复。
- 同一作品编号对应的两条普通日历内容必须是连续日期、组内顺序分别为第 1 天和第 2 天，且当日句子不同；两天共用作者、出处、音频和海报。年度特别页组内顺序为 0。
- 音频缺失可保存草稿，发布时必须明确提示。
- 已发布内容编辑后先形成当前草稿，小程序继续读取上一次已发布内容；再次发布后替换，不保留旧版本。
- 下线内容不进入小程序正常展示，小程序显示内容维护状态。

### 10.6 Excel 导入与导出

- 日历导入模板固定包含：日期、公历、农历、星期、诗词作品编号、组内顺序、当日句子、作品标题、作者、出处、音频资源地址、海报资源地址、名片候选、预览标记。
- 流程为下载模板、选择文件、解析、校验、查看结果、选择重复项策略、确认导入和查看摘要。
- 校验文件格式、工作表、表头、日期、文件内重复、必填项、同作品信息一致性、连续日期、组内顺序、句子重复、内容长度和资源地址格式；错误须定位到 Excel 行号、字段、原始值和原因。
- 正确行可以继续导入，错误行不写入并可下载错误明细。
- 重复项只允许跳过或覆盖已有草稿；禁止批量覆盖已发布内容，禁止用空内容覆盖有效内容。
- 支持导出当前筛选用户、单个用户业务明细、日历内容、行旅内容、推荐问题和知识内容；不导出运营趋势或排行。

### 10.7 行旅内容管理

- 12 个篇章、18 个行旅点、历史地名、现代城市、行程序号、顺序、地图点位、打卡中心和打卡范围为系统固定数据。
- 后台不提供城市新增删除、地图拖拽、坐标输入、路线调整、打卡范围设置和点位保存。
- 列表字段：篇章序号、篇章主题、历史地名、现代城市、行程序号、内容完整度、图片状态、来源状态、发布状态和操作；默认按行程序号正序。
- 支持篇章、地点、发布状态和内容完整度筛选。
- 可编辑篇章主题、历史时期、地点故事、历史记载、相关遗迹、代表作、城市图片、资料来源、勋章名称、说明和图片。
- 表单顶部只读展示固定地点信息，可显示当前城市只读地图缩略图；地图异常不得阻断文化内容编辑。
- 已发布地点文化内容向所有用户开放，不设置月份锁定。
- 后台不得新增、撤销或修改用户打卡、验证距离和勋章。

### 10.8 问东坡配置

**推荐问题**

- 字段：问题内容、主题、展示顺序和启用状态。
- 支持新增、编辑、排序、启用、停用和手机效果预览；小程序只读取已启用内容。

**知识内容**

- 类型为诗文、生平、行迹和典故。
- 字段：标题、类型、正文、资料说明和发布状态。
- 支持关键词、类型、状态筛选及新增、编辑、发布和下线。
- 不管理模型、提示词、用户问答正文、提问趋势、热门问题和成功率。
- 用户管理详情仅展示累计成功提问次数，不允许后台查看近七天问题和回答内容。

### 10.9 用户管理

- 列表字段：苏粉编号、微信昵称、注册时间、积分、等级、连续签到、收藏数、勋章数、最近活跃时间、状态和操作。
- 支持苏粉编号精确查询、昵称模糊查询、注册时间、等级和状态筛选，默认注册时间倒序。
- 详情只读展示身份、积分明细、签到、收藏、AI 提问次数、行旅打卡、勋章和最近活跃信息；这些数据不聚合为总体运营分析。
- 后台运营人员可停用或恢复用户；停用前必须二次确认并填写原因。原因作为当前状态说明展示，不形成操作记录。
- 停用后用户历史数据保留，下一次业务请求立即拦截；恢复后原积分、签到、收藏、打卡和勋章继续有效。
- 后台不得修改苏粉编号、微信身份、注册时间，不得补发或扣减积分、补签、修改收藏、撤销打卡或补发勋章。

### 10.10 预览配置与实时手机预览

- 配置 2027 年元旦前默认预览日期，支持保存草稿、预览和发布。
- 日历和行旅编辑页提供手机框实时预览；草稿无需发布即可预览，且不得影响正式小程序业务状态。
- 发布后小程序刷新读取最新已发布内容；2027 年后自动按北京时间自然日展示。

### 10.11 后台账号、素材与演示数据

- 后台账号字段仅为账号名称、手机号和密码，不包含角色字段。
- 新建账号时输入密码并进行二次确认；两次输入不一致时不得保存。
- 编辑账号只允许修改账号名称和手机号，不展示密码字段。
- 账号列表在编辑旁提供“重置密码”；重置弹窗须输入新密码并二次确认。
- 同一手机号只能对应一个后台账号；当前登录账号不得被删除。
- 素材支持音频、海报、城市图片、勋章、原创东坡形象裁切和名片主题，覆盖格式/大小校验、进度、成功、失败、重试、预览和删除；不建设独立素材库。
- 演示环境素材只保存资源名称、状态和模拟地址，不以 Base64 写入本地业务数据。
- 运营人员可恢复演示数据；操作前展示影响范围并二次确认，重置日历、行旅、问答、用户状态、预览配置和后台账号。

### 10.12 后台验收标准

- 后台账号可正常登录；菜单从日历内容开始，不出现工作台、运营分析、图表和排行。
- 日历新建、编辑、导入、导出、草稿、发布、下线及小程序联动符合规则。
- Excel 可解析真实文件，错误定位准确，已发布内容不能被批量覆盖。
- 18 个行旅地点和坐标只读，文化内容可保存、预览、发布和下线。
- 推荐问题启停和知识内容发布后，小程序读取正确。
- 用户查询、详情、导出、停用、恢复和小程序拦截正确，历史业务数据不被改写。
- 预览草稿不影响正式入口，发布配置后小程序刷新生效。
- 账号新增需二次确认密码，账号编辑不允许改密码，独立重置密码需二次确认。
- 后台不存在运营数据、地图编辑、操作记录、审核记录、历史版本和业务数据人工修正入口。

## 11. 数据口径与内容依赖

### 11.1 业务数据对象

| 业务对象 | 核心业务内容 | 关键规则 |
| --- | --- | --- |
| 诗词作品 | 作品编号、标题、作者、出处、整首音频、海报、名片候选 | 可被连续两天复用，发布后生效 |
| 日历内容 | 日期、公历、农历、作品编号、当日句子、组内顺序 | 每日一条有效句子；同组两天连续且句子不同 |
| 苏粉身份 | 苏粉编号、入籍日期、积分、等级 | 与微信用户唯一绑定，跨设备一致 |
| 行为积分 | 行为、积分值、发生时间、奖励日期 | 按用户、行为、自然日防重 |
| 问答历史 | 用户、问题、回答、来源、成功时间、业务日期 | 仅保存成功问答；本人近七天可见；不作为 AI 上下文 |
| 收藏记录 | 日历内容、收藏时间、有效状态 | 同一内容只保留一个有效收藏 |
| 签到记录 | 签到日期、签到时间、连续状态 | 每日一条有效记录，不支持补签 |
| 行旅篇章 | 篇章序号、主题、地点顺序 | 12 个篇章固定正序，全部开放 |
| 地点内容 | 历史地名、现代城市、时期、故事、史料、遗迹、作品、来源、勋章 | 18 个固定地点，发布后展示 |
| 城市打卡 | 城市、行旅点、打卡时间、验证距离、勋章 | 不保存原始经纬度，每行旅点一次 |
| 徽章 | 徽章名称、获得条件、获得时间 | 按徽章标识去重 |

### 11.2 统一统计口径

| 指标 | 统计口径 |
| --- | --- |
| 当前积分 | 当前用户全部有效积分明细之和 |
| 连续签到 | 截至最近一次有效签到的连续自然日数量 |
| 本月签到 | 当前北京时间月份内不同有效签到日期数 |
| 珍藏数量 | 当前用户不同日历内容的有效收藏数 |
| 行旅篇章 | 固定 12 个篇章 |
| 已点亮地点 | 当前用户成功打卡的不同有效行旅点数，分母 18 |
| 勋章数量 | 当前用户已获得的不同勋章标识数 |
| 累计成功提问 | 当前用户全部成功问答次数；后台只展示次数，不展示正文 |
| 近七天问答 | 北京时间当天及前六个自然日内的成功问答 |

- 统计范围只包含当前登录用户的有效数据。
- 排除失败、取消、重复、已撤销或未确认成功的数据。
- 统计在相关操作成功后刷新；异常时展示最近一次确认结果并标记同步状态。
- 空值应按业务语义展示 0 或空状态；读取失败不得按 0 处理。

### 11.3 编辑团队内容依赖

首发前需完成并确认以下内容：

- 2027 年每日诗句、公历、农历、作者、出处和吟诵音频。
- 2027 年元旦前使用的预览日、预览诗句和名片候选诗句池。
- 诗句海报模板、苏粉数字名片模板、五级名片主题和原创东坡人物资产。
- 推荐问题清单及其启用顺序。
- AI 可参考的东坡诗文、生平、行迹、典故和文化知识内容。
- 12 个行旅篇章、18 个行程序号对应的地点史料、遗迹、作品、图片和资料来源。
- 基础徽章与行旅点专属勋章名称、说明和正式素材。

内容未确认并发布时不得进入正式展示范围；缺失项按对应模块的空状态处理，不得使用未经确认的替代内容。

### 11.4 数据隐私约束

- 位置权限仅在用户主动发起城市打卡后请求。
- 定位仅用于当次城市距离验证。
- 原始经纬度不进入用户历史记录；只保留城市、打卡时间、验证距离和勋章结果。
- 用户数据只用于苏粉身份、互动记录和跨设备同步，不在本期提供公开排行或用户间查看。
- 问答历史仅供当前用户在聊天界面回看，后台不展示问题和回答正文；超过近七天的内容不再提供查询。

## 12. 一期整体验收标准

### 12.1 登录与日期

- 未登录用户不能进入业务首页；授权成功后生成或读取唯一苏粉编号。
- 拒绝、失败和重复登录的状态及结果符合要求。
- 同一用户重复扫码和跨设备登录不生成新身份。
- 自然日、扫码日期、预览日、返回今日和跨日变化均符合日期规则。

### 12.2 今日与珍藏

- 日期、诗句、作者、出处和音频准确匹配。
- 1 月 1—2 日、1 月 3—4 日等连续两日复用同一作品和整首音频，但展示不同句子；12 月 31 日为独立特别页。
- 未播放不显示进度，播放、暂停、继续和完成状态正确。
- 当日首次完整听诗奖励 5 分，重复或失败不重复奖励。
- 收藏、取消收藏、珍藏倒序、数量和空状态一致。
- 诗句海报支持预览、下载、分享好友和朋友圈，失败状态明确。

### 12.3 问东坡

- 推荐问题和自由问题均可持续使用，不显示或限制每日提问次数。
- 当日首次成功回答只奖励一次 5 分。
- AI 标识、加载、错误和安全状态完整。
- 进入现有聊天页面直接显示本人近七天成功问答，首次加载最新 20 组并支持向上继续加载。
- 历史按北京时间自然日分组，第八天自动移除最早一天；历史不参与 AI 上下文。
- 失败、超时和安全拒答不写入历史，后台无法查看问题和回答正文。

### 12.4 签到、积分与等级

- 签到每日一次并奖励 10 分，重复签到不新增数据。
- 听诗、提问、数字名片分享和签到四类积分均按自然日防重。
- 连续签到在连续、跨月和中断场景下计算正确。
- 新用户初始 0 分；五级等级及 199/200、499/500、999/1000、1999/2000 边界准确。
- 积分总数、明细和个人中心展示一致，不出现负数或重复积分。

### 12.5 行旅地图与打卡

- 12 个篇章、18 个行程序号、历史地名、现代城市和地点状态正确。
- 地图四向拖动、缩放、全貌、回到下一处未点亮地点和密集地点聚焦可用。
- 城市点位与实际地理区域相符，路线顺序清晰且不妨碍点击。
- 地点详情字段齐全，资料来源有效，所有地点均可查看和打卡。
- 19.9 公里打卡成功、20.1 公里失败；精度边界正确。
- 权限拒绝、超时、无法定位、低精度、不支持和超范围均可恢复或退出。
- 成功后城市、勋章、统计和我的页面同步；重复打卡不重复发放。
- 用户历史数据中不保存原始经纬度。

### 12.6 身份、名片与数据同步

- 苏粉编号、入籍日期、积分、等级、签到、收藏和勋章跨设备一致。
- 基础徽章与行旅勋章按条件发放并去重。
- 五级名片的题签、纸色、边框、纹样、头像外框、徽记和印章具有明确区分。
- “我的”身份卡、数字名片预览、下载图片与微信分享图片使用一致的等级主题，升级后立即切换。
- 数字名片内容准确，保存和分享结果明确。
- 预览期随机诗句首次生成后固定；2027 年元旦起使用北京时间当天日历句子。
- 原创东坡主资产及头像、名片裁切人物一致，系统不再引用旧实物画像。
- 当日首次成功分享数字名片奖励 20 分，取消、失败和重复分享不重复奖励。
- 加载失败、同步失败和无数据场景不使用演示值冒充真实数据。

### 12.7 一期通过条件

- 本 PRD 所列核心流程均可完整闭环，无阻断性问题。
- 所有积分、签到、收藏、成功问答、打卡和勋章均满足去重与统计口径。
- 关键异常均有明确反馈和可执行的恢复路径。
- 内容编辑团队已完成所有首发内容确认与发布，不存在未授权或来源不明的正式内容。
- 产品、设计、研发、测试和业务方依据本 PRD 完成联合验收。

      function escapeHtml(value) {
        return value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function inlineMd(value) {
        var escaped = escapeHtml(value);
        escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
        escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        escaped = escaped.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
        return escaped;
      }

      function slugify(value, index) {
        var cleaned = value.replace(/[#*`《》“”"'：:，,。！？!?（）()\/\\\s]+/g, '-').replace(/^-+|-+$/g, '');
        return (cleaned || 'section') + '-' + index;
      }

      function isTableDivider(line) {
        return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
      }

      function cells(line) {
        return line.trim().replace(/^\||\|$/g, '').split('|').map(function (cell) { return cell.trim(); });
      }

      function renderMarkdown(markdown) {
        var lines = markdown.replace(/\r\n?/g, '\n').split('\n');
        var html = [];
        var headings = [];
        var i = 0;
        var headingIndex = 0;

        function closeParagraph(buffer) {
          if (buffer.length) {
            html.push('<p>' + inlineMd(buffer.join(' ')) + '</p>');
            buffer.length = 0;
          }
        }

        while (i < lines.length) {
          var line = lines[i];
          if (!line.trim()) { i += 1; continue; }

          var heading = line.match(/^(#{1,4})\s+(.+)$/);
          if (heading) {
            headingIndex += 1;
            var level = heading[1].length;
            var title = heading[2].trim();
            var id = slugify(title, headingIndex);
            html.push('<h' + level + ' id="' + id + '">' + inlineMd(title) + '</h' + level + '>');
            if (level <= 3) headings.push({ level: level, title: title, id: id });
            i += 1;
            continue;
          }

          if (/^---+$/.test(line.trim())) {
            html.push('<hr />');
            i += 1;
            continue;
          }

          if (line.trim().charAt(0) === '>' ) {
            var quote = [];
            while (i < lines.length && lines[i].trim().charAt(0) === '>') {
              quote.push(lines[i].replace(/^\s*>\s?/, ''));
              i += 1;
            }
            html.push('<blockquote><p>' + quote.map(inlineMd).join('<br />') + '</p></blockquote>');
            continue;
          }

          if (i + 1 < lines.length && line.indexOf('|') !== -1 && isTableDivider(lines[i + 1])) {
            var headerCells = cells(line);
            i += 2;
            var rows = [];
            while (i < lines.length && lines[i].trim() && lines[i].indexOf('|') !== -1) {
              rows.push(cells(lines[i]));
              i += 1;
            }
            var table = '<div class="table-wrap"><table><thead><tr>' +
              headerCells.map(function (cell) { return '<th>' + inlineMd(cell) + '</th>'; }).join('') +
              '</tr></thead><tbody>';
            rows.forEach(function (row) {
              table += '<tr>' + headerCells.map(function (_, column) {
                return '<td>' + inlineMd(row[column] || '') + '</td>';
              }).join('') + '</tr>';
            });
            table += '</tbody></table></div>';
            html.push(table);
            continue;
          }

          var listMatch = line.match(/^(\s*)([-*]|\d+\.)\s+(.+)$/);
          if (listMatch) {
            var listLines = [];
            while (i < lines.length) {
              var current = lines[i].match(/^(\s*)([-*]|\d+\.)\s+(.+)$/);
              if (!current) break;
              listLines.push({
                indent: current[1].replace(/\t/g, '  ').length,
                ordered: /\d+\./.test(current[2]),
                text: current[3]
              });
              i += 1;
            }
            var baseIndent = Math.min.apply(null, listLines.map(function (item) { return item.indent; }));
            var rootTag = listLines[0].ordered ? 'ol' : 'ul';
            var listHtml = '<' + rootTag + '>';
            var previousIndent = baseIndent;
            var activeTag = rootTag;
            listLines.forEach(function (item, index) {
              if (index === 0) {
                listHtml += '<li>' + inlineMd(item.text);
                return;
              }
              if (item.indent > previousIndent) {
                activeTag = item.ordered ? 'ol' : 'ul';
                listHtml += '<' + activeTag + '><li>' + inlineMd(item.text);
              } else if (item.indent < previousIndent) {
                listHtml += '</li></' + activeTag + '></li><li>' + inlineMd(item.text);
                activeTag = rootTag;
              } else {
                listHtml += '</li><li>' + inlineMd(item.text);
              }
              previousIndent = item.indent;
            });
            if (previousIndent > baseIndent) listHtml += '</li></' + activeTag + '>';
            listHtml += '</li></' + rootTag + '>';
            html.push(listHtml);
            continue;
          }

          var paragraph = [];
          while (i < lines.length && lines[i].trim()) {
            if (/^(#{1,4})\s+/.test(lines[i]) || /^---+$/.test(lines[i].trim()) || lines[i].trim().charAt(0) === '>') break;
            if (i + 1 < lines.length && lines[i].indexOf('|') !== -1 && isTableDivider(lines[i + 1])) break;
            if (/^(\s*)([-*]|\d+\.)\s+/.test(lines[i])) break;
            paragraph.push(lines[i].trim());
            i += 1;
          }
          var hadParagraph = paragraph.length > 0;
          closeParagraph(paragraph);
          if (!hadParagraph && i < lines.length && lines[i] === line) i += 1;
        }

        return { html: html.join('\n'), headings: headings };
      }

      var rendered = renderMarkdown(source);
      article.innerHTML = rendered.html;
      rendered.headings.forEach(function (heading) {
        if (heading.level === 1) return;
        var button = document.createElement('button');
        button.type = 'button';
        button.className = 'toc-item level-' + heading.level;
        button.textContent = heading.title;
        button.addEventListener('click', function () {
          var target = document.getElementById(heading.id);
          if (!target) return;
          content.scrollTo({ top: Math.max(0, target.offsetTop - 76), behavior: 'smooth' });
        });
        toc.appendChild(button);
      });

      var tocButtons = Array.prototype.slice.call(toc.querySelectorAll('.toc-item'));
      var observedHeadings = rendered.headings.map(function (heading) {
        return document.getElementById(heading.id);
      }).filter(Boolean);
      content.addEventListener('scroll', function () {
        var current = observedHeadings[0];
        observedHeadings.forEach(function (heading) {
          if (heading.offsetTop <= content.scrollTop + 120) current = heading;
        });
        tocButtons.forEach(function (button) {
          button.classList.toggle('active', current && button.textContent === current.textContent);
        });
      }, { passive: true });

      function isMobile() {
        return window.matchMedia('(max-width: 860px)').matches;
      }

      function updateToggleLabel() {
        if (isMobile()) {
          toggle.textContent = document.body.classList.contains('mobile-prd-open') ? '查看原型' : '查看 PRD';
        } else {
          toggle.textContent = panel.classList.contains('collapsed') ? '展开 PRD' : '收起 PRD';
        }
      }

      toggle.addEventListener('click', function () {
        if (isMobile()) {
          document.body.classList.toggle('mobile-prd-open');
        } else {
          panel.classList.toggle('collapsed');
          drag.style.display = panel.classList.contains('collapsed') ? 'none' : '';
        }
        updateToggleLabel();
      });

      window.addEventListener('resize', function () {
        if (!isMobile()) document.body.classList.remove('mobile-prd-open');
        updateToggleLabel();
      });
      updateToggleLabel();

      function panelBounds() {
        return { min: 360, max: Math.floor(window.innerWidth * .7) };
      }

      function setPanelWidth(width) {
        var bounds = panelBounds();
        var nextWidth = Math.max(bounds.min, Math.min(bounds.max, width));
        panel.style.width = nextWidth + 'px';
        drag.setAttribute('aria-valuemax', String(bounds.max));
        drag.setAttribute('aria-valuenow', String(Math.round(nextWidth)));
      }
      setPanelWidth(panel.offsetWidth);

      drag.addEventListener('keydown', function (event) {
        if (panel.classList.contains('collapsed')) return;
        if (event.key !== 'ArrowLeft' && event.key !== 'ArrowRight') return;
        event.preventDefault();
        setPanelWidth(panel.offsetWidth + (event.key === 'ArrowLeft' ? 24 : -24));
      });

      drag.addEventListener('pointerdown', function (event) {
        if (panel.classList.contains('collapsed')) return;
        event.preventDefault();
        var startX = event.clientX;
        var startWidth = panel.offsetWidth;
        var pointerId = event.pointerId;
        drag.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        if (drag.setPointerCapture) drag.setPointerCapture(pointerId);

        function onMove(moveEvent) {
          var width = startWidth - (moveEvent.clientX - startX);
          setPanelWidth(width);
        }
        function onUp() {
          drag.classList.remove('dragging');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          if (drag.hasPointerCapture && drag.hasPointerCapture(pointerId)) drag.releasePointerCapture(pointerId);
          drag.removeEventListener('pointermove', onMove);
          drag.removeEventListener('pointerup', onUp);
          drag.removeEventListener('pointercancel', onUp);
        }
        drag.addEventListener('pointermove', onMove);
        drag.addEventListener('pointerup', onUp);
        drag.addEventListener('pointercancel', onUp);
      });

      function renderChangelog() {
        var list = document.getElementById('changeList');
        list.innerHTML = changelogData.map(function (item) {
          return '<li><time>' + escapeHtml(item.time) + '</time><p>' + escapeHtml(item.desc) + '</p></li>';
        }).join('');
      }
      renderChangelog();

      document.getElementById('changeBtn').addEventListener('click', function () {
        changeMask.classList.add('open');
        document.getElementById('closeChange').focus();
      });
      document.getElementById('closeChange').addEventListener('click', function () {
        changeMask.classList.remove('open');
      });
      changeMask.addEventListener('click', function (event) {
        if (event.target === changeMask) changeMask.classList.remove('open');
      });
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') changeMask.classList.remove('open');
      });
    });
  </script>
</body>
</html>

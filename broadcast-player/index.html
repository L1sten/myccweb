  <style>
  :root {
    --border: #e5e7eb;
    --border-light: #f0f0f0;
    --primary: #1677FF;
    --primary-light: #4096ff;
    --green: #22c55e;
    --text: #1f2937;
    --text-secondary: #6b7280;
  }
  html, body { height: 100% !important; overflow: hidden !important; }
  #root { height: 100% !important; }
  .app-split { display: flex !important; height: 100vh !important; overflow: hidden !important; }
  .app-split .page-container {
    flex: 1 !important; min-width: 0 !important; overflow: hidden !important;
    display: flex !important; align-items: center !important; justify-content: center !important;
    background: #111827 !important;
  }
  .prd-panel { width: 460px; flex-shrink: 0; display: flex; border-left: 1px solid var(--border); background: #fff; transition: width .2s, opacity .2s; }
  .prd-panel.collapsed { width: 0 !important; opacity: 0 !important; overflow: hidden !important; border: none !important; }
  .split-drag { width: 4px; cursor: col-resize; flex-shrink: 0; background: var(--border-light); transition: background .15s; position: relative; z-index: 10; }
  .split-drag:hover, .split-drag.dragging { background: var(--primary); }
  .split-drag::after { content: ''; position: absolute; left: -3px; right: -3px; top: 0; bottom: 0; }
  .prd-toc { width: 180px; border-right: 1px solid var(--border); overflow-y: auto; background: #fafafa; flex-shrink: 0; }
  .prd-content { flex: 1; overflow-y: auto; padding: 20px 24px; font-size: 14px !important; line-height: 1.7; color: var(--text); }
  .prd-content h1 { font-size: 20px !important; font-weight: 700 !important; margin: 24px 0 12px; }
  .prd-content h2 { font-size: 17px !important; font-weight: 600 !important; margin: 20px 0 10px; border-bottom: 1px solid var(--border-light); padding-bottom: 6px; }
  .prd-content h3 { font-size: 15px !important; font-weight: 600 !important; margin: 16px 0 8px; }
  .prd-content h4 { font-size: 14px !important; font-weight: 600 !important; margin: 12px 0 6px; }
  .prd-content p { margin: 8px 0; }
  .prd-content ul { margin: 6px 0 6px 20px; list-style: disc !important; }
  .prd-content li { margin: 4px 0; list-style: disc !important; }
  .prd-content ul.prd-list { margin: 8px 0 8px 20px; padding-left: 0; }
  .prd-content ul.prd-list > li { margin: 6px 0; list-style: disc !important; }
  .prd-content ul.prd-nested { margin: 2px 0 2px 18px; padding-left: 0; list-style: circle !important; }
  .prd-content ul.prd-nested li { list-style: circle !important; font-size: 13px !important; color: #555; }
  .prd-content hr { border: none; border-top: 1px solid var(--border-light); margin: 16px 0; }
  .prd-content strong { font-weight: 600 !important; }
  .prd-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
  .prd-content td, .prd-content th { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .prd-content th { background: #f9fafb; font-weight: 500; }
  .top-controls { position: fixed; top: 16px; right: 16px; z-index: 400; display: flex; align-items: center; gap: 8px; }
  .prd-toggle { display: flex; align-items: center; gap: 4px; padding: 5px 12px; background: #fff; border: 1px solid var(--border-light); border-radius: 14px; font-size: 12px; color: var(--text-secondary); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: all .2s; white-space: nowrap; }
  .prd-toggle:hover { border-color: var(--primary-light); color: var(--primary); }
  .prd-toggle .toggle-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; transition: background .2s; }
  .changelog-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; background: #fff; border: 1px solid var(--border-light); border-radius: 14px; font-size: 11px; color: var(--text-secondary); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: all .2s; white-space: nowrap; }
  .changelog-btn:hover { border-color: var(--primary-light); color: var(--primary); }
  .changelog-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 500; }
  .changelog-overlay.show { display: block; }
  .changelog-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 560px; max-height: 70vh; background: #fff; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); z-index: 501; overflow: hidden; }
  .changelog-modal.show { display: flex; flex-direction: column; }
  .changelog-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-light); }
  .changelog-header h3 { font-size: 15px; font-weight: 600; margin: 0; }
  .changelog-close { background: none; border: none; font-size: 20px; color: var(--text-secondary); cursor: pointer; padding: 0 4px; line-height: 1; }
  .changelog-close:hover { color: var(--text); }
  .changelog-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .changelog-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .changelog-table th { text-align: left; padding: 8px 12px; background: #f8f9fa; color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border-light); }
  .changelog-table td { padding: 8px 12px; border-bottom: 1px solid var(--border-light); vertical-align: top; }
  .changelog-table tr:last-child td { border-bottom: none; }
  .changelog-table td:first-child { white-space: nowrap; color: var(--text-secondary); font-size: 12px; }
</style>
</head>

  <div class="app-split">
    <div class="page-container">
      <div id="root"></div>
    </div>
    <div class="split-drag" id="splitDrag"></div>
    <div class="prd-panel" id="prdPanel">
      <div class="prd-toc" id="prdToc"></div>
      <div class="prd-content" id="prdContent"></div>
    </div>
  </div>

  <div class="top-controls">
    <button class="prd-toggle" id="prdToggle">
      <span class="toggle-dot"></span> PRD
    </button>
    <div class="changelog-btn" id="changelogBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
      <span>更新记录</span>
    </div>
  </div>

  <div class="changelog-overlay" id="changelogOverlay"></div>
  <div class="changelog-modal" id="changelogModal">
    <div class="changelog-header">
      <h3>更新记录</h3>
      <button class="changelog-close" id="changelogClose">&times;</button>
    </div>
    <div class="changelog-body" id="changelogBody"></div>

# 传播投手 — 发布传播需求 PRD

## 产品概述

### 背景

会展行业传播需求分散、对接效率低，客户需要一个标准化的需求提交入口，将传播需求（微博热搜、抖音热推、稿件推送、央媒传播、定制传播）统一收集，由运营团队快速匹配方案并执行。

### 目标

- 为客户提供 3 步极简的需求提交流程
- 结构化采集需求信息，减少沟通成本
- 提交后自动通知运营团队，24 小时内完成对接

### 用户角色

- **客户**：会展主办方或参展企业，需要传播推广服务
- **运营管理员**：接收需求、匹配方案、协调执行（本版本不含管理后台）

---

## 功能模块

### 一、发布传播需求（3 步表单）

#### Step 1：基本信息

**字段列表：**

- **任务名称**（必填）
  - 展示规则：单行文本输入框，placeholder「请输入任务名称」
  - 数据规则：最大长度 50 字符，超出截断
  - 校验规则：不可为空

- **任务起止时间**（必填）
  - 展示规则：两个日期选择器，中间用「至」连接
  - 数据规则：开始日期 ≤ 结束日期，不可选过去日期
  - 校验规则：两个日期均不可为空

- **传播服务类型**（必填）
  - 展示规则：标签组，每个标签含 emoji 图标 + 文字，单选
  - 数据规则：前端静态配置，固定排序（微博热搜、抖音热推、稿件热推、央媒传播、定制传播），从左到右、从上到下排列
  - 交互规则：选中后高亮为品牌蓝色背景，取消其他已选；切换类型时清空已选明细

- **传播服务明细**（必填，选择服务类型后展示）
  - 展示规则：单选卡片列表，每张卡片含标题 + 特性列表
  - 数据规则：根据所选服务类型筛选，仅展示当前类型下的明细项；每个类型含 1~2 个选项，按配置顺序从上到下展示；单选
  - 交互规则：选中后卡片边框变为品牌蓝色，显示勾选图标

#### Step 2：内容素材

**字段列表：**

- **文件上传**（选填）
  - 展示规则：虚线边框上传区域，含上传图标 + 文字说明
  - 数据规则：仅支持 docx、xlsx 格式，其他格式拒绝上传并提示；单文件不超过 5MB；最多 5 个文件；超长文件名截断显示
  - 交互规则：点击触发文件选择；上传成功后显示文件卡片（文件名 + 删除按钮）

- **任务描述**（必填）
  - 展示规则：多行文本域，placeholder「请详细描述您的传播需求...」
  - 数据规则：最大长度 500 字，超出截断，右下角实时显示「当前字数/500」
  - 校验规则：不可为空

**提示信息：** 蓝色提示条 —「提交后，运营团队将在24小时内与您对接，为您匹配最佳传播方案并协调执行。」

#### Step 3：对接人信息

**字段列表：**

- **姓名**（必填）
  - 展示规则：单行文本输入框
  - 校验规则：不可为空

- **联系方式**（必填）
  - 展示规则：单行文本输入框，placeholder「请输入手机号码」
  - 数据规则：11 位纯数字，符合中国大陆手机号格式（1 开头）
  - 校验规则：不可为空，格式不合规时提示

- **职务**（选填）
  - 展示规则：单行文本输入框

- **公司**（选填）
  - 展示规则：单行文本输入框

**需求概览卡片：**
- 展示规则：展示前两步已填信息的摘要（任务名称、起止时间、服务类型、附件数量、任务描述），只读不可编辑
- 数据规则：未填写字段显示「-」

---

## 全局交互规则

### 步骤导航

- 顶部进度条展示 3 个步骤，当前步骤高亮
- 底部操作区：第 1 步仅显示「下一步」；第 2~3 步显示「上一步」+「下一步/提交需求」
- 按钮状态：必填字段未满足时按钮置灰不可点击

### 提交行为

- 提交前校验：所有必填字段非空 + 格式合规
- 点击「提交需求」后弹出成功 Toast 提示
- 提交后停留在当前页面，不清空表单

### 视觉规范

- 主色调：#1677FF（品牌蓝）
- 渐变：从 #1677FF 到 #4F46E5（蓝紫渐变）
- 圆角：卡片 16px，按钮 12px，输入框 12px

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var toggle = document.getElementById('prdToggle');
      var panel = document.getElementById('prdPanel');
      var dot = toggle.querySelector('.toggle-dot');
      toggle.onclick = function() {
        panel.classList.toggle('collapsed');
        dot.style.background = panel.classList.contains('collapsed') ? '#aaa' : 'var(--green)';
      };
      var drag = document.getElementById('splitDrag');
      drag.onmousedown = function(e) {
        e.preventDefault();
        var startX = e.clientX, startW = panel.offsetWidth;
        drag.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        document.onmousemove = function(e2) {
          var w = startW - (e2.clientX - startX);
          if (w < 200) w = 200;
          if (w > window.innerWidth * 0.7) w = window.innerWidth * 0.7;
          panel.style.width = w + 'px';
        };
        document.onmouseup = function() {
          drag.classList.remove('dragging');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          document.onmousemove = null;
          document.onmouseup = null;
        };
      };
      var src = document.getElementById('prdMdSource');
      var el = document.getElementById('prdContent');
      var md = src ? src.value : '';
      if (!el || !md) return;
      function inlineFmt(s) { return s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); }
      var lines = md.split('\n');
      var h = '';
      var inUl = false, liOpen = false, inNestedUl = false;
      for (var j = 0; j < lines.length; j++) {
        var ln = lines[j], tr = ln.trim();
        if (!tr) {
          if (inNestedUl) { h += '</ul>'; inNestedUl = false; }
          if (liOpen) { h += '</li>'; liOpen = false; }
          if (inUl) { h += '</ul>'; inUl = false; }
          continue;
        }
        if (/^---+$/.test(tr)) {
          if (inNestedUl) { h += '</ul>'; inNestedUl = false; }
          if (liOpen) { h += '</li>'; liOpen = false; }
          if (inUl) { h += '</ul>'; inUl = false; }
          h += '<hr>'; continue;
        }
        var hm = tr.match(/^(#{1,4})\s+(.+)$/);
        if (hm) {
          if (inNestedUl) { h += '</ul>'; inNestedUl = false; }
          if (liOpen) { h += '</li>'; liOpen = false; }
          if (inUl) { h += '</ul>'; inUl = false; }
          h += '<h' + hm[1].length + '>' + inlineFmt(hm[2]) + '</h' + hm[1].length + '>';
          continue;
        }
        if (/^\s{2,}- /.test(ln)) {
          if (!inNestedUl) h += '<ul class="prd-nested">';
          inNestedUl = true;
          h += '<li>' + inlineFmt(tr.replace(/^- /, '')) + '</li>';
          continue;
        }
        if (/^- /.test(ln)) {
          if (inNestedUl) { h += '</ul>'; inNestedUl = false; }
          if (liOpen) h += '</li>';
          if (!inUl) { h += '<ul class="prd-list">'; inUl = true; }
          h += '<li>' + inlineFmt(tr.replace(/^- /, ''));
          liOpen = true;
          continue;
        }
        if (inNestedUl) { h += '</ul>'; inNestedUl = false; }
        if (liOpen) { h += '</li>'; liOpen = false; }
        if (inUl) { h += '</ul>'; inUl = false; }
        h += '<p>' + inlineFmt(tr) + '</p>';
      }
      if (inNestedUl) h += '</ul>';
      if (liOpen) h += '</li>';
      if (inUl) h += '</ul>';
      el.innerHTML = h;
      var toc = document.getElementById('prdToc');
      var headings = el.querySelectorAll('h2, h3');
      var th = '<div style="font-size:12px;font-weight:600;padding:12px;color:#333">目录</div>';
      for (var i = 0; i < headings.length; i++) {
        headings[i].id = 'h-' + i;
        var indent = headings[i].tagName === 'H3' ? 'padding-left:12px;' : '';
        th += '<div onclick="document.getElementById(\'h-' + i + '\').scrollIntoView({behavior:\'smooth\',block:\'start\'})" style="display:block;padding:6px 12px;font-size:12px;color:#666;cursor:pointer;' + indent + '">' + headings[i].textContent + '</div>';
      }
      toc.innerHTML = th;

      // Changelog
      var changelogData = [
        { time: '2026-04-23 22:00', desc: 'Figma Make 原型复刻，React+Tailwind 重构，3步表单，PRD面板，本地内联构建' }
      ];
      var clOverlay = document.getElementById('changelogOverlay');
      var clModal = document.getElementById('changelogModal');
      var clBody = document.getElementById('changelogBody');
      document.getElementById('changelogBtn').onclick = function() {
        var h = '<table class="changelog-table"><thead><tr><th>更新时间</th><th>说明</th></tr></thead><tbody>';
        for (var i = 0; i < changelogData.length; i++) {
          h += '<tr><td>' + changelogData[i].time + '</td><td>' + changelogData[i].desc + '</td></tr>';
        }
        h += '</tbody></table>';
        clBody.innerHTML = h;
        clOverlay.classList.add('show');
        clModal.classList.add('show');
      };
      document.getElementById('changelogClose').onclick = function() {
        clOverlay.classList.remove('show');
        clModal.classList.remove('show');
      };
      clOverlay.onclick = function() {
        clOverlay.classList.remove('show');
        clModal.classList.remove('show');
      };
    });
  </script>
</body>
</html>

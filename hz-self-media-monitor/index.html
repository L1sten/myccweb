<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>涉杭自媒体监测</title>
<script src="../auth.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#0b78f0;
  --primary-dark:#0067d8;
  --primary-soft:#e8f3ff;
  --primary-line:#b9d9ff;
  --green:#00a870;
  --green-soft:#e8f8f0;
  --orange:#ff7d00;
  --orange-soft:#fff3e0;
  --red:#f53f3f;
  --red-soft:#ffece8;
  --purple:#7b61ff;
  --purple-soft:#f0edff;
  --text:#1d2129;
  --text-2:#4e5969;
  --text-3:#86909c;
  --text-4:#c9cdd4;
  --border:#e5e8ef;
  --border-light:#f0f2f5;
  --page:#f4f6fb;
  --surface:#fff;
  --surface-soft:#f7f8fa;
  --header-h:68px;
  --sidebar-w:212px;
  --radius:4px;
}
html{font-size:14px}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
  color:var(--text);
  background:var(--page);
  line-height:1.5;
}
button,input,select{font:inherit}
button{border:none;background:none;cursor:pointer}
a{color:inherit;text-decoration:none}
.svg-icon{width:18px;height:18px;display:inline-block;vertical-align:middle;flex-shrink:0}

.app-split{display:flex;height:100vh;overflow:hidden;background:var(--page)}
.app-split .page-container{flex:1;min-width:0;overflow:hidden;background:var(--page);position:relative}

.app-shell{position:relative;min-width:1180px;height:100vh;overflow:hidden}
.topbar{
  position:absolute;top:0;left:0;right:0;height:var(--header-h);z-index:80;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;background:#0b80f4;color:#fff;box-shadow:0 1px 0 rgba(0,0,0,.06)
}
.brand{display:flex;align-items:center;gap:11px;font-size:22px;font-weight:600;letter-spacing:0}
.brand .screen-icon{width:28px;height:28px;color:#fff}
.top-actions{display:flex;align-items:center;gap:18px;font-size:15px;white-space:nowrap}
.user-chip{display:flex;align-items:center;gap:10px;font-weight:600}
.avatar{width:38px;height:38px;border-radius:50%;background:#eff3f8;color:#9aa3af;display:grid;place-items:center}
.header-link{color:#fff;font-weight:500}
.header-link:hover{text-decoration:underline}

.sidebar{
  position:absolute;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);z-index:70;
  background:#fff;border-right:1px solid #eef0f5;overflow-y:auto;padding-top:14px
}
.nav-group{margin-bottom:8px}
.nav-item{
  min-height:52px;padding:0 20px 0 24px;display:flex;align-items:center;gap:12px;
  color:#1f2933;font-size:15px;position:relative;transition:background .16s ease,color .16s ease
}
.nav-item:hover{background:#f7fbff;color:var(--primary)}
.nav-item .nav-icon{width:18px;height:18px;color:#1f2933}
.nav-item:hover .nav-icon,.nav-item.active .nav-icon{color:var(--primary)}
.nav-item .badge{width:20px;height:20px;border-radius:50%;background:#f45f6c;color:#fff;display:grid;place-items:center;font-size:12px}
.nav-item .chev{margin-left:auto;width:14px;height:14px;transition:transform .18s ease}
.nav-item.expanded .chev{transform:rotate(180deg)}
.nav-sub{padding:4px 0 8px}
.nav-sub .sub-item{
  height:52px;display:flex;align-items:center;padding-left:51px;font-size:15px;color:#1f2933;
  position:relative;transition:background .16s ease,color .16s ease
}
.nav-sub .sub-item:hover{background:#f7fbff;color:var(--primary)}
.nav-sub .sub-item.active{background:#dceeff;color:var(--primary);font-weight:500}
.nav-sub .sub-item.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--primary)}

.main{margin-left:var(--sidebar-w);padding-top:var(--header-h);height:100vh;overflow:auto}
.page-stage{padding:20px 20px 44px}
.workspace{background:#fff;min-height:calc(100vh - var(--header-h) - 40px);padding:0 16px 22px}
.tabs-row{display:flex;align-items:flex-end;background:#f5f5f5;padding:12px 16px 0;margin:0 -16px 18px}
.tab{
  height:42px;display:flex;align-items:center;padding:0 22px;border:1px solid #e5e8ef;border-bottom:none;
  background:#f0f0f0;color:#222;font-weight:600;transition:color .16s ease,background .16s ease
}
.tab:hover{color:var(--primary)}
.tab.active{background:#fff;color:var(--primary);position:relative}
.tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:#fff}
.export-link{
  margin-left:auto;height:42px;padding:0 16px;display:flex;align-items:center;gap:6px;color:var(--primary);font-size:15px;font-weight:500
}
.export-link:hover{text-decoration:underline}

.filters{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:0 0 14px}
.filter-item{display:flex;align-items:center;gap:8px;color:#222;font-size:14px;white-space:nowrap}
.control{
  height:34px;border:1px solid #d9dee8;background:#fff;border-radius:4px;color:#1f2933;padding:0 12px;outline:none;min-width:150px;
  transition:border-color .16s ease,box-shadow .16s ease
}
select.control{padding-right:28px}
.control:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(11,120,240,.12)}
.date-range{display:flex;align-items:center;border:1px solid #d9dee8;border-radius:4px;height:34px;background:#fff;overflow:hidden}
.date-range input{height:32px;border:0;outline:none;padding:0 11px;width:130px;color:#1f2933}
.date-range span{color:#4e5969;padding:0 5px}
.search-box{display:flex;align-items:center;margin-left:auto}
.search-box input{width:250px;height:34px;border:1px solid #d9dee8;border-right:0;border-radius:4px 0 0 4px;padding:0 12px;outline:none}
.search-box input:focus{border-color:var(--primary)}
.search-btn{width:42px;height:34px;background:#006ef0;color:#fff;border-radius:0 4px 4px 0;display:grid;place-items:center}
.search-btn:hover{background:var(--primary-dark)}

.tag{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:3px;font-size:12px;font-weight:500;white-space:nowrap}
.tag.gray{background:#f2f3f5;color:#4e5969}

.table-wrap{background:#fff;border:1px solid #edf0f5;border-radius:4px;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{
  height:44px;background:#fff;color:#1d2129;font-size:15px;font-weight:600;text-align:left;border-bottom:1px solid #edf0f5;padding:0 12px;white-space:nowrap
}
tbody tr:nth-child(odd){background:#f5f6f8}
tbody tr:nth-child(even){background:#fff}
tbody tr:hover{background:#eef6ff}
td{height:49px;padding:0 12px;color:#1d2129;font-size:14px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.checkbox{width:14px;height:14px;border:1px solid #dbe0e8;border-radius:2px;background:#fff;display:inline-block}
.col-check{width:36px;text-align:center}
.col-index{width:54px;text-align:center}
.col-platform{width:112px}
.col-account{width:150px}
.col-title{width:620px}
.col-time{width:154px}
.title-link{color:#0074ff;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.title-link:hover{text-decoration:underline}
.platform-tag{display:inline-flex;align-items:center;height:24px;padding:0 8px;border-radius:3px;font-size:12px;font-weight:500;background:#f2f3f5;color:#1d2129}
.platform-tag.weibo{background:#fff5e8;color:#a55600}
.platform-tag.douyin{background:#fff0f0;color:#a12b2b}
.platform-tag.wechat{background:#e8f8f0;color:#0b8f5a}
.platform-tag.video{background:#f0edff;color:#5b45d6}
.account-name{display:block;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pagination{height:52px;display:flex;align-items:center;justify-content:center;gap:12px;color:#1d2129;font-size:13px;background:#fff}
.page-select{height:30px;border:1px solid #cfd6e1;border-radius:4px;background:#fff;padding:0 8px}
.page-step{height:28px;border:1px solid #cfd6e1;border-radius:3px;background:#fff;padding:0 9px;color:#4e5969}
.page-step:hover{border-color:var(--primary);color:var(--primary)}
.page-step[disabled]{color:#c9cdd4;background:#f7f8fa;border-color:#e5e8ef;cursor:not-allowed}

.toast{position:absolute;left:50%;top:88px;transform:translateX(-50%) translateY(-10px);background:#1d2129;color:#fff;border-radius:4px;padding:9px 14px;z-index:900;opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;font-size:13px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== PRD Panel ===== */
.prd-panel{width:460px;flex-shrink:0;display:flex;border-left:1px solid var(--border);transition:opacity .3s;background:#fff}
.prd-panel.collapsed{width:0;opacity:0;overflow:hidden;border:none}
.split-drag{width:4px;cursor:col-resize;flex-shrink:0;background:var(--border-light);transition:background .15s;position:relative;z-index:10}
.split-drag:hover,.split-drag.dragging{background:var(--primary)}
.split-drag::after{content:"";position:absolute;left:-3px;right:-3px;top:0;bottom:0}
.prd-toc{width:180px;border-right:1px solid var(--border);overflow-y:auto;background:#fafafa;flex-shrink:0}
.prd-toc-inner{padding:12px 0}
.prd-toc-title{padding:10px 16px 8px;font-size:12px;font-weight:700;color:#1d2129}
.prd-toc-item{display:block;padding:6px 16px;font-size:12px;color:#4e5969;cursor:pointer;transition:all .15s;border-left:2px solid transparent;line-height:1.35}
.prd-toc-item:hover{color:var(--primary);background:#f0f5ff}
.prd-toc-item.active{color:var(--primary);border-left-color:var(--primary);background:#f0f5ff;font-weight:500}
.prd-toc-item.sub{padding-left:28px;font-size:11px}
.prd-content{flex:1;overflow-y:auto;padding:24px;background:#fff}
.prd-content h1{font-size:22px !important;font-weight:600 !important;margin:0 0 16px 0 !important;color:#1d2129 !important}
.prd-content h2{font-size:17px !important;font-weight:600 !important;margin:24px 0 12px 0 !important;color:#1d2129 !important;padding-bottom:8px;border-bottom:1px solid var(--border-light)}
.prd-content h3{font-size:15px !important;font-weight:600 !important;margin:20px 0 8px 0 !important;color:#1d2129 !important}
.prd-content h4{font-size:14px !important;font-weight:600 !important;margin:16px 0 6px 0 !important;color:#1d2129 !important}
.prd-content p{font-size:13px !important;line-height:1.7 !important;margin:8px 0 !important;color:#444 !important}
.prd-content ul.prd-list{margin:8px 0 8px 20px!important;padding-left:0!important}
.prd-content ul.prd-list>li{margin:6px 0!important;list-style:disc!important;font-size:13px!important;color:#444!important;line-height:1.65!important}
.prd-content ul.prd-nested{margin:2px 0 2px 18px!important;padding-left:0!important;list-style:circle!important}
.prd-content ul.prd-nested li{list-style:circle!important;font-size:13px!important;color:#555;line-height:1.65!important}
.prd-content hr{border:none;border-top:1px solid var(--border-light);margin:16px 0}
.prd-content strong{font-weight:600!important;color:#1d2129!important}
.prd-content table.prd-table{width:100%!important;border-collapse:collapse!important;margin:12px 0!important;font-size:13px!important}
.prd-content table.prd-table th{background:#f8f9fa!important;padding:8px 12px!important;text-align:left!important;border:1px solid var(--border-light)!important;font-weight:600!important;color:#1d2129!important;font-size:12px!important}
.prd-content table.prd-table td{padding:8px 12px!important;border:1px solid var(--border-light)!important;color:#444!important;font-size:13px!important;line-height:1.6!important}
.top-controls{position:fixed;top:78px;right:14px;z-index:400;display:flex;align-items:center;gap:8px}
.prd-toggle{display:flex;align-items:center;gap:4px;padding:5px 12px;background:#fff;border:1px solid var(--border-light);border-radius:14px;font-size:12px;color:#4e5969;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .2s;white-space:nowrap}
.prd-toggle:hover{border-color:var(--primary-line);color:var(--primary)}
.prd-toggle .toggle-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.changelog-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;background:#fff;border:1px solid var(--border-light);border-radius:14px;font-size:11px;color:#4e5969;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .2s;white-space:nowrap}
.changelog-btn:hover{border-color:var(--primary-line);color:var(--primary)}
.changelog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500}
.changelog-overlay.show{display:block}
.changelog-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:560px;max-height:70vh;background:#fff;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:501;overflow:hidden}
.changelog-modal.show{display:flex;flex-direction:column}
.changelog-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-light)}
.changelog-header h3{font-size:15px;font-weight:600;margin:0}
.changelog-close{background:none;border:none;font-size:20px;color:#4e5969;cursor:pointer;padding:0 4px;line-height:1}
.changelog-close:hover{color:#1d2129}
.changelog-body{flex:1;overflow-y:auto;padding:16px 20px}
.changelog-table{width:100%;border-collapse:collapse;font-size:13px}
.changelog-table th{text-align:left;padding:8px 12px;background:#f8f9fa;color:#4e5969;font-weight:500;border-bottom:1px solid var(--border-light)}
.changelog-table td{padding:8px 12px;border-bottom:1px solid var(--border-light);vertical-align:top}
.changelog-table tr:last-child td{border-bottom:none}
.changelog-table td:first-child{white-space:nowrap;color:#4e5969;font-size:12px}

@media (max-width:980px){
  .app-shell{min-width:980px}
}
</style>
</head>
<body>
<div class="app-split">
  <div class="page-container">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <svg class="screen-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="13" rx="2"></rect><path d="M8 21h8"></path><path d="M12 17v4"></path></svg>
          <span>杭州市互联网传播力分析工作台</span>
        </div>
        <div class="top-actions">
          <div class="user-chip">
            <span class="avatar"><svg class="svg-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-5.33 0-8 2.24-8 5v1h16v-1c0-2.76-2.67-5-8-5Z"></path></svg></span>
            <span>Hi，杭州市委网信办</span>
          </div>
          <a class="header-link" href="javascript:void(0)">进入大屏</a>
          <a class="header-link" href="javascript:void(0)">退出</a>
        </div>
      </header>

      <aside class="sidebar">
        <div class="nav-group">
          <div class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 11 9-8 9 8"></path><path d="M5 10v10h14V10"></path></svg><span>首页</span></div>
          <div class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path></svg><span>通知消息</span><span class="badge">1</span></div>
        </div>
        <div class="nav-group">
          <div class="nav-item expanded"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16"></path><path d="M7 12h10"></path><path d="M10 18h4"></path></svg><span>正能量聚合</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"></path></svg></div>
          <div class="nav-sub">
            <div class="sub-item">内容管理</div>
            <div class="sub-item">资源总库</div>
          </div>
        </div>
        <div class="nav-group">
          <div class="nav-item expanded active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3"></path><path d="M18 3h3v3"></path><path d="M12 12 21 3"></path></svg><span>正能量监测</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"></path></svg></div>
          <div class="nav-sub">
            <div class="sub-item">涉杭重点监测</div>
            <div class="sub-item">涉杭主题监测</div>
            <div class="sub-item active">涉杭自媒体监测</div>
          </div>
        </div>
        <div class="nav-group">
          <div class="nav-item expanded"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5"></path><path d="M8 21H3v-5"></path><path d="M21 3 14 10"></path><path d="M3 21l7-7"></path></svg><span>队伍协同</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"></path></svg></div>
        </div>
        <div class="nav-group">
          <div class="nav-item expanded"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18"></path><path d="M12 3v18"></path></svg><span>多方协同策划</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"></path></svg></div>
          <div class="nav-sub">
            <div class="sub-item">一起策划</div>
            <div class="sub-item">策划组织</div>
          </div>
        </div>
        <div class="nav-group">
          <div class="nav-item expanded"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg><span>立体传播</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"></path></svg></div>
          <div class="nav-sub">
            <div class="sub-item">传播推送</div>
          </div>
        </div>
        <div class="nav-group">
          <div class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 8a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6 1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 8c.37.56.96.91 1.6.91H21a2 2 0 0 1 0 4h-.09A1.65 1.65 0 0 0 19.4 15Z"></path></svg><span>系统配置</span></div>
        </div>
      </aside>

      <main class="main">
        <div class="page-stage">
          <section class="workspace">
            <div class="tabs-row">
              <button class="tab">涉杭重点监测</button>
              <button class="tab">涉杭热点话题</button>
              <button class="tab active">涉杭自媒体监测</button>
              <button class="export-link" id="exportBtn">
                <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg>
                <span>导出</span>
              </button>
            </div>

            <div class="filters">
              <label class="filter-item">发布平台：
                <select class="control" id="platformFilter">
                  <option>全部平台</option>
                  <option>微博</option>
                  <option>抖音</option>
                  <option>微信公众号</option>
                  <option>视频号</option>
                </select>
              </label>
              <label class="filter-item">发布账号：
                <select class="control" id="accountFilter">
                  <option>全部账号</option>
                </select>
              </label>
              <label class="filter-item">发布日期：
                <span class="date-range">
                  <input id="dateStart" value="2026-05-27" aria-label="开始日期">
                  <span>–</span>
                  <input id="dateEnd" value="2026-06-03" aria-label="结束日期">
                </span>

<textarea id="prdMdSource" style="display:none"># 涉杭自媒体监测 产品需求文档

## 1. 产品概述

### 1.1 背景

杭州市网信日常运营需要持续关注自媒体账号围绕杭州发布的内容，及时发现可供日常运营跟进的涉杭发文。现有页面已有“涉杭重点监测”“涉杭热点话题”等能力，本需求在同一工作台中新增“涉杭自媒体监测”tab，聚焦第一批定向自媒体账号的发文监测。

### 1.2 产品目标

- 将第一批涉杭自媒体账号发文统一汇总到一个列表页，降低日常巡看成本。
- 支持按平台、账号、发布时间和标题内容快速筛选发文。
- 保持列表信息克制，仅展示发文内容本身及来源信息。

### 1.3 用户角色

- **日常运营人员**：查看涉杭自媒体发文，按平台、账号、时间和标题内容进行筛选。
- **值班编辑**：查看发文标题、发布时间和原文来源，判断是否需要进一步人工跟进。
- **运营负责人**：了解第一批定向账号在当前周期内的发文情况。

### 1.4 数据来源与范围

- **账号来源**：来自《自媒体抓取账号第一批（4.29）》账号清单。
- **平台范围**：微博、抖音、微信公众号、视频号。
- **内容范围**：账号发布的主贴、视频标题、公众号文章等发文内容及来源信息。

---

## 2. 页面入口与导航

### 2.1 一级导航

- **展示规则**
  - 页面沿用“杭州市互联网传播力分析工作台”整体框架。
  - 左侧导航中“正能量监测”为展开状态。
  - “涉杭自媒体监测”在“正能量监测”分组下显示为选中菜单项。
- **交互规则**
  - 点击左侧“涉杭自媒体监测”进入本页面。
  - 左侧其他菜单保持现有跳转规则。
- **数据规则**
  - **取数规则**：导航权限读取当前用户可访问的监测模块。
  - **数据筛选规则**：仅展示当前用户有权限访问的菜单项。
  - **数据排序规则**：菜单顺序沿用现有工作台配置。

### 2.2 顶部 tab

- **展示规则**
  - 内容区顶部展示三个 tab：涉杭重点监测、涉杭热点话题、涉杭自媒体监测。
  - 默认选中“涉杭自媒体监测”，选中态使用蓝色文字和白底页签。
- **交互规则**
  - 点击其他 tab 时切换到对应页面。
  - 当前 tab 不重复刷新。
- **数据规则**
  - **取数规则**：读取当前模块可用的 tab 配置。
  - **数据筛选规则**：根据当前用户权限展示可访问 tab。
  - **数据排序规则**：按业务配置顺序展示。

---

## 3. 筛选与检索

### 3.1 平台筛选

- **展示规则**
  - 使用下拉选择器，默认“全部平台”。
  - 选项包含：全部平台、微博、抖音、微信公众号、视频号。
- **交互规则**
  - 选择后立即刷新发文列表。
  - 平台筛选与其他筛选条件取交集。
- **数据规则**
  - **取数规则**：读取发文记录对应的发布平台。
  - **数据筛选规则**：按平台精确匹配；选择“全部平台”时不限制平台。
  - **数据排序规则**：筛选后列表继续按发布时间倒序排列。

### 3.2 账号筛选

- **展示规则**
  - 使用下拉选择器，默认“全部账号”。
  - 账号选项随平台筛选联动。
- **交互规则**
  - 选择账号后仅展示该账号的发文记录。
  - 切换平台后，账号选项联动为该平台下账号，并默认回到“全部账号”。
- **数据规则**
  - **取数规则**：账号名称来自第一批账号清单，发文列表读取发文记录绑定的账号。
  - **数据筛选规则**：按账号名称精确匹配；平台筛选已选时，仅展示该平台下账号。
  - **数据排序规则**：账号选项按账号清单顺序展示。

### 3.3 发布时间筛选

- **展示规则**
  - 使用起止日期选择器，默认最近 7 天。
  - 日期格式为 YYYY-MM-DD。
- **交互规则**
  - 修改日期后刷新发文列表。
  - 开始日期不得晚于结束日期，错误时提示用户调整。
- **数据规则**
  - **取数规则**：读取发文记录的发布时间。
  - **数据筛选规则**：仅展示发布时间落在起止日期范围内的记录，包含开始日和结束日。
  - **数据排序规则**：默认按发布时间倒序排列；点击发布时间表头可切换倒序或正序。

### 3.4 标题检索

- **展示规则**
  - 搜索框 placeholder 为“请输入标题/账号”。
  - 右侧提供搜索按钮。
- **交互规则**
  - 点击搜索按钮或按 Enter 触发检索。
  - 清空输入后恢复当前筛选条件下的全部结果。
- **数据规则**
  - **取数规则**：读取发文标题和账号名称。
  - **数据筛选规则**：支持模糊匹配，输入内容与平台、账号、发布时间筛选取交集。
  - **数据排序规则**：检索结果默认按发布时间倒序排列。

---

## 4. 发文列表

### 4.1 列表字段

- **序号**
  - 展示规则：按当前分页从 1 开始递增，居中展示。
  - 交互规则：纯展示。
  - 数据规则：按当前筛选结果和分页位置生成；无独立取数；排序跟随列表排序。

- **发布平台**
  - 展示规则：展示平台名称标签，包含微博、抖音、微信公众号、视频号。
  - 交互规则：点击平台标签可快速筛选同平台内容。
  - 数据规则：取数自发文来源平台；筛选规则为平台精确匹配；排序不按平台优先。

- **发布账号**
  - 展示规则：展示账号名称。
  - 交互规则：点击账号名称可筛选同账号内容。
  - 数据规则：取数自第一批账号清单和发文记录绑定关系；筛选规则为账号精确匹配；排序不按账号优先。

- **发文标题**
  - 展示规则：标题以蓝色链接样式展示；列表内按列宽单行展示，超出部分以省略号截断；鼠标悬停展示完整标题。
  - 交互规则：点击标题在新窗口打开原文链接。
  - 数据规则：取数自发文标题和原文链接；筛选规则支持标题模糊匹配；排序默认按发布时间倒序；导出 Excel 时输出完整标题。

- **发布时间**
  - 展示规则：展示为 YYYY-MM-DD HH:mm。
  - 交互规则：点击表头可在时间倒序和正序间切换。
  - 数据规则：取数自发文发布时间；筛选规则为日期范围；默认排序为发布时间倒序。

### 4.2 分页

- **展示规则**
  - 列表底部展示总数、每页条数、上一页、下一页。
  - 默认每页 10 条，可切换 10 条/页、20 条/页、50 条/页。
- **交互规则**
  - 首页时上一页置灰，末页时下一页置灰。
  - 切换每页条数后回到第一页。
- **数据规则**
  - **取数规则**：读取当前筛选条件下的发文列表总数。
  - **数据筛选规则**：分页基于当前筛选后的结果集。
  - **数据排序规则**：分页前先完成排序，默认按发布时间倒序。

---

## 5. 导出

- **展示规则**
  - 页面右上角展示“导出”按钮。
  - 导出内容包含发布平台、发布账号、发文标题、发布时间和原文链接。
  - 导出文件格式为 Excel，文件名规则为：涉杭自媒体监测_发文列表_YYYYMMDD-HHmm.xls，其中时间取用户点击导出时的本地时间。
- **交互规则**
  - 点击导出按钮后生成当前筛选结果的 Excel 文件。
  - 导出完成后展示成功提示。
- **数据规则**
  - **取数规则**：读取当前筛选结果中的内容字段和来源字段。
  - **数据筛选规则**：导出结果与当前平台、账号、发布时间、标题检索条件保持一致。
  - **数据排序规则**：导出结果与当前列表排序一致，默认按发布时间倒序。

---

## 6. 全局交互规则

- 所有筛选条件默认取交集。
- 列表随平台、账号、发布时间和标题检索条件同步刷新。
- 原文链接用于查看发文来源。
- 无数据时展示空状态，提示用户调整平台、账号、日期或标题检索。

---

## 7. 验收标准

- 页面在“正能量监测”下新增“涉杭自媒体监测”tab。
- 页面默认展示涉杭自媒体发文列表。
- 支持平台、账号、发布时间和标题检索筛选。
- 列表包含发布时间字段，并默认按发布时间倒序排列。
- 点击发文标题可在新窗口打开原文链接。
- 导出文件为 Excel 格式，文件名包含导出时间，格式为涉杭自媒体监测_发文列表_YYYYMMDD-HHmm.xls。
- PRD 与原型中的字段、筛选、排序和导出口径保持一致。
</textarea>

var state = {page:1,pageSize:10,sortDesc:true,query:""};

function qs(id){return document.getElementById(id)}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(ch){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]})}
function platformClass(p){return p==="微博"?"weibo":p==="抖音"?"douyin":p==="微信公众号"?"wechat":"video"}
function filteredPosts(){
  var platform = qs("platformFilter").value;
  var account = qs("accountFilter").value;
  var query = state.query.trim().toLowerCase();
  var start = qs("dateStart").value.replace(/-/g,"");
  var end = qs("dateEnd").value.replace(/-/g,"");
  var rows = posts.filter(function(p){
    var day = p.time.slice(0,10).replace(/-/g,"");
    var text = (p.title + " " + p.account).toLowerCase();
    return (platform==="全部平台" || p.platform===platform)
      && (account==="全部账号" || p.account===account)
      && (!query || text.indexOf(query)>-1)
      && (!start || day>=start)
      && (!end || day<=end);
  });
  rows.sort(function(a,b){return state.sortDesc ? b.time.localeCompare(a.time) : a.time.localeCompare(b.time)});
  return rows;
}
function renderAccounts(){
  var platform = qs("platformFilter").value;
  var selected = qs("accountFilter").value;
  var accounts = accountSource.filter(function(a){return platform==="全部平台" || a.platform===platform});
  var seen = {};
  var opts = ['<option>全部账号</option>'].concat(accounts.filter(function(a){
    var key = a.platform + "-" + a.name;
    if(seen[key]) return false;
    seen[key] = true;
    return true;
  }).map(function(a){return '<option>'+escapeHtml(a.name)+'</option>'}));
  qs("accountFilter").innerHTML = opts.join("");
  if(accounts.some(function(a){return a.name===selected})) qs("accountFilter").value = selected;
}
function highlightTitle(title){
  var q = state.query.trim();
  var out = escapeHtml(title);
  if(q) out = out.replace(new RegExp(escapeReg(q),"ig"),function(m){return '<span class="tag gray">'+m+'</span>'});
  return out;
}
function escapeReg(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}
function exportStamp(){
  var d = new Date();
  function pad(n){return String(n).padStart(2,"0")}
  return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + "-" + pad(d.getHours()) + pad(d.getMinutes());
}
function renderTable(){
  var rows = filteredPosts();
  var start = (state.page-1)*state.pageSize;
  var pageRows = rows.slice(start,start+state.pageSize);
  if(!pageRows.length){
    qs("postRows").innerHTML = '<tr><td colspan="6" style="height:120px;text-align:center;color:#86909c;background:#fff;">暂无匹配发文，请调整筛选条件</td></tr>';
  } else {
    qs("postRows").innerHTML = pageRows.map(function(p,idx){
      return '<tr>'
        + '<td class="col-check"><span class="checkbox"></span></td>'
        + '<td class="col-index">'+(start+idx+1)+'</td>'
        + '<td><button class="platform-tag '+platformClass(p.platform)+'" data-platform="'+escapeHtml(p.platform)+'">'+escapeHtml(p.platform)+'</button></td>'
        + '<td><button class="account-name" data-account="'+escapeHtml(p.account)+'">'+escapeHtml(p.account)+'</button></td>'
        + '<td><a class="title-link" href="'+escapeHtml(p.source)+'" target="_blank" rel="noopener noreferrer" title="'+escapeHtml(p.title)+'">'+highlightTitle(p.title)+'</a></td>'
        + '<td>'+escapeHtml(p.time)+'</td>'
        + '</tr>';
    }).join("");
  }
  qs("pageTotal").textContent = "共 " + rows.length + " 条";
  qs("prevPage").disabled = state.page <= 1;
  qs("nextPage").disabled = start + state.pageSize >= rows.length;
  qs("sortMark").textContent = state.sortDesc ? "↓" : "↑";
}
function refresh(){
  renderAccounts();
  renderTable();
}
function showToast(text){
  var t = qs("toast");
  t.textContent = text;
  t.classList.add("show");
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(function(){t.classList.remove("show")},1800);
}
function exportCurrent(){
  var rows = filteredPosts();
  var headers = ["平台","账号","标题","发布时间","原文链接"];
  var sheetRows = [
    "<Row>" + headers.map(function(h){return '<Cell><Data ss:Type="String">'+escapeHtml(h)+"</Data></Cell>"}).join("") + "</Row>"
  ].concat(rows.map(function(p){
    return "<Row>" + [p.platform,p.account,p.title,p.time,p.source].map(function(v){
      return '<Cell><Data ss:Type="String">'+escapeHtml(v)+"</Data></Cell>";
    }).join("") + "</Row>";
  })).join("");
  var workbook = '<?xml version="1.0" encoding="UTF-8"?>'
    + '<?mso-application progid="Excel.Sheet"?>'
    + '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" '
    + 'xmlns:o="urn:schemas-microsoft-com:office:office" '
    + 'xmlns:x="urn:schemas-microsoft-com:office:excel" '
    + 'xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">'
    + '<Worksheet ss:Name="发文列表"><Table>' + sheetRows + '</Table></Worksheet></Workbook>';
  var blob = new Blob(["\ufeff"+workbook], {type:"application/vnd.ms-excel;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "涉杭自媒体监测_发文列表_" + exportStamp() + ".xls";
  a.click();
  URL.revokeObjectURL(a.href);
  showToast("已导出当前筛选结果为 Excel");
}

document.addEventListener("DOMContentLoaded",function(){
  refresh();
  qs("platformFilter").addEventListener("change",function(){state.page=1;qs("accountFilter").value="全部账号";refresh()});
  qs("accountFilter").addEventListener("change",function(){state.page=1;renderTable()});
  qs("dateStart").addEventListener("change",function(){state.page=1;renderTable()});
  qs("dateEnd").addEventListener("change",function(){state.page=1;renderTable()});
  qs("searchBtn").addEventListener("click",function(){state.query=qs("keywordInput").value;state.page=1;renderTable()});
  qs("keywordInput").addEventListener("keydown",function(e){if(e.key==="Enter"){state.query=qs("keywordInput").value;state.page=1;renderTable()}});
  qs("postRows").addEventListener("click",function(e){
    var pf=e.target.closest("[data-platform]"); if(pf){qs("platformFilter").value=pf.dataset.platform;state.page=1;refresh();return}
    var ac=e.target.closest("[data-account]"); if(ac){qs("accountFilter").value=ac.dataset.account;state.page=1;renderTable();return}
  });
  qs("timeSort").addEventListener("click",function(){state.sortDesc=!state.sortDesc;renderTable()});
  qs("pageSize").addEventListener("change",function(){state.pageSize=Number(this.value);state.page=1;renderTable()});
  qs("prevPage").addEventListener("click",function(){if(state.page>1){state.page--;renderTable()}});
  qs("nextPage").addEventListener("click",function(){state.page++;renderTable()});
  qs("exportBtn").addEventListener("click",exportCurrent);
});

</script>

<script>
function togglePrdPanel(){
  var panel=document.getElementById("prdPanel");
  var toggle=document.getElementById("prdToggle");
  var dot=toggle.querySelector(".toggle-dot");
  panel.classList.toggle("collapsed");
  dot.style.background=panel.classList.contains("collapsed") ? "#aaa" : "var(--green)";
}
function downloadPrd(){
  var md=document.getElementById("prdMdSource").textContent;
  var blob=new Blob([md],{type:"text/markdown;charset=utf-8"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="涉杭自媒体监测PRD.md";
  a.click();
  URL.revokeObjectURL(a.href);
}
var changelogData = [
  {time:"2026-06-03 17:11",desc:"新增涉杭自媒体监测原型与 PRD，支持平台、账号、发布时间和标题检索，标题跳转原文，Excel 导出和标题截断规则。"}
];
function toggleChangelog(){
  var overlay=document.getElementById("changelogOverlay");
  var modal=document.getElementById("changelogModal");
  var isOpen=modal.classList.contains("show");
  overlay.classList.toggle("show",!isOpen);
  modal.classList.toggle("show",!isOpen);
  if(!isOpen) renderChangelog();
}
function renderChangelog(){
  var body=document.getElementById("changelogBody");
  if(!changelogData.length){body.innerHTML='<p style="color:#86909c;font-size:13px;">暂无发布记录；本地原型确认后再同步发布记录。</p>';return}
  var html='<table class="changelog-table"><thead><tr><th>更新时间</th><th>说明</th></tr></thead><tbody>';
  changelogData.forEach(function(item){html+='<tr><td>'+item.time+'</td><td>'+item.desc+'</td></tr>'});
  html+='</tbody></table>';
  body.innerHTML=html;
}
(function(){
  var drag=document.getElementById("splitDrag");
  var panel=document.getElementById("prdPanel");
  var startX,startW;
  drag.addEventListener("mousedown",function(e){
    e.preventDefault();
    startX=e.clientX;
    startW=panel.offsetWidth;
    drag.classList.add("dragging");
    document.body.style.cursor="col-resize";
    document.body.style.userSelect="none";
    function onMove(e){
      var w=startW-(e.clientX-startX);
      if(w<200) w=200;
      if(w>window.innerWidth*.7) w=window.innerWidth*.7;
      panel.style.width=w+"px";
    }
    function onUp(){
      drag.classList.remove("dragging");
      document.body.style.cursor="";
      document.body.style.userSelect="";
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    }
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  });
})();
document.addEventListener("DOMContentLoaded",function(){
  var md=document.getElementById("prdMdSource").textContent;
  var content=document.getElementById("prdContent");
  var toc=document.getElementById("prdToc");
  function inlineFmt(s){return s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");}
  var lines=md.split("\n");
  var h="",listStack=[],liOpenStack=[],inTable=false,heads=[];
  function closeLists(targetDepth){
    while(listStack.length>targetDepth){
      if(liOpenStack.pop()) h+="</li>";
      h+="</ul>";
      listStack.pop();
    }
  }
  function closeAllLists(){closeLists(0)}
  function openListItem(depth,text){
    if(inTable){h+="</tbody></table>";inTable=false}
    while(listStack.length<depth+1){
      h+=listStack.length===0?'<ul class="prd-list">':'<ul class="prd-nested prd-level-'+listStack.length+'">';
      listStack.push(true);
      liOpenStack.push(false);
    }
    closeLists(depth+1);
    if(liOpenStack[depth]) h+="</li>";
    liOpenStack[depth]=true;
    h+="<li>"+inlineFmt(text);
  }
  for(var j=0;j<lines.length;j++){
    var ln=lines[j],tr=ln.trim();
    if(!tr){closeAllLists();continue}
    if(/^---+$/.test(tr)){closeAllLists();h+="<hr>";continue}
    var hm=tr.match(/^(#{1,5})\s+(.+)$/);
    if(hm){
      closeAllLists();
      var id="h-"+heads.length;
      heads.push({id:id,level:hm[1].length,text:hm[2]});
      h+='<h'+hm[1].length+' id="'+id+'">'+inlineFmt(hm[2])+'</h'+hm[1].length+'>';
      continue;
    }
    if(/^\|(.+)\|$/.test(tr)){
      closeAllLists();
      if(!inTable){
        var nxt=(j+1<lines.length)?lines[j+1].trim():"";
        var isSep=/^\|[\s\-:]+\|$/.test(nxt);
        if(isSep){
          h+='<table class="prd-table"><thead><tr>';
          var hdrCells=tr.replace(/^\|/,"").replace(/\|$/,"").split("|");
          for(var ci=0;ci<hdrCells.length;ci++) h+="<th>"+inlineFmt(hdrCells[ci].trim())+"</th>";
          h+="</tr></thead><tbody>";
          inTable=true;
          j++;
          continue;
        }
        h+='<table class="prd-table"><tbody>';
        inTable=true;
      }
      if(/^\|[\s\-:]+\|$/.test(tr)) continue;
      var cells=tr.replace(/^\|/,"").replace(/\|$/,"").split("|");
      h+="<tr>";
      for(var ci2=0;ci2<cells.length;ci2++) h+="<td>"+inlineFmt(cells[ci2].trim())+"</td>";
      h+="</tr>";
      continue;
    }
    if(inTable){h+="</tbody></table>";inTable=false}
    var lm=ln.match(/^(\s*)- (.+)$/);
    if(lm){openListItem(Math.floor(lm[1].replace(/\t/g,"  ").length/2),lm[2]);continue}
    closeAllLists();
    h+="<p>"+inlineFmt(tr)+"</p>";
  }
  closeAllLists();
  if(inTable) h+="</tbody></table>";
  content.innerHTML=h;
  toc.innerHTML='<div class="prd-toc-inner"><div class="prd-toc-title">PRD 目录</div>'+heads.filter(function(x){return x.level<=3}).map(function(x){
    return '<div class="prd-toc-item '+(x.level===3?'sub':'')+'" data-target="'+x.id+'">'+inlineFmt(x.text)+'</div>';
  }).join("")+"</div>";
  toc.addEventListener("click",function(e){
    var item=e.target.closest(".prd-toc-item");
    if(!item) return;
    var target=document.getElementById(item.dataset.target);
    if(target) target.scrollIntoView({behavior:"smooth",block:"start"});
    Array.from(toc.querySelectorAll(".prd-toc-item")).forEach(function(i){i.classList.remove("active")});
    item.classList.add("active");
  });
});
</script>

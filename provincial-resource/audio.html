<!DOCTYPE html>
<html lang="zh-CN">
<head><script src="../auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成品音频 - 媒资系统</title>
    <style>
        :root {
            --color-primary: #2e65f5;
            --color-primary-bg: rgba(46,101,245,.1);
            --color-text1: #151a1d;
            --color-text2: #333;
            --color-text3: #666;
            --color-text4: #999;
            --color-white: #fff;
            --color-gray1: #e2e6ed;
            --color-gray3: #f5f7fa;
            --color-gray5: #f6f8fa;
            --color-gray6: #f4f6f7;
            --radius: 4px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--color-gray3); color: var(--color-text1); font-size: 14px; line-height: 1.5;
            -webkit-font-smoothing: antialiased; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* ===== Header ===== */
        .top-header {
            height: 56px; flex-shrink: 0; background: var(--color-white);
            border-bottom: 1px solid var(--color-gray1); display: flex; align-items: center; padding: 0 24px; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo { width: 32px; height: 32px; background: var(--color-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }
        .sys-name { font-size: 16px; font-weight: 600; }
        .header-nav { display: flex; align-items: center; gap: 4px; margin-left: 24px; }
        .h-nav-item { padding: 8px 16px; font-size: 14px; color: var(--color-text3); cursor: pointer; border-radius: 6px; transition: all .15s; user-select: none; position: relative; display: flex; align-items: center; gap: 2px; }
        .h-nav-item:hover { background: var(--color-gray3); color: var(--color-text1); }
        .h-nav-item.active { color: var(--color-primary); font-weight: 500; }
        .h-nav-dd { position: relative; display: flex; align-items: center; }
        .h-nav-dd::after { content: ''; display: inline-block; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 4px solid currentColor; margin-left: 4px; opacity: .4; vertical-align: middle; }
        .h-nav-dd-menu { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: #fff; border: 1px solid var(--color-gray1); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.1); padding: 16px 0; min-width: 480px; z-index: 200; margin-top: 4px; }
        .h-nav-dd:hover .h-nav-dd-menu { display: flex; }
        .h-nav-dd-menu::before { content: ''; position: absolute; top: -8px; left: 0; right: 0; height: 8px; }
        .dd-section { flex: 1; padding: 0 20px; }
        .dd-section+.dd-section { border-left: 1px solid var(--color-gray1); }
        .dd-title { font-size: 12px; font-weight: 600; color: var(--color-text3); margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--color-gray1); text-transform: uppercase; letter-spacing: .05em; }
        .dd-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; color: var(--color-text3); cursor: pointer; transition: color .15s; }
        .dd-item:hover { color: var(--color-primary); }
        .dd-item svg { width: 14px; height: 14px; flex-shrink: 0; }
        .dd-highlight .dd-title { color: var(--color-primary); }
        .dd-highlight .dd-item { color: var(--color-primary); font-weight: 500; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .btn-upload { height: 34px; padding: 0 14px; background: var(--color-primary); color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-upload:hover { opacity: .9; }
        .btn-upload svg { width: 14px; height: 14px; }
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg,#667eea,#764ba2); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }

        /* ===== Channel Tabs ===== */
        .channel-tabs {
            height: 44px; flex-shrink: 0; background: var(--color-white);
            border-bottom: 1px solid var(--color-gray1); display: flex; align-items: center; padding: 0 20px;
        }
        .ch-tab {
            padding: 10px 20px; font-size: 14px; color: var(--color-text3);
            cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; user-select: none;
        }
        .ch-tab:hover { color: var(--color-text1); }
        .ch-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 500; }

        /* ===== Main ===== */
        .main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

        /* ===== Client Sidebar ===== */
        .sidebar { width: 240px; flex-shrink: 0; background: var(--color-white); border-right: 1px solid var(--color-gray1); overflow-y: auto; padding: 8px 0; }
        .sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 10px;border-bottom:1px solid var(--color-gray1);margin-bottom:4px}
        .sidebar-head-label{font-size:12px;font-weight:600;color:var(--color-text3)}
        .sidebar-clear{font-size:12px;color:var(--color-primary);cursor:pointer;display:none}
        .sidebar-clear:hover{text-decoration:underline}
        .sidebar-group { margin-bottom: 2px; }
        .sidebar-group-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; cursor: pointer; color: #343f56; font-size: 14px; transition: background .15s; user-select: none; }
        .sidebar-group-header:hover { background: var(--color-primary-bg); }
        .sidebar-group-header .left { display: flex; align-items: center; gap: 8px; }
        .sidebar-group-header .left input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--color-primary); cursor: pointer; flex-shrink: 0; }
        .sidebar-group-header .arrow { width: 16px; height: 16px; color: var(--color-text4); transition: transform .2s; flex-shrink: 0; }
        .sidebar-group-header.expanded .arrow { transform: rotate(90deg); }
        .sidebar-group-header.expanded { background: var(--color-primary-bg); font-weight: 500; }
        .sidebar-group-children { overflow: hidden; max-height: 0; transition: max-height .25s ease; }
        .sidebar-group-children.open { max-height: 500px; }
        .sidebar-child { display: flex; align-items: center; gap: 8px; padding: 7px 16px 7px 40px; font-size: 13px; color: var(--color-text3); cursor: pointer; transition: all .15s; }
        .sidebar-child:hover { background: var(--color-primary-bg); color: var(--color-text1); }
        .sidebar-child input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--color-primary); cursor: pointer; }
        .sidebar-child.active { background: var(--color-primary-bg); color: var(--color-primary); font-weight: 500; }
        .sidebar-child { position: relative; }
        .sidebar-child .ctx-trigger { position: absolute; right: 8px; width: 20px; height: 20px; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .sidebar-child:hover .ctx-trigger { display: flex; }
        .sidebar-child .ctx-trigger svg { width: 14px; height: 14px; color: var(--color-text4); }
        .sidebar-child .ctx-trigger:hover svg { color: var(--color-primary); }
        .sidebar-child .ctx-trigger.active { display: flex !important; }
        .sidebar-child .ctx-trigger.active svg { color: var(--color-primary); fill: var(--color-primary); }

        /* ===== Content ===== */
        .content { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

        /* Filter Bar */
        .filter-bar {
            display: flex; align-items: center; gap: 12px; padding: 10px 20px;
            background: var(--color-white); border-bottom: 1px solid var(--color-gray1); flex-shrink: 0;
        }
        .date-input {
            height: 30px; padding: 0 10px; border: 1px solid var(--color-gray1); border-radius: var(--radius);
            font-size: 12px; outline: none; width: 140px; color: var(--color-text2);
        }
        .date-input::placeholder { color: var(--color-text4); }
        .date-input:focus { border-color: var(--color-primary); }
        .filter-sep { color: var(--color-text4); font-size: 12px; }
        .search-input {
            height: 30px; padding: 0 10px; border: 1px solid var(--color-gray1); border-radius: var(--radius);
            font-size: 12px; outline: none; width: 200px; color: var(--color-text2);
        }
        .search-input::placeholder { color: var(--color-text4); }
        .search-input:focus { border-color: var(--color-primary); }
        .btn-search {
            width: 30px; height: 30px; border-radius: 50%; background: var(--color-primary);
            border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s;
        }
        .btn-search:hover { opacity: .85; }
        .filter-spacer { flex: 1; }
        .tool-check { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--color-text2); cursor: pointer; }
        .tool-check input { accent-color: var(--color-primary); width: 14px; height: 14px; cursor: pointer; }
        .tool-count { font-size: 13px; color: var(--color-text4); }
        .tool-count strong { color: var(--color-text3); }
        .tool-clear { font-size: 13px; color: var(--color-text4); cursor: pointer; }
        .tool-clear:hover { color: var(--color-primary); }
        .filter-check { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--color-text2); cursor: pointer; }
        .filter-check input { accent-color: var(--color-primary); width: 14px; height: 14px; cursor: pointer; }
        .filter-clear { font-size: 13px; color: var(--color-text4); cursor: pointer; }
        .filter-clear:hover { color: var(--color-primary); }

        /* ===== Audio Table ===== */
        .audio-table-wrap { flex: 1; overflow-y: auto; padding: 0; background: #fff; }
        .audio-table { width: 100%; border-collapse: collapse; }
        .audio-table thead { position: sticky; top: 0; z-index: 5; }
        .audio-table th { padding: 10px 16px; text-align: left; font-size: 12px; font-weight: 500; color: var(--color-text4); background: var(--color-gray5); border-bottom: 1px solid var(--color-gray1); white-space: nowrap; }
        .audio-table td { padding: 12px 16px; border-bottom: 1px solid var(--color-gray1); font-size: 13px; color: var(--color-text2); vertical-align: middle; }
        .audio-table tr:hover td { background: var(--color-gray5); }
        .audio-table .col-no { width: 50px; text-align: center; }
        .audio-table .col-title { color: var(--color-primary); cursor: pointer; }
        .audio-table .col-title:hover { text-decoration: underline; }
        .audio-table .col-duration { width: 100px; }
        .audio-table .col-size { width: 100px; }
        .audio-table .col-format { width: 80px; }
        .audio-table .col-time { width: 160px; color: var(--color-text4); font-size: 12px; }
        .audio-table input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--color-primary); cursor: pointer; }

        /* ===== Pagination ===== */
        .pagination-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: var(--color-white); border-top: 1px solid var(--color-gray1); flex-shrink: 0; gap: 8px; }
        .pagination-info { font-size: 12px; color: var(--color-text4); }
        .pagination-info strong { color: var(--color-text3); }
        .pagination-controls { display: flex; align-items: center; gap: 4px; }
        .page-btn { height: 28px; min-width: 28px; padding: 0 8px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--color-gray1); border-radius: 4px; font-size: 12px; cursor: pointer; background: var(--color-white); color: var(--color-text2); transition: all .15s; }
        .page-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
        .page-btn.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
        .page-btn:disabled { opacity: .35; cursor: default; }
        .pg-goto { margin-left: auto; display: flex; align-items: center; gap: 4px; color: var(--color-text4); font-size: 12px; }
        .pg-goto input { width: 40px; height: 28px; border: 1px solid var(--color-gray1); border-radius: 4px; text-align: center; font-size: 12px; outline: none; }
        .pg-select { height: 28px; padding: 0 8px; border: 1px solid var(--color-gray1); border-radius: 4px; font-size: 12px; outline: none; }

        /* ===== Audio Detail ===== */
        .audio-detail{display:none;position:fixed;inset:0;background:var(--color-gray3);z-index:300;flex-direction:column}
        .audio-detail.active{display:flex}
        .audio-detail-header{height:56px;background:#fff;border-bottom:1px solid var(--color-gray1);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;justify-content:center;position:relative}
        .audio-detail-back{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:14px;color:var(--color-text3);transition:color .15s;position:absolute;left:24px}
        .audio-detail-back:hover{color:var(--color-primary)}
        .audio-detail-back svg{width:18px;height:18px}
        .audio-detail-actions{display:flex;gap:8px}
        .audio-detail-actions button{height:32px;padding:0 14px;border:1px solid var(--color-gray1);border-radius:6px;font-size:12px;cursor:pointer;background:#fff;color:var(--color-text2);display:flex;align-items:center;gap:5px;transition:all .15s}
        .audio-detail-actions button:hover{border-color:var(--color-primary);color:var(--color-primary)}
        .audio-detail-actions button svg{width:14px;height:14px}
        .audio-detail-body{flex:1;display:flex;overflow:hidden}
        .audio-detail-main{flex:1;padding:32px 40px;display:flex;flex-direction:column;gap:24px;overflow-y:auto}
        .audio-player{background:#fff;border-radius:8px;padding:24px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .audio-player-icon{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .audio-player-icon svg{width:22px;height:22px;color:#fff}
        .audio-player-controls{flex:1;display:flex;flex-direction:column;gap:8px}
        .audio-player-progress{width:100%;height:4px;background:var(--color-gray1);border-radius:2px;position:relative;cursor:pointer}
        .audio-player-progress-bar{height:100%;width:0%;background:var(--color-primary);border-radius:2px;transition:width .1s}
        .audio-player-time{display:flex;justify-content:space-between;font-size:12px;color:var(--color-text4)}
        .audio-player-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .15s}
        .audio-player-btn:hover{opacity:.85}
        .audio-player-btn svg{width:16px;height:16px;margin-left:2px}
        .audio-player-volume{display:flex;align-items:center;gap:8px;margin-left:8px}
        .audio-player-volume svg{width:18px;height:18px;color:var(--color-text3)}
        .audio-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .audio-info-card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .audio-info-card h4{font-size:13px;font-weight:600;color:var(--color-text1);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--color-gray1)}
        .audio-info-row{display:flex;margin-bottom:8px;font-size:13px}
        .audio-info-row .label{color:var(--color-text4);width:80px;flex-shrink:0}
        .audio-info-row .value{color:var(--color-text2);flex:1}
        .audio-detail-sidebar{width:340px;flex-shrink:0;background:#fff;border-left:1px solid var(--color-gray1);display:flex;flex-direction:column;overflow:hidden}
        .audio-detail-tabs{display:flex;border-bottom:1px solid var(--color-gray1);flex-shrink:0}
        .audio-detail-tab{flex:1;padding:12px 0;text-align:center;font-size:13px;color:var(--color-text4);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
        .audio-detail-tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary);font-weight:500}
        .audio-detail-info{flex:1;overflow-y:auto;padding:20px}
        .audio-detail-info .info-row{display:flex;margin-bottom:14px;font-size:13px}
        .audio-detail-info .info-label{color:var(--color-text4);width:70px;flex-shrink:0}
        .audio-detail-info .info-value{color:var(--color-text2);flex:1;word-break:break-all}
        .audio-detail-info .kw-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--color-gray1)}
        .audio-detail-info .kw-title{font-size:13px;font-weight:600;color:var(--color-text2);margin-bottom:12px}
        .audio-detail-info .kw-tags{display:flex;flex-wrap:wrap;gap:8px}
        .audio-detail-info .kw-tag{display:inline-block;padding:3px 12px;background:var(--color-primary-bg);color:var(--color-primary);border-radius:14px;font-size:12px}
    </style>
</head>
<body>

<header class="top-header">
    <div class="header-left">
        <div class="logo">M</div>
        <span class="sys-name">媒资系统</span>
    </div>
    <nav class="header-nav">
        <div class="h-nav-item">首页</div>
        <div class="h-nav-item" onclick="location.href='search-center.html'">搜索中心</div>
        <div class="h-nav-dd">
            <div class="h-nav-item active">资源中心</div>
            <div class="h-nav-dd-menu">
                <div class="dd-section">
                    <div class="dd-title">网络资源库</div>
                    <div class="dd-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/></svg>网络稿件</div>
                    <div class="dd-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>网络图片</div>
                    <div class="dd-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>网络视频</div>
                    <div class="dd-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>网络音频</div>
                </div>
                <div class="dd-section dd-highlight">
                    <div class="dd-title">全省资源库</div>
                    <div class="dd-item" onclick="location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>成品稿件</div>
                    <div class="dd-item" onclick="location.href='image.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>成品图片</div>
                    <div class="dd-item" onclick="location.href='video.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>成品视频</div>
                    <div class="dd-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>成品音频</div>
                </div>
            </div>
        </div>
        <div class="h-nav-item">素材中心</div>
        <div class="h-nav-item">审批中心</div>
        <div class="h-nav-item">同步中心</div>
        <div class="h-nav-item">智能标签库</div>
    </nav>
    <div class="header-right">
        <button class="btn-upload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>上传</button>
        <div class="user-avatar">李</div>
    </div>
</header>

<div class="channel-tabs">
    <div class="ch-tab active" onclick="switchTab(this)">客户端</div>
    <div class="ch-tab" onclick="switchTab(this)">网站</div>
</div>

<div class="main">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-head"><span class="sidebar-head-label">地域筛选</span><span class="sidebar-clear" id="sidebarClear" onclick="clearSidebar()">清空</span></div>
        <div class="sidebar-group">
            <div class="sidebar-group-header expanded" onclick="toggleGroup(this)">
                <span class="left"><input type="checkbox" class="group-cb" data-group="province" onclick="event.stopPropagation()">省本级</span>
                <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
            </div>
            <div class="sidebar-group-children open">
                <div class="sidebar-child"><input type="checkbox"> 浙报集团<span class="ctx-trigger" title="仅筛选此项" onclick="event.stopPropagation();filterOnlyCb(this.parentElement.querySelector('input[type=checkbox]'))"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg></span></div>
            </div>
        </div>
        <div id="regionGroups"></div>
    </aside>

    <div class="content">
        <div class="filter-bar">

function fmtDuration(s) {
    var h = Math.floor(s / 3600);
    var m = Math.floor((s % 3600) / 60);
    var sec = Math.floor(s % 60);
    if (h > 0) return h + ':' + (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

    data.forEach(function(item, i) {

        h += '<tr>';
        h += '<td class="col-no"><input type="checkbox" data-idx="' + idx + '" onchange="updSel()"></td>';
        h += '<td class="col-title" onclick="showAudioDetail(' + idx + ')">' + item.title + '</td>';
        h += '<td class="col-duration">' + fmtDuration(item.duration || 0) + '</td>';
        h += '<td class="col-size">' + (item.fileSize || '--') + '</td>';
        h += '<td class="col-format">' + (item.format || 'mp3') + '</td>';
        h += '<td class="col-time">' + item.time + '</td>';
        h += '</tr>';
    });
    tbody.innerHTML = h;
}

function getSelectedRegions() {
  var regions = [];
  document.querySelectorAll('.sidebar input[type="checkbox"]:checked').forEach(function(cb) {
    var text = cb.parentElement.textContent.trim();
    if (regionMap[text]) {
      if (regions.indexOf(text) === -1) regions.push(text);
    } else if (regionData.some(function(r) { return r.name === text; })) {
      var city = regionData.find(function(r) { return r.name === text; });
      if (city) {
        if (regions.indexOf(text + '本级') === -1) regions.push(text + '本级');
        city.children.forEach(function(c) { if (regions.indexOf(c) === -1) regions.push(c); });
      }
    }
  });
  var provCb = document.querySelector('.group-cb[data-group="province"]');
  if (provCb && provCb.checked) { if (regions.indexOf('浙报集团') === -1) regions.push('浙报集团'); }

function toggleGroup(el) {
    el.classList.toggle('expanded');

function renderRegions() {

        html += '<div class="sidebar-group">';

function bindGroupCheckboxes() {
    document.querySelectorAll('.group-cb').forEach(function(cb) {
        cb.addEventListener('change', function() {
            var group = cb.closest('.sidebar-group');
            group.querySelectorAll('.sidebar-child input[type="checkbox"]').forEach(function(c) { c.checked = cb.checked; });
            funnelOnlyRegion = null;
        });
    });
    document.querySelectorAll('.sidebar-child input[type="checkbox"]').forEach(function(cb) {
        cb.addEventListener('change', function() {
            var group = cb.closest('.sidebar-group');
            var groupCb = group.querySelector('.group-cb');
            var children = group.querySelectorAll('.sidebar-child input[type="checkbox"]');
            var allChecked = true;
            children.forEach(function(c) { if (!c.checked) allChecked = false; });
            if (groupCb) groupCb.checked = allChecked;
            funnelOnlyRegion = null;
        });
        cb.addEventListener('click', function(e) { e.stopPropagation(); });
    });
}

function doSearch() {
    var kw = document.getElementById('searchInput') ? document.getElementById('searchInput').value.trim().toLowerCase() : '';
    pgFilteredData = DATA;
    if (kw) { pgFilteredData = pgFilteredData.filter(function(d){return d.title.toLowerCase().indexOf(kw)!==-1}); }
    if (funnelOnlyRegion) {
      var fr = funnelOnlyRegion;
      if (regionData.some(function(r) { return r.name === fr; })) {
        pgFilteredData = pgFilteredData.filter(function(d) { return d.region === fr + '本级'; });
      } else {
        pgFilteredData = pgFilteredData.filter(function(d) { return d.region === fr; });
      }
    } else {
      var regions = getSelectedRegions();
      if (regions.length > 0) { pgFilteredData = pgFilteredData.filter(function(d){ return regions.indexOf(d.region) !== -1; }); }
    }
    pgCurrentPage = 1; renderPage();
    updSidebarClear();
    updFunnelVisuals();
}
function updSidebarClear() {
    var hasChecked = document.querySelectorAll('.sidebar input[type="checkbox"]:checked').length > 0;

/* ===== Pagination ===== */
var pgCurrentPage = 1;
var pgFilteredData = [];
function getPgSize() { var sel = document.getElementById('pgSize'); return parseInt(sel.options[sel.selectedIndex].text) || 12; }
function goPage(p) { pgCurrentPage = p; renderPage(); }
function renderPage() {
  var size = getPgSize(), total = pgFilteredData.length, pages = Math.max(1, Math.ceil(total / size));
  if (pgCurrentPage > pages) pgCurrentPage = pages;
  var start = (pgCurrentPage - 1) * size;
  render(pgFilteredData.slice(start, start + size));
  document.getElementById('pgTotal').textContent = total;
  var ctrl = document.getElementById('pgControls'), h = '';
  h += '<button class="page-btn" onclick="goPage(' + (pgCurrentPage - 1) + ')"' + (pgCurrentPage <= 1 ? ' disabled' : '') + '>\u2039 上一页</button>';
  for (var p = 1; p <= pages; p++) h += '<button class="page-btn' + (p === pgCurrentPage ? ' active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  h += '<button class="page-btn" onclick="goPage(' + (pgCurrentPage + 1) + ')"' + (pgCurrentPage >= pages ? ' disabled' : '') + '>下一页 \u203A</button>';
  ctrl.innerHTML = h;
}
function filterOnlyCb(cb) {
    if (!cb) return;
    cb.checked = true;
    var text = cb.parentElement.textContent.trim();
    funnelOnlyRegion = (funnelOnlyRegion === text) ? null : text;
    doSearch();
}

function updFunnelVisuals() {
    document.querySelectorAll('.sidebar-child .ctx-trigger').forEach(function(el) {
        var text = el.parentElement.textContent.trim();

            el.classList.add('active');
        } else {
            el.classList.remove('active');
        }
    });
}

document.addEventListener('DOMContentLoaded', function(){ renderRegions(); pgFilteredData = DATA; renderPage(); });

function showAudioDetail(idx) {
    var item = DATA[idx];
    if (!item) return;
    document.getElementById('adTitle').textContent = item.title;
    document.getElementById('adSite').textContent = item.site || '';
    document.getElementById('adChannel').textContent = item.channel || '';
    document.getElementById('adTime').textContent = item.time;
    document.getElementById('adDuration').textContent = fmtDuration(item.duration || 0);
    document.getElementById('adSize').textContent = item.fileSize || '--';
    document.getElementById('adFormat').textContent = item.format || 'mp3';
    document.getElementById('adSidebarTitle').textContent = item.title;
    document.getElementById('adSource').textContent = item.source || '';
    document.getElementById('adSidebarChannel').textContent = item.channel || '';
    document.getElementById('adSidebarTime').textContent = item.time;
    document.getElementById('totalTime').textContent = fmtDuration(item.duration || 0);
    document.getElementById('currentTime').textContent = '0:00';
    document.getElementById('progressBar').style.width = '0%';
    var kwEl = document.getElementById('adKeywords');
    var kwH = '';
    if (item.keywords && item.keywords.length) item.keywords.forEach(function(k){ kwH += '<span class="kw-tag">' + k + '</span>'; });
    kwEl.innerHTML = kwH;
    document.getElementById('audioDetail').classList.add('active');
}
function closeAudioDetail() { document.getElementById('audioDetail').classList.remove('active'); }
function togglePlay() { /* placeholder */ }
</script>

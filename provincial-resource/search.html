<!DOCTYPE html>
<html lang="zh-CN">
<head><script src="../auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索中心 - 媒资系统</title>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #096dd9;
            --primary-bg: #e6f7ff;
            --primary-border: #91d5ff;
            --bg: #f0f2f5;
            --card: #fff;
            --text: #333;
            --text-sec: #666;
            --text-hint: #999;
            --border: #d9d9d9;
            --border-light: #f0f0f0;
            --radius: 4px;
            --green: #52c41a;
            --green-bg: #f6ffed;
            --green-border: #b7eb8f;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
            --shadow-md: 0 2px 8px rgba(0,0,0,.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,.12);
            --transition: all .2s ease-out;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
            -webkit-font-smoothing: antialiased; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* ===== Header ===== */
        .top-header {
            height: 48px; flex-shrink: 0; background: var(--card);
            border-bottom: 1px solid var(--border-light); display: flex; align-items: center; padding: 0 20px;
        }
        .logo { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; margin-right: 24px; }
        .header-nav { display: flex; align-items: center; }
        .h-nav {
            padding: 13px 18px; font-size: 14px; color: var(--text); cursor: pointer;
            white-space: nowrap; border-bottom: 2px solid transparent; transition: var(--transition); position: relative;
        }
        .h-nav:hover { color: var(--primary); background: var(--primary-bg); }
        .h-nav.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
        .h-nav .arrow { font-size: 10px; margin-left: 2px; opacity: .45; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
        .btn-upload {
            height: 30px; padding: 0 16px; background: var(--primary); color: #fff;
            border: none; border-radius: var(--radius); font-size: 13px; cursor: pointer; transition: var(--transition);
        }
        .btn-upload:hover { background: var(--primary-hover); box-shadow: var(--shadow-md); }
        .user-tag {
            display: flex; align-items: center; gap: 4px; padding: 4px 12px;
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 13px; color: var(--text-sec); cursor: pointer; transition: var(--transition);
        }
        .user-tag:hover { border-color: var(--primary); color: var(--primary); }
        .user-tag .arrow { font-size: 10px; opacity: .45; }

        /* ===== Mode Tabs ===== */
        .mode-tabs {
            display: flex; gap: 8px; padding: 10px 20px;
            background: var(--card); border-bottom: 1px solid var(--border-light); flex-shrink: 0;
        }
        .mode-tab {
            padding: 6px 20px; font-size: 13px; border-radius: var(--radius); cursor: pointer;
            transition: var(--transition); user-select: none;
            border: 1px solid var(--border); color: var(--text-sec); background: #fafafa;
        }
        .mode-tab:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-bg); }
        .mode-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 500; }

        /* ===== Main ===== */
        .main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 280px; flex-shrink: 0; background: var(--card);
            border-right: 1px solid var(--border-light); display: flex; flex-direction: column;
            transition: width .25s ease, opacity .25s ease; overflow: hidden;
        }
        .sidebar.collapsed { width: 0; border: none; opacity: 0; }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 20px; }

        .search-row {
            display: flex; align-items: stretch; border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; transition: var(--transition);
        }
        .search-row:focus-within { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(24,144,255,.15); }
        .search-row .kw-sel {
            border: none; border-right: 1px solid var(--border-light); padding: 0 10px;
            font-size: 12px; color: var(--text-sec); background: #fafafa; cursor: pointer; outline: none;
        }
        .search-row input {
            flex: 1; border: none; padding: 8px 12px; font-size: 13px; outline: none; min-width: 0; background: transparent;
        }
        .search-row input::placeholder { color: var(--text-hint); }
        .search-row .match-sel {
            border: none; border-left: 1px solid var(--border-light); padding: 0 10px;
            font-size: 12px; color: var(--text-sec); background: #fafafa; cursor: pointer; outline: none;
            white-space: nowrap;
        }
        .search-row .btn-add {
            width: 32px; border: none; border-left: 1px solid var(--border-light);
            background: #fafafa; color: var(--text-sec); cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; transition: var(--transition);
        }
        .search-row .btn-add:hover { background: var(--primary-bg); color: var(--primary); }

        .search-btns { display: flex; gap: 8px; }
        .btn-reset {
            flex: 1; padding: 8px 0; border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--card); color: var(--text-hint); font-size: 13px; cursor: pointer; transition: var(--transition);
        }
        .btn-reset:hover { border-color: #bbb; color: var(--text-sec); }
        .btn-search {
            flex: 1; padding: 8px 0; border: none; border-radius: var(--radius);
            background: var(--primary); color: #fff; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: var(--transition);
        }
        .btn-search:hover { background: var(--primary-hover); box-shadow: var(--shadow-md); }

        .filter-group { margin-bottom: 24px; }
        .filter-title { font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); }
        .radio-row { display: flex; flex-wrap: wrap; gap: 12px 20px; }
        .radio-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text); cursor: pointer; user-select: none; transition: color .15s; }
        .radio-item:hover { color: var(--primary); }
        .radio-item input[type=radio] { accent-color: var(--primary); width: 14px; height: 14px; cursor: pointer; margin: 0; }

        /* ===== Content ===== */
        .content { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

        /* Toolbar */
        .toolbar {
            display: flex; align-items: center; gap: 12px; padding: 10px 20px;
            background: var(--card); border-bottom: 1px solid var(--border-light); flex-shrink: 0;
        }
        .tool-btn {
            display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px;
            font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--card); color: var(--text); cursor: pointer; transition: var(--transition); white-space: nowrap;
        }
        .tool-btn:hover { border-color: var(--primary); color: var(--primary); }
        .tool-btn svg { width: 14px; height: 14px; }
        .tool-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .tool-btn.primary:hover { background: var(--primary-hover); box-shadow: var(--shadow-md); }
        .tool-sep { width: 1px; height: 20px; background: var(--border-light); }
        .tool-check { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text); cursor: pointer; }
        .tool-check input { accent-color: var(--primary); width: 15px; height: 15px; cursor: pointer; }
        .tool-count { font-size: 12px; color: var(--text-hint); }
        .tool-count strong { color: var(--text-sec); }
        .tool-clear { font-size: 12px; color: var(--text-hint); cursor: pointer; transition: color .15s; }
        .tool-clear:hover { color: var(--primary); }
        .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
        .sort-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-hint); }
        .sort-sel {
            padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 12px; color: var(--text-sec); background: var(--card); cursor: pointer; outline: none;
        }

        /* ===== Grid ===== */
        .results-grid { flex: 1; overflow-y: auto; padding: 16px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
        .card {
            background: var(--card); border-radius: var(--radius); overflow: hidden;
            cursor: pointer; transition: box-shadow .2s ease, transform .2s ease;
            box-shadow: var(--shadow-sm);
        }
        .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
        .card-img {
            width: 100%; aspect-ratio: 3/2; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .card-cb { position: absolute; top: 8px; left: 8px; z-index: 2; }
        .card-cb input { width: 15px; height: 15px; accent-color: var(--primary); cursor: pointer; }
        .card-menu {
            position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
            border-radius: 50%; background: rgba(0,0,0,.35); border: none; color: #fff;
            font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .2s; z-index: 2;
        }
        .card:hover .card-menu { opacity: 1; }
        .card-body { padding: 10px 12px; }
        .card-title {
            font-size: 13px; color: var(--text); line-height: 1.5; font-weight: 500;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; min-height: 39px; margin-bottom: 8px;
        }
        .card-meta { display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
        .card-time { color: var(--text-hint); }
        .card-tag { padding: 2px 8px; border-radius: var(--radius); font-size: 10px; white-space: nowrap; font-weight: 500; }
        .card-tag.net { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
        .card-tag.provincial { background: var(--primary-bg); color: var(--primary); border: 1px solid var(--primary-border); }
    </style>
</head>
<body>

<header class="top-header">
    <span class="logo">媒资系统</span>
    <nav class="header-nav">
        <div class="h-nav" onclick="location.href='../'">首页</div>
        <div class="h-nav active">搜索中心 <span class="arrow">▼</span></div>
        <div class="h-nav" onclick="location.href='index.html'">资源中心 <span class="arrow">▼</span></div>
        <div class="h-nav">素材中心 <span class="arrow">▼</span></div>
        <div class="h-nav">审批中心</div>
        <div class="h-nav">同步中心</div>
        <div class="h-nav">智能标签库</div>
    </nav>
    <div class="header-right">
        <button class="btn-upload">上传</button>
        <div class="user-tag">用户 <span class="arrow">▼</span></div>
    </div>
</header>

<div class="mode-tabs">
    <div class="mode-tab active" onclick="switchMode(this)">精准检索</div>
    <div class="mode-tab" onclick="switchMode(this)">文搜图</div>
    <div class="mode-tab" onclick="switchMode(this)">图搜图</div>
</div>

<div class="main">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-scroll">
            <div style="margin-bottom:20px">
                <div class="search-row">
                    <select class="kw-sel"><option>全部</option></select>
                    <input type="text" id="searchInput" placeholder="输入关键词，多个用空格隔开进行搜索">
                    <select class="match-sel"><option>包含全部关键词</option><option>包含任意关键词</option></select>
                    <button class="btn-add" title="添加">+</button>
                </div>
                <div class="search-btns">
                    <button class="btn-reset" onclick="resetFilters()">重置条件</button>
                    <button class="btn-search" onclick="doSearch()">搜索</button>
                </div>
            </div>
            <div class="filter-group">
                <div class="filter-title">发布时间</div>
                <div class="radio-row">
                    <label class="radio-item"><input type="radio" name="time" checked> 全部</label>
                    <label class="radio-item"><input type="radio" name="time"> 单日期</label>
                    <label class="radio-item"><input type="radio" name="time"> 时间段</label>
                    <label class="radio-item"><input type="radio" name="time"> 特殊日期</label>
                </div>
            </div>
            <div class="filter-group">
                <div class="filter-title">资源库</div>
                <div class="radio-row">
                    <label class="radio-item"><input type="radio" name="lib" checked> 全部</label>
                    <label class="radio-item"><input type="radio" name="lib"> 网络资源库</label>
                    <label class="radio-item"><input type="radio" name="lib"> 全省资源库</label>
                    <label class="radio-item"><input type="radio" name="lib"> 个人素材库</label>
                    <label class="radio-item"><input type="radio" name="lib"> 部门素材库</label>
                    <label class="radio-item"><input type="radio" name="lib"> 集团素材库</label>
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="toolbar">
            <button class="tool-btn primary" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                收起
            </button>
            <div class="tool-sep"></div>
            <button class="tool-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                下载
            </button>
            <button class="tool-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                添加到个人素材库
            </button>
            <div class="toolbar-right">
                <label class="tool-check"><input type="checkbox" id="selectAll" onchange="toggleAll()"> 全选</label>
                <span class="tool-count">已选 <strong id="selCount">0</strong></span>
                <span class="tool-clear" onclick="clearSel()">清除</span>
                <div class="tool-sep"></div>
                <span style="font-size:13px;color:var(--text-sec)">找到约 <strong id="resultCount" style="color:var(--primary)">0</strong> 条相关消息</span>
                <div class="sort-wrap">排序：<select class="sort-sel"><option>时间</option><option>相关度</option></select></div>
            </div>
        </div>
        <div class="results-grid" id="resultsGrid"></div>
    </div>
</div>

<script>
var DATA = [
  { title: '四川成都：视障人士体验依靠智能导盲犬出行', time: '2026-04-21 16:50:00', lib: '网络资源库', type: 'net' },
  { title: '四川成都：视障人士体验依靠智能导盲犬出行', time: '2026-04-21 16:50:00', lib: '网络资源库', type: 'net' },
  { title: '新增38种本科专业，今年高考就可以报名', time: '2026-05-06 11:00:00', lib: '全省资源库', type: 'provincial' },
  { title: '浙报集团融媒体改革成果获全国表彰', time: '2026-05-06 10:45:00', lib: '全省资源库', type: 'provincial' },
  { title: '潮新闻报道：浙江数字经济蓬勃发展', time: '2026-05-06 10:30:00', lib: '全省资源库', type: 'provincial' },
  { title: '四川成都：视障人士体验依靠智能导盲犬出行', time: '2026-04-21 16:50:00', lib: '网络资源库', type: 'net' },
  { title: '上城区：南宋文化节开幕', time: '2026-05-06 09:55:00', lib: '全省资源库', type: 'provincial' },
  { title: '四川成都：视障人士体验依靠智能导盲犬出行', time: '2026-04-21 16:50:00', lib: '网络资源库', type: 'net' },
  { title: '余杭区：未来科技城AI企业突破千家', time: '2026-05-06 09:20:00', lib: '全省资源库', type: 'provincial' },
  { title: '"五一"假期阳江海陵岛文旅市场火爆有序', time: '2026-04-21 16:50:00', lib: '网络资源库', type: 'net' }
];

var COLORS = ['#e8f5e9','#fff3e0','#e3f2fd','#fce4ec','#f3e5f5','#e0f2f1','#fff8e1','#efebe9','#e8eaf6','#f1f8e9'];

function render(data) {
    var grid = document.getElementById('resultsGrid');
    document.getElementById('resultCount').textContent = data.length;
    if (!data.length) { grid.innerHTML = '<div style="padding:80px 0;text-align:center;color:var(--text-hint)">暂无搜索结果</div>'; return; }
    var h = '<div class="grid">';
    data.forEach(function(item, i) {
        var cls = item.type === 'provincial' ? 'provincial' : 'net';
        h += '<div class="card">';
        h += '<div class="card-img" style="background:' + COLORS[i % COLORS.length] + '">';
        h += '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>';
        h += '<div class="card-cb"><input type="checkbox" onchange="updSel()"></div>';
        h += '<button class="card-menu" onclick="event.stopPropagation()">&#8943;</button>';
        h += '</div><div class="card-body">';
        h += '<div class="card-title">' + item.title + '</div>';
        h += '<div class="card-meta"><span class="card-time">' + item.time + '</span><span class="card-tag ' + cls + '">' + item.lib + '</span></div>';
        h += '</div></div>';
    });
    h += '</div>';
    grid.innerHTML = h;
}

function switchMode(el) { el.parentElement.querySelectorAll('.mode-tab').forEach(function(t){t.classList.remove('active')}); el.classList.add('active'); }
function toggleSidebar() { var sb = document.getElementById('sidebar'); sb.classList.toggle('collapsed'); var btn = document.querySelector('.tool-btn.primary'); btn.lastChild.textContent = sb.classList.contains('collapsed') ? ' 展开' : ' 收起'; }
function toggleAll() { var c = document.getElementById('selectAll').checked; document.querySelectorAll('.card-cb input').forEach(function(cb){cb.checked=c}); updSel(); }
function updSel() { document.getElementById('selCount').textContent = document.querySelectorAll('.card-cb input:checked').length; }
function clearSel() { document.getElementById('selectAll').checked = false; document.querySelectorAll('.card-cb input').forEach(function(cb){cb.checked=false}); updSel(); }
function doSearch() { applyFilters(); }
function resetFilters() { document.getElementById('searchInput').value = ''; document.querySelectorAll('input[name=time]')[0].checked = true; document.querySelectorAll('input[name=lib]')[0].checked = true; applyFilters(); }
function applyFilters() {
    var kw = document.getElementById('searchInput').value.trim().toLowerCase();
    var libEl = document.querySelector('input[name=lib]:checked');
    var lib = libEl ? libEl.parentElement.textContent.trim() : '全部';
    var f = DATA;
    if (lib !== '全部') f = f.filter(function(d){return d.lib===lib});
    if (kw) { var kws = kw.split(/\s+/); f = f.filter(function(d){var t=d.title.toLowerCase();return kws.every(function(k){return t.indexOf(k)!==-1})}); }
    render(f);
}
document.addEventListener('DOMContentLoaded', function(){
    render(DATA);
    document.getElementById('searchInput').addEventListener('keydown', function(e){if(e.key==='Enter')doSearch()});
    document.querySelectorAll('input[name=lib]').forEach(function(r){r.addEventListener('change', applyFilters)});
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CC Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .projects {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 480px;
            padding: 0 1.5rem;
        }
        .project-card {
            display: block;
            padding: 1.25rem 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            text-decoration: none;
            color: #e2e8f0;
            transition: all 0.2s;
        }
        .project-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(96,165,250,0.4);
            transform: translateY(-2px);
        }
        .project-card h2 {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }
        .project-card p {
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <h1>My CC Web</h1>
    <div class="projects">
        <a href="./network-resource/" class="project-card">
            <h2>Network Resource Management</h2>
            <p>网络资源管理系统</p>
        </a>
        <a href="./hzzl/" class="project-card">
            <h2>HZZL 杭州智联</h2>
            <p>杭州智联 — 智能媒资管理平台（含嵌入式 PRD）</p>
        </a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公安移动端 H5 异常处置</title>
<script src="../auth.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --primary:#0052d9;
  --primary-deep:#003cab;
  --primary-soft:#e8f1ff;
  --primary-wash:#f4f7ff;
  --ink:#1d2129;
  --text:#344054;
  --muted:#667085;
  --subtle:#98a2b3;
  --line:#e5e6eb;
  --line-soft:#f2f3f5;
  --app-bg:#f5f7fa;
  --panel:#fff;
  --danger:#f53f3f;
  --danger-ink:#b42318;
  --danger-soft:#fff1f0;
  --danger-line:#ffd5d2;
  --green:#00a870;
  --green-soft:#e8f8f0;
  --amber:#ff7d00;
  --amber-soft:#fff3e0;
  --shadow-card:0 1px 2px rgba(16,24,40,.04);
  --shadow-float:0 8px 22px rgba(16,24,40,.07),0 1px 2px rgba(16,24,40,.04);
  --shadow-panel:0 22px 54px rgba(16,24,40,.18);
  --border:#dfe3eb;
  --border-light:#edf0f5;
}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:var(--text);background:#eef2f6}
button,input,textarea{font:inherit}
button{border:0;background:none;cursor:pointer}
.app-split{display:flex;height:100vh;overflow:hidden}
.page-container{flex:1;min-width:0;overflow:auto;background:
  linear-gradient(90deg,rgba(0,82,217,.026) 1px,transparent 1px),
  linear-gradient(rgba(29,33,41,.026) 1px,transparent 1px),
  linear-gradient(135deg,#f7f9fc 0%,#edf1f7 100%);background-size:40px 40px,40px 40px,auto}
.stage{min-height:100%;display:flex;align-items:center;justify-content:center;padding:36px 24px}
.prototype-shell{display:grid;grid-template-columns:auto;gap:0;align-items:center}
.phone-frame{position:relative;width:393px;height:852px;border-radius:40px;background:linear-gradient(145deg,#111827,#253041);padding:10px;box-shadow:0 32px 76px rgba(29,33,41,.24),0 0 0 1px rgba(255,255,255,.32) inset}
.phone-frame::before{content:"";position:absolute;left:50%;top:9px;transform:translateX(-50%);width:104px;height:5px;border-radius:999px;background:rgba(255,255,255,.16);z-index:3}
.phone-screen{position:relative;width:100%;height:100%;overflow:hidden;border-radius:30px;background:var(--app-bg)}
.app-top{position:absolute;top:0;left:0;right:0;height:64px;background:rgba(255,255,255,.97);border-bottom:1px solid rgba(223,227,235,.88);z-index:5;padding:12px 16px 0;backdrop-filter:blur(16px)}
.app-top.detail{height:57px;padding:0;border-bottom:1px solid var(--line-soft);box-shadow:var(--shadow-card)}
.app-main{position:absolute;left:0;right:0;top:64px;bottom:66px;overflow-y:auto;background:transparent;-webkit-overflow-scrolling:touch}
.app-main.detail{top:57px}
.app-main::-webkit-scrollbar{width:0}
.bottom-nav{position:absolute;left:0;right:0;bottom:0;height:66px;background:rgba(255,255,255,.97);border-top:1px solid rgba(223,227,235,.92);box-shadow:0 -8px 18px rgba(16,24,40,.04);display:grid;grid-template-columns:repeat(3,1fr);z-index:6;backdrop-filter:blur(16px)}
.nav-btn{display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;color:#7a8699;font-size:10px;font-weight:650;letter-spacing:0;position:relative}
.nav-btn svg{width:21px;height:21px;stroke:currentColor}
.nav-btn.active{color:var(--primary)}
.nav-btn.inert{cursor:default}
.nav-btn.active::before{content:"";position:absolute;top:0;width:32px;height:3px;border-radius:0 0 3px 3px;background:var(--primary);z-index:1}
.segmented{height:40px;background:#f2f4f8;border:1px solid rgba(223,227,235,.92);border-radius:10px;display:grid;align-items:center;position:relative;padding:3px;box-shadow:0 1px 0 rgba(255,255,255,.74) inset}
.segmented.three{grid-template-columns:1fr 1fr 1fr}
.segmented .seg-btn{height:32px;margin:0;border-radius:8px;color:#4e5969;font-size:12px;font-weight:750;transition:background .18s ease,color .18s ease,box-shadow .18s ease,transform .18s ease}
.segmented .seg-btn.active{background:#fff;color:#1d2129;box-shadow:0 6px 14px rgba(16,24,40,.08),0 0 0 1px rgba(223,227,235,.85)}
.segmented .seg-btn:active{transform:scale(.98)}
.report-top{display:grid;grid-template-columns:1fr 40px;gap:8px}
.calendar-btn{height:40px;display:grid;place-items:center;color:var(--muted);background:#fff;border:1px solid rgba(223,227,235,.94);border-radius:10px;box-shadow:var(--shadow-card)}
.calendar-btn svg{width:19px;height:19px;stroke:currentColor}
.detail-header{height:57px;display:flex;align-items:center;gap:8px;padding:0 16px 0 12px;background:#fff}
.back-btn{width:32px;height:32px;border-radius:999px;display:grid;place-items:center;color:var(--text)}
.back-btn svg{width:22px;height:22px;stroke:currentColor}
.detail-title{font-size:16px;font-weight:600;letter-spacing:-.31px;color:#1e2939}
.count-text{padding:13px 16px 8px;font-size:12px;line-height:16px;color:#667085;font-weight:650;display:flex;align-items:center;justify-content:flex-start}
.exception-date-panel{padding:12px 12px 0}
.exception-date-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;color:#667085;font-size:12px}
.exception-date-head strong{color:#1d2129;font-size:13px;font-weight:800}
.date-filter{display:grid;grid-template-columns:1fr;gap:8px;align-items:center}
.date-filter.picked{grid-template-columns:34px 1fr 34px}
.date-step{height:38px;border-radius:10px;background:#fff;border:1px solid rgba(223,227,235,.94);color:#667085;display:grid;place-items:center;box-shadow:var(--shadow-card);transition:background .16s ease,color .16s ease,transform .16s ease}
.date-step:active{transform:scale(.97)}
.date-step:disabled{color:#c9cdd4;background:#f7f8fa;cursor:not-allowed;box-shadow:none;transform:none}
.date-step svg{width:17px;height:17px;stroke:currentColor}
.date-picker{height:42px;border-radius:11px;background:#fff;border:1px solid rgba(190,198,214,.95);display:flex;align-items:center;justify-content:center;gap:9px;color:#1d2129;font-size:13px;font-weight:800;box-shadow:var(--shadow-card);transition:border-color .18s ease,box-shadow .18s ease,transform .18s ease}
.date-picker:active{transform:scale(.992);border-color:#b8cdf8;box-shadow:0 8px 16px rgba(0,82,217,.08)}
.date-picker svg{width:17px;height:17px;stroke:var(--primary)}
.date-picker-text{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.date-picker-text b{font-size:13px;line-height:17px;color:#1d2129}
.date-picker-text b.placeholder{color:#667085}
.date-clear-icon{width:22px;height:22px;border-radius:999px;background:#f2f5fa;color:#7a8699;display:grid;place-items:center;font-size:17px;line-height:1;flex:0 0 auto}
.date-clear-icon:active{background:#e8edf5;color:#344054}
.card-list{display:flex;flex-direction:column;gap:10px;padding:0 12px 24px}
.exception-card,.report-card{background:#fff;border:1px solid rgba(223,227,235,.94);border-radius:12px;box-shadow:var(--shadow-float);overflow:hidden}
.exception-card{padding:14px;position:relative;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.exception-card.data-clickable{cursor:pointer}
.exception-card:active{transform:scale(.992)}
.card-head{display:flex;align-items:center;gap:7px;min-height:22px}
.account{font-size:15px;line-height:21px;font-weight:800;letter-spacing:0;color:var(--ink)}
.badge{display:inline-flex;align-items:center;justify-content:center;gap:4px;height:22px;padding:0 8px;border-radius:6px;font-size:10px;line-height:15px;letter-spacing:0;white-space:nowrap;font-weight:750}
.badge svg{width:12px;height:12px;fill:currentColor;stroke:currentColor}
.badge.wechat{background:var(--green-soft);color:var(--green)}
.badge.weibo{background:var(--amber-soft);color:var(--amber)}
.badge.douyin{background:#1d2129;color:#fff}
.badge.video{background:#eff6ff;color:#155dfc}
.badge.news{background:#fff8e1;color:#f5a000}
.summary-box{margin-top:13px;min-height:58px;background:#f7f9fc;border:1px solid #edf0f5;border-radius:9px;display:flex;align-items:center;gap:10px;padding:11px;color:#1d2129}
.summary-box.clickable{cursor:pointer}
.summary-box.clickable:active{background:#f1f6ff}
.summary-icon{width:30px;height:30px;border-radius:8px;background:#fff3e0;border:1px solid #ffe0b8;display:grid;place-items:center;flex:0 0 auto}
.summary-icon svg{width:15px;height:15px;stroke:var(--amber);margin:0}
.summary-content{min-width:0;flex:1}
.summary-action{flex:0 0 auto;margin-left:4px;color:var(--primary);font-size:13px;line-height:20px;font-weight:850;white-space:nowrap}
.summary-main{min-width:0;font-size:14px;line-height:20px;font-weight:650;letter-spacing:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.summary-main .metric-name{color:#4e5969;font-weight:700}
.summary-main .metric-value{margin-left:8px;font-size:17px;font-weight:850;color:#ff7d00}
.summary-main .metric-value.negative{color:#f53f3f}
.summary-main .risk-text{font-weight:750;color:#1d2129}
.comment-link{color:var(--primary)}
.comment-monitor{padding:0 12px 22px}
.comment-list-head{display:flex;align-items:center;justify-content:space-between;margin:0 0 10px;color:#667085;font-size:12px}
.comment-list-head strong{color:#101828;font-size:13px}
.comment-card-list{display:flex;flex-direction:column;gap:10px}
.comment-monitor-card{cursor:pointer}
.comment-platform-tag,.ai-result-tag,.comment-status,.reason-tag{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:6px;font-size:11px;font-weight:750;white-space:nowrap}
.comment-platform-tag.douyin{background:#fff1f2;color:#ff1f35}
.comment-platform-tag.weibo{background:#fff7ed;color:#f54900}
.comment-platform-tag.video{background:#eff6ff;color:#155dfc}
.comment-platform-tag.news{background:#fff8e1;color:#f5a000}
.comment-status.pending{background:#fff3e0;color:#ff7d00}
.comment-status.done{background:#f0fdf4;color:#16a34a}
.comment-summary-box{align-items:center}
.comment-summary-box .summary-main{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;text-wrap:pretty}
.ai-result-tag,.reason-tag{background:#fff1f0;color:#f53f3f}
.card-head .reason-tag{margin-left:auto}
.ai-result-tag.warn{background:#fff1f0;color:#f53f3f}
.ai-result-tag.result{background:#fff1f0;color:#f53f3f}
.comment-action-row{display:flex;align-items:center;justify-content:flex-end;gap:14px;margin-top:12px;padding-top:11px;border-top:1px solid #f1f4f8}
.comment-action{color:#2f8cff;font-size:13px;font-weight:800}
.comment-action.muted{color:#64748b}
.comment-empty{height:160px;display:grid;place-items:center;color:#9aa3b2;font-size:13px}
.time-line{display:flex;align-items:center;gap:5px;margin-top:11px;color:#86909c;font-size:12px;line-height:16px}
.time-line svg{width:12px;height:12px;stroke:currentColor}
.card-meta-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:11px}
.card-meta-row .time-line{margin-top:0;min-width:0}
.card-meta-row .time-line span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid #edf0f5}
.h5-btn{height:42px;border-radius:8px;font-size:13px;font-weight:800;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:transform .16s ease,box-shadow .16s ease,background .16s ease,border-color .16s ease}
.h5-btn svg{width:15px;height:15px;stroke:currentColor}
.h5-btn.secondary{background:#fff;border:1px solid #d8dde7;color:#1d2129;box-shadow:0 1px 0 rgba(255,255,255,.8) inset}
.h5-btn.primary{background:var(--primary);color:#fff;box-shadow:0 8px 16px rgba(0,82,217,.20)}
.h5-btn:active{transform:translateY(1px) scale(.99);box-shadow:none}
.report-list{display:flex;flex-direction:column;gap:10px;padding:12px 12px 22px}
.report-card{position:relative;padding:15px 14px 13px;min-height:112px}
.report-unread{position:absolute;right:14px;top:14px;width:8px;height:8px;background:#f53f3f;border-radius:999px;box-shadow:0 0 0 4px #fff1f0}
.report-title{font-size:14px;line-height:20px;color:var(--ink);font-weight:800;letter-spacing:-.15px}
.report-date{margin-top:8px;font-size:13px;line-height:18px;color:var(--muted)}
.report-actions{display:flex;justify-content:flex-start;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line-soft)}
.mini-action{height:30px;display:inline-flex;align-items:center;gap:5px;padding:0 10px;border-radius:7px;background:#f7f9fc;border:1px solid #edf0f5;color:#667085;font-size:12px;line-height:14px;font-weight:750}
.mini-action svg{width:16px;height:16px;stroke:currentColor}
.more-text{height:48px;display:grid;place-items:center;color:var(--subtle);font-size:12px}
.report-preview-list{background:#fff;min-height:100%;padding:10px 16px 20px}
.report-row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start;padding:14px 0;border-bottom:1px solid var(--line-soft)}
.report-row-title{font-size:14px;line-height:21px;color:var(--primary);text-align:left}
.report-row-metric{font-size:12px;line-height:21px;color:#4e5969;white-space:nowrap;font-weight:650}
.data-detail-wrap{display:flex;flex-direction:column;gap:10px;padding:12px 12px 20px}
.data-detail-hero,.data-related-card{background:#fff;border:1px solid rgba(223,227,235,.94);border-radius:12px;box-shadow:var(--shadow-float);overflow:hidden}
.data-detail-hero{padding:15px 14px 14px}
.data-detail-meta{display:flex;align-items:center;gap:7px;margin-top:10px}
.data-metric-line{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.data-metric-name{color:var(--primary);font-size:18px;line-height:26px;font-weight:850}
.data-metric-label{font-size:16px;line-height:24px;color:#1d2129;font-weight:800}
.data-metric-value{font-size:22px;line-height:28px;color:#ff5f5f;font-weight:850}
.data-metric-value.negative{color:#f53f3f}
.data-related-head{height:40px;padding:0 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #edf0f5}
.data-related-title{font-size:13px;color:#1d2129;font-weight:850}
.data-related-count{font-size:12px;color:#8a96a8;font-weight:700}
.data-related-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;padding:12px 13px;background:#f7f7f8;border-bottom:1px solid #eceff4}
.data-related-row:last-child{border-bottom:0}
.data-related-link{font-size:14px;line-height:21px;color:#2f8cff;text-align:left;font-weight:750;text-wrap:pretty}
.data-related-value{font-size:13px;line-height:21px;color:#4e5969;white-space:nowrap;font-weight:850}
.detail-content{display:flex;flex-direction:column;gap:8px;padding-bottom:18px}
.detail-card{background:#fff;box-shadow:var(--shadow-float);padding:16px}
.detail-name{font-size:16px;line-height:24px;font-weight:800;color:var(--ink);letter-spacing:-.31px}
.detail-meta{display:flex;align-items:center;gap:8px;margin-top:8px}
.detail-badge{height:20px;padding:0 6px;display:inline-flex;align-items:center;border-radius:4px;background:#f3f4f6;color:#4a5565;font-size:12px}
.detail-date{font-size:12px;color:var(--muted)}
.alert-box{margin-top:12px;border-radius:14px;border:1px solid var(--danger-line);background:linear-gradient(180deg,#fff8f0,#fff3e8);min-height:70px;padding:13px 12px 12px 42px;position:relative}
.alert-box.red{border-color:#ffe2e2;background:#fff1f2}
.alert-box svg{position:absolute;left:14px;top:15px;width:17px;height:17px;stroke:var(--danger)}
.alert-title{font-size:14px;line-height:20px;font-weight:700;color:var(--danger-ink)}
.alert-desc{margin-top:4px;font-size:12px;line-height:16px;color:var(--danger)}
.filter-strip{display:flex;gap:8px;overflow-x:auto;background:#fff;padding:12px 16px;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)}
.filter-chip{height:28px;padding:0 12px;border-radius:8px;background:#f8fafc;border:1px solid var(--line-soft);font-size:12px;color:#4a5565;white-space:nowrap}
.filter-chip.active{background:var(--primary-soft);color:var(--primary);border-color:#dbeafe}
.issue-list{display:flex;flex-direction:column;gap:12px;padding:12px 16px}
.issue-card{background:#fff;border:1px solid rgba(226,232,240,.8);border-radius:14px;box-shadow:var(--shadow-float);padding:14px}
.issue-type{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#1e2939}
.dot{width:7px;height:7px;border-radius:999px;background:#16a34a}
.dot.blue{background:#2b7fff}
.before-after{margin-top:18px;text-align:center;color:#cbd5e1}
.issue-text{margin-top:10px;font-size:14px;line-height:24px;color:#4a5565}
.bad{color:#ef4444;background:#fff1f2;border-radius:4px;padding:1px 3px;font-weight:700}
.good{color:#16a34a;background:#ecfdf5;border-radius:4px;padding:1px 3px;font-weight:700}
.issue-note{margin-top:12px;background:#f8fafc;border-radius:4px;padding:10px 12px;font-size:12px;line-height:18px;color:#6a7282}
.snapshot-card{background:#fff;box-shadow:var(--shadow-float);padding:16px}
.snapshot-title{font-size:14px;line-height:20px;font-weight:800;color:var(--ink)}
.comment-detail-panel{background:#fff;border:1px solid rgba(226,232,240,.88);border-radius:14px;box-shadow:var(--shadow-float);padding:14px}
.comment-detail-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}
.comment-detail-content{margin-top:12px;background:#f8fafc;border:1px solid #eef2f7;border-radius:10px;padding:12px;color:#283445;font-size:14px;line-height:22px}
.comment-detail-label{font-size:12px;color:#8a96a8}
.comment-source-card{margin-top:12px;border-radius:12px;border:1px solid #eef2f7;background:#fff;overflow:hidden}
.comment-source-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #f1f4f8}
.comment-source-title{font-size:13px;font-weight:800;color:#111827}
.comment-source-body{padding:12px;color:#4b5563;font-size:13px;line-height:20px}
.weibo-shot{margin-top:12px;border:1px solid var(--line-soft);border-radius:10px;overflow:hidden;background:#fff}
.weibo-status{height:44px;background:#f2f3f5;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 16px;color:#111827}
.weibo-status .time{font-weight:700}
.weibo-title{text-align:center;font-size:15px;font-weight:800;line-height:16px}
.weibo-title span{display:block;font-size:10px;font-weight:500;color:#6b7280}
.weibo-more{text-align:right;font-size:18px}
.weibo-head{display:flex;align-items:center;gap:10px;padding:10px 14px 8px}
.weibo-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#ffd93d,#ff7a1a);display:grid;place-items:center;color:#b91c1c;font-weight:900}
.weibo-account{font-size:13px;font-weight:800;color:#4a5565}
.weibo-account span{display:block;font-size:10px;font-weight:400;color:#9ca3af}
.open-app{margin-left:auto;height:28px;padding:0 14px;border-radius:999px;background:#ff9f1a;color:#fff;font-size:12px;font-weight:700}
.weibo-body{padding:0 14px 10px;color:#4b5563;font-size:13px;line-height:20px}
.verify-mark{display:inline-flex;align-items:center;height:16px;margin-left:4px;padding:0 5px;border-radius:999px;background:#e0edff;color:#155dfc;font-size:10px;font-weight:750;vertical-align:1px}
.topic{color:#3478bd}
.video-still{height:238px;margin:10px 14px;background:linear-gradient(180deg,#c7e5ff 0%,#7fb5d5 40%,#c9b08d 72%,#6d4e34 100%);position:relative;overflow:hidden}
.video-still::before{content:"老人提醒舵不慎陷入滩涂\\A一场与潮水拔河的救援";white-space:pre;position:absolute;left:16px;top:22px;color:#ffe600;text-shadow:2px 2px 0 #202124,0 0 3px #202124;font-size:20px;line-height:28px;font-weight:900}
.play{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);width:0;height:0;border-top:18px solid transparent;border-bottom:18px solid transparent;border-left:28px solid rgba(255,255,255,.92)}

# 公安移动端 H5 异常处置 产品需求文档

## 1. 产品概述

### 1.1 背景

公安新媒体矩阵在微信、微博、抖音等渠道持续发布内容，需要在移动端快速处理数据异常、巡检异常和评论异常。数据报告为线上已有模块，本 PRD 聚焦“主题填报”和“异常处理”相关移动端规则。

### 1.2 产品目标

- 将待处理异常按数据异常、巡检异常、评论异常分类展示，便于快速判断优先级。
- 支持异常忽略、异常处置、处置记录回看，形成移动端轻量闭环。
- 支持从异常列表进入详情页，查看巡检命中问题或评论原文快照。
- 支持用户通过微信通知卡片进入 H5 时免密登录，减少移动端处理阻力。

### 1.3 用户角色

- **省级公安宣传管理员**：查看全省矩阵账号异常，统筹异常处置。
- **市县级矩阵账号负责人**：处理本账号相关异常。
- **内容巡检人员**：关注表述、错别字、空格、时政重点词等巡检异常，并给出处置意见。

---

## 2. 信息架构

### 2.1 一级导航

- 数据报告（线上已有入口）
- 主题填报（线上已有入口）
- 异常处理

### 2.2 异常处理二级分类

- 数据异常
- 巡检异常
- 评论异常

### 2.3 关键页面与流程

- 微信通知卡片免密登录流程
- 异常处理列表页
- 异常处置弹窗
- 数据异常详情页
- 表述异常详情页
- 评论异常详情页

---

## 3. 登录模块优化

### 3.1 微信通知卡片免密登录

- **展示规则**
  - 用户通过微信通知卡片打开 H5 时，系统优先尝试免密登录。
  - 免密登录成功后直接进入通知卡片对应的业务页面，例如异常详情页或异常处理列表页。
  - 免密登录过程中不展示账号密码输入页，不要求用户重复输入密码。
  - 免密登录失败、通知凭证过期、用户绑定关系缺失或账号无权限时，进入常规登录或验证码校验流程。
- **交互规则**
  - 通知发送前已按手机号匹配微信接收人，系统已掌握接收人、手机号、微信用户三者绑定关系；免密登录以该绑定关系作为校验前提。
  - 微信通知卡片链接携带一次性登录凭证和业务跳转参数，不在前端链接中明文携带手机号、微信用户标识或用户敏感信息。
  - 用户点击通知卡片后，H5 调用免密登录接口，后端根据通知发送记录校验接收人、手机号、微信用户和系统用户的绑定关系。
  - 校验通过后建立 H5 登录态，并按通知卡片携带的业务跳转参数进入目标页面。
  - 当同一手机号关联多个可用账号或多单位权限时，系统应按既有权限策略进入默认身份；若无法自动判定，则展示身份选择流程。
  - 同一个一次性登录凭证仅允许使用一次，重复打开时若当前登录态仍有效则直接进入目标页面，否则进入常规登录流程。
- **数据规则**
  - **取数规则**：读取微信通知发送记录、手机号与微信用户绑定关系、手机号与系统用户绑定关系、用户角色权限和目标业务参数。
  - **数据筛选规则**：仅允许通知实际接收人对应的绑定用户完成免密登录；不得通过修改跳转参数切换用户身份或越权访问业务数据。
  - **数据排序规则**：登录链路本身无排序规则；涉及多账号选择时按既有账号优先级或最近使用账号展示。

### 3.2 安全与审计

- **展示规则**
  - 免密登录成功后用户无感进入业务页面；失败时提示完成身份验证，不暴露失败校验细节。
  - 登录态失效后再次访问业务页面，应回到常规登录或验证码校验流程。
- **交互规则**
  - 免密登录凭证由后端生成并签名，绑定通知 ID、接收手机号、微信用户标识、目标业务参数和有效期。
  - 凭证有效期应较短，过期、重复使用、签名异常、绑定关系不一致时均不允许免密登录。
  - 前端仅负责携带凭证请求登录接口，不在本地持久化手机号、微信用户标识等敏感信息。
- **数据规则**
  - **取数规则**：记录免密登录审计日志，包括通知 ID、脱敏手机号、系统用户 ID、微信用户标识摘要、登录结果、失败原因、登录时间、客户端信息和目标页面。
  - **数据筛选规则**：审计日志按权限可查，普通业务用户不可查看他人登录审计记录。
  - **数据排序规则**：审计记录默认按登录时间倒序排列。

---

## 4. 异常处理

### 4.1 底部导航

- **展示规则**
  - 底部固定展示“数据报告”“主题填报”和“异常处理”三个入口。
  - 当前入口使用蓝色图标和文字高亮。
- **交互规则**
  - 点击“数据报告”进入线上已有数据报告模块；本 PRD 不展开该模块规则。
  - 点击“主题填报”无页面跳转和状态变化，用于保留线上已有模块入口位置。
  - 点击“异常处理”切换至异常列表，并保持最近一次选择的异常分类。
- **数据规则**
  - **取数规则**：导航不直接取数，切换后由对应页面读取数据。
  - **数据筛选规则**：切换到异常处理时保留当前异常分类状态；主题填报入口在本原型中不参与筛选。
  - **数据排序规则**：导航本身无排序规则。

### 4.2 日期筛选

- **展示规则**
  - 异常处理页在异常分类下方展示日期筛选框。
  - 默认不选择日期，日期筛选框展示“请选择日期”。
  - 未选择日期时不展示前一天、后一天按钮，避免出现不可用控件。
  - 选择日期后展示当前选中日期，并提供前一天、后一天快捷切换入口。
  - 选择日期后，日期筛选框内展示清空入口，用于清空当前日期筛选。
  - 点击日期筛选框打开底部日历弹层，弹层展示当前月份、星期行、日期网格、取消和确定按钮。
  - 日历弹层中当前选中日期高亮展示，当天日期展示圆点标记。
  - 可选日期最近截止到当天。
- **交互规则**
  - 点击日期区域打开底部日历弹层，选择日期后需点击“确定”才刷新当前异常分类列表。
  - 不选择日期时展示全部未处理异常。
  - 清空日期筛选框后恢复展示全部未处理异常。
  - 点击前一天或后一天后更新日期，并保持当前异常分类不变。
  - 当已选日期为当天时，后一天入口不可继续切换；日历弹层中的未来日期置灰且不可选。
  - 点击日历弹层遮罩或“取消”关闭弹层，不改变当前筛选条件。
  - 切换日期后列表回到顶部。
- **数据规则**
  - **取数规则**：读取当前用户权限范围内所选日期产生或发现的异常数据。
  - **数据筛选规则**：未选择日期时不按日期过滤，仅展示全部未处理异常；选择日期后，日期筛选作用于数据异常、巡检异常和评论异常三个分类，并与异常分类、平台、账号权限等筛选条件共同生效。
  - **数据排序规则**：默认按异常发现时间倒序排列；同一日期内同样按异常发现时间倒序排列。

### 4.3 异常分类切换

- **展示规则**
  - 顶部展示“数据异常”“巡检异常”“评论异常”三个分段选项。
  - 默认选中“数据异常”。
  - 日期筛选下方展示当前分类的数据总数，格式为“共 X 项数据”，不展示额外状态标签。
- **交互规则**
  - 点击分类后切换选中态，并刷新列表卡片内容。
  - 切换分类时列表回到顶部。
- **数据规则**
  - **取数规则**：读取当前用户权限范围内状态为待处理的异常。
  - **数据筛选规则**：按异常类型精确筛选；仅展示待处理状态数据。
  - **数据排序规则**：按异常发现时间倒序排列。

### 4.4 异常卡片通用规则

- **展示规则**
  - 每张卡片展示账号名称、平台标签、异常摘要、发现时间、忽略按钮和处置按钮。
  - 平台标签包含微信、微博、抖音，不同平台使用不同底色。
  - 数据异常、巡检异常、评论异常使用统一卡片骨架，账号和平台标签位置保持一致；列表仅展示待处理数据，不额外展示“待处理”状态标签。
  - 异常摘要区域使用浅灰背景，左侧展示告警图标。
  - 异常摘要区域右侧展示文本入口：数据异常和巡检异常为“查看详情”，评论异常为“查看原文”。
  - 卡片右上角统一作为异常原因位；巡检异常展示巡检原因，评论异常展示 AI 识别原因，数据异常不展示原因标签。
- **交互规则**
  - 点击“忽略”后将该异常标记为无需处理，并从当前列表移除。
  - 点击“处置”打开处置弹窗。
  - 点击数据异常卡片或“查看详情”进入数据异常详情页；点击巡检异常摘要或“查看详情”进入表述异常详情；评论异常卡片或“查看原文”按评论异常规则跳转原文地址。
  - 点击“忽略”或“处置”时不触发卡片详情跳转。
- **数据规则**
  - **取数规则**：从异常中心读取账号、平台、异常摘要、异常类型、发现时间和处置状态。
  - **数据筛选规则**：受异常分类、用户权限、处置状态共同约束。
  - **数据排序规则**：默认按发现时间倒序排列；同一时间按异常等级从高到低排列。

### 4.5 数据异常

- **展示规则**
  - 摘要内容展示异常指标和波动比例，例如“阅读数 -859.88%”。
  - 负向和正向异常均展示为待处理项。
- **交互规则**
  - 点击数据异常卡片进入数据异常详情页，查看异常指标波动和关联内容明细。
  - 处置成功后该卡片从数据异常列表移除。
- **数据规则**
  - **取数规则**：读取矩阵账号数据监测结果中超过阈值的指标波动。
  - **数据筛选规则**：仅展示达到异常阈值且未处理的指标项；平台、账号权限按当前用户范围过滤。
  - **数据排序规则**：按异常发现时间倒序排列；同一时间按波动绝对值从大到小排列。

### 4.6 巡检异常

- **展示规则**
  - 摘要内容展示稿件标题。
  - 异常类型展示在卡片右上角，例如“表述异常”。
  - 长标题单行省略。
- **交互规则**
  - 点击摘要进入表述异常详情页，查看命中问题、修改建议和上下文。
  - 可直接忽略或处置。
- **数据规则**
  - **取数规则**：读取内容巡检系统识别出的待处理异常稿件。
  - **数据筛选规则**：仅展示巡检结论为异常且尚未处理的数据；可按异常类型归类。
  - **数据排序规则**：按巡检完成时间倒序排列。

### 4.7 评论异常

- **展示规则**
  - 评论异常参考 Web 端评论监测表格，在移动端转为卡片列表。
  - 评论异常不展示渠道筛选和评论内容搜索框。
  - 评论异常列表计数与其他异常分类一致，展示“共 X 项数据”。
  - 每张评论卡片沿用异常卡片通用结构，顶部展示账号、平台标签和 AI 识别原因。
  - 评论正文展示在异常摘要区域，摘要区域右侧展示“查看原文”，评论时间展示在时间行。
  - AI 识别结果包含“质疑执法”“质疑处理结果”等风险标签。
  - 异常处理列表仅展示“未处理”评论；已处理评论不进入待处理列表。
- **交互规则**
  - 点击评论卡片跳转原文地址。
  - 评论异常操作按钮与数据异常、巡检异常保持一致，展示“忽略”和“处置”。
  - 点击“忽略”或“处置”时不触发卡片跳转。
- **数据规则**
  - **取数规则**：读取评论监测模型识别出的疑似负面或风险评论，并限制为未处理状态。
  - **数据筛选规则**：按全局日期、账号权限、AI 识别结果和未处理状态过滤。
  - **数据排序规则**：移动端与 Web 端评论监测列表保持一致排序，默认按评论发现时间倒序排列。

## 5. 数据异常详情

### 5.1 指标波动概览

- **展示规则**
  - 顶部展示返回按钮和标题“数据异常详情”。
  - 内容区展示账号名称、平台、发现时间、异常指标名称、波动文案和波动比例。
  - 指标名称示例为“点赞数”，波动比例示例为“+616.00%”。
  - 正向和负向波动均作为异常展示，波动比例使用醒目样式。
- **交互规则**
  - 点击返回回到数据异常列表，并保留原异常分类和日期筛选状态。
  - 指标波动概览仅用于查看，不支持编辑。
- **数据规则**
  - **取数规则**：读取当前数据异常记录的账号、平台、发现时间、异常指标、波动方向和波动比例。
  - **数据筛选规则**：仅读取当前被点击的数据异常记录，且必须符合用户权限范围。
  - **数据排序规则**：概览区域无排序规则。

### 5.2 关联内容明细

- **展示规则**
  - 关联内容区域展示命中该指标异常的内容列表。
  - 每条内容展示正文标题或摘要，以及对应指标值，例如“点赞数：100”。
  - 内容标题使用可点击样式，指标值在同一行右侧展示。
- **交互规则**
  - 点击内容标题进入对应原文或内容详情；原型中以提示反馈代替真实跳转。
  - 关联内容列表不展示处置按钮，处置仍在异常列表卡片或处置弹窗中完成。
- **数据规则**
  - **取数规则**：读取当前异常指标下贡献波动的内容明细及对应指标值。
  - **数据筛选规则**：仅展示当前异常记录关联的内容；内容范围受账号权限、平台权限和异常日期共同约束。
  - **数据排序规则**：默认按指标值倒序排列；指标值相同按内容发布时间倒序排列。

---

## 6. 异常处置

### 6.1 处置弹窗

- **展示规则**
  - 弹窗居中展示，背景增加半透明遮罩。
  - 标题为“处置”，包含关闭按钮。
  - 处置结果提供三个单选项：已核查并处理该异常、已核实并反馈上级部门、已核实无此异常。
  - 文本框提示为“请输入处置结果”，右下角展示字数统计。
  - 下方展示历史处置记录，包含操作单位、账号、处置结论和处置时间。
  - 底部展示“取消”和“确定”两个按钮。
- **交互规则**
  - 点击关闭、取消或遮罩关闭弹窗，不保存操作。
  - 必须选择处置结果后才允许确定。
  - 文本框最多输入 200 字，超出后阻止继续输入。
  - 点击确定后保存处置记录，关闭弹窗，并将当前异常标记为已处置。
- **数据规则**
  - **取数规则**：打开弹窗时读取当前异常的历史处置记录。
  - **数据筛选规则**：仅展示当前异常对应的处置记录。
  - **数据排序规则**：历史处置记录按处置时间倒序排列。

### 6.2 状态流转

- **展示规则**
  - 待处理状态显示“忽略”和“处置”按钮。
  - 已处置或无需处理状态不在待处理列表展示。
- **交互规则**
  - 忽略：待处理变为无需处理。
  - 确定处置：待处理变为已处置。
  - 状态变更后刷新列表计数。
- **数据规则**
  - **取数规则**：状态来自异常中心的处置状态。
  - **数据筛选规则**：待处理列表仅展示状态为待处理的数据。
  - **数据排序规则**：状态变化不改变历史记录排序。

## 7. 表述异常详情

### 7.1 详情头部

- **展示规则**
  - 顶部展示返回按钮和标题“表述异常详情”。
  - 内容区展示账号名称、平台、发现时间和红色异常提示卡。
- **交互规则**
  - 点击返回回到巡检异常列表。
  - 异常提示卡仅用于说明，不可点击。
- **数据规则**
  - **取数规则**：读取所选巡检异常的账号、平台、发现时间和异常结论。
  - **数据筛选规则**：仅读取当前异常记录。
  - **数据排序规则**：详情头部无排序。

### 7.2 问题分类与建议

- **展示规则**
  - 展示筛选标签：全部、时政重点词、错别字、空格检查。
  - 问题卡展示问题类型、原文片段、建议替换文本和说明。
  - 原文问题词使用红色强调，建议文本使用绿色强调。
- **交互规则**
  - 点击标签后筛选问题卡。
  - 点击返回图标回到上一页。
- **数据规则**
  - **取数规则**：读取内容巡检结果中的问题明细和修改建议。
  - **数据筛选规则**：按问题分类筛选；“全部”展示所有问题。
  - **数据排序规则**：按问题在正文中出现的顺序排列。

---

## 8. 评论异常详情

### 8.1 异常概览

- **展示规则**
  - 顶部展示返回按钮和标题“评论异常详情”。
  - 内容区展示账号名称、平台、发现时间和橙色异常提示卡。
  - 异常提示文案为“检测到评论区存在疑似负面内容”。
- **交互规则**
  - 点击返回回到评论异常列表。
  - 异常提示卡不可点击。
- **数据规则**
  - **取数规则**：读取所选评论异常的账号、平台、发现时间和异常结论。
  - **数据筛选规则**：仅读取当前评论异常记录。
  - **数据排序规则**：详情概览无排序。

### 8.2 原文快照

- **展示规则**
  - 展示“原文快照”标题。
  - 快照区域展示微博正文样式，包括账号信息、正文、图片/视频区域、互动数据。
- **交互规则**
  - 点击“微博内打开”尝试跳转原文；原型中以提示反馈代替真实跳转。
  - 快照内容仅用于查看，不支持编辑。
- **数据规则**
  - **取数规则**：读取评论异常关联的原文快照或采集截图。
  - **数据筛选规则**：仅展示当前异常关联原文。
  - **数据排序规则**：原文快照无排序。

---

## 9. 全局规则

### 9.1 空状态与加载

- **展示规则**
  - 列表为空时展示“没有更多了”或空状态提示。
  - 原型中默认展示演示数据。
- **交互规则**
  - 筛选后无数据时保留当前筛选状态。
- **数据规则**
  - **取数规则**：根据当前页面和筛选条件读取数据。
  - **数据筛选规则**：多筛选条件取交集。
  - **数据排序规则**：空状态不展示排序结果。

### 9.2 权限范围

- **展示规则**
  - 用户仅看到自己权限范围内的异常。
- **交互规则**
  - 无权限数据不可见，不展示禁用项。
- **数据规则**
  - **取数规则**：按登录用户所属单位、角色和账号负责人关系读取数据。
  - **数据筛选规则**：权限过滤优先于页面筛选。
  - **数据排序规则**：权限过滤后再执行页面排序。

### 9.3 移动端适配

- **展示规则**
  - 页面以手机 H5 为主要使用场景，内容纵向滚动。
  - 底部导航固定在屏幕底部。
- **交互规则**
  - 主操作按钮保持可触达。
  - 详情页返回按钮固定在顶部导航内。
- **数据规则**
  - **取数规则**：移动端与桌面端使用一致业务数据口径。
  - **数据筛选规则**：移动端不减少业务筛选条件。
  - **数据排序规则**：移动端与桌面端保持一致排序口径。

function todayDate(){
  var d=new Date();
  var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function yesterdayDate(){return shiftDate(todayDate(),-1)}
function dateToMonth(date){return String(date||todayDate()).slice(0,7)}
function clampDate(date){return String(date)>todayDate()?todayDate():date}
function shiftDate(date,days){
  var d=new Date(String(date)+'T00:00:00');
  if(isNaN(d.getTime()))d=new Date(todayDate()+'T00:00:00');
  d.setDate(d.getDate()+days);
  var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return clampDate(y+'-'+m+'-'+day);
}
function shiftMonth(month,delta){
  var base=new Date(String(month||dateToMonth(todayDate()))+'-01T00:00:00');
  if(isNaN(base.getTime()))base=new Date(todayDate().slice(0,7)+'-01T00:00:00');
  base.setMonth(base.getMonth()+delta);
  var y=base.getFullYear(),m=String(base.getMonth()+1).padStart(2,'0');
  var next=y+'-'+m;
  return next>dateToMonth(todayDate())?dateToMonth(todayDate()):next;
}

  if(String(v)>todayDate())return;
  state.tempExceptionDate=v;
  state.calendarMonth=dateToMonth(v||todayDate());
  renderDateSheet();
}

function applyDateSheet(){
  document.getElementById('dateOverlay').classList.remove('show');
  setExceptionDate(state.tempExceptionDate);

function renderDateSheet(){
  var overlay=document.getElementById('dateOverlay');
  var currentMonth=state.calendarMonth||dateToMonth(state.tempExceptionDate||todayDate());
  var first=new Date(currentMonth+'-01T00:00:00');
  var start=new Date(first);
  start.setDate(1-first.getDay());
  var temp=state.tempExceptionDate;
  var maxMonth=dateToMonth(todayDate());
  var html='<div class="date-sheet" role="dialog" aria-modal="true" aria-label="选择筛选日期" onclick="event.stopPropagation()"><div class="date-sheet-handle"></div><div class="date-sheet-head"><button class="date-sheet-action" onclick="cancelDateSheet()">取消</button><strong>选择日期</strong><button class="date-sheet-action primary" onclick="applyDateSheet()">确定</button></div>';
  html+='<div class="date-month-bar"><button class="date-month-btn" onclick="changeCalendarMonth(-1)" aria-label="上个月">'+iconChevronLeft()+'</button><div class="date-month-title">'+monthDateCn(currentMonth)+'</div><button class="date-month-btn" onclick="changeCalendarMonth(1)" aria-label="下个月"'+(currentMonth>=maxMonth?' disabled':'')+'>'+iconChevronRight()+'</button></div>';
  html+='<div class="date-week-grid"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div><div class="date-calendar-grid">';
  for(var i=0;i<42;i++){
    var d=new Date(start);
    d.setDate(start.getDate()+i);
    var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
    var val=y+'-'+m+'-'+day;
    var outside=val.slice(0,7)!==currentMonth;
    var future=val>todayDate();
    var cls='date-day'+(outside?' outside':'')+(val===todayDate()?' today':'')+(val===temp?' active':'');
    html+='<button class="'+cls+'" onclick="selectTempDate(\''+val+'\')"'+(future?' disabled':'')+'>'+String(d.getDate())+'</button>';
  }
  html+='</div></div>';
  overlay.innerHTML=html;
}

function renderChangelog(){var body=document.getElementById('changelogBody');var html='<table class="changelog-table"><thead><tr><th>更新时间</th><th>说明</th></tr></thead><tbody>';changelogData.forEach(function(item){html+='<tr><td>'+item.time+'</td><td>'+item.desc+'</td></tr>'});html+='</tbody></table>';body.innerHTML=html}
function inlineFmt(s){return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}
function renderMarkdown(md){
  md=escapeHtml(md);
  var lines=md.split('\n'),h='',listStack=[],liOpenStack=[],inTable=false,heads=[];
  function closeLists(targetDepth){while(listStack.length>targetDepth){if(liOpenStack.pop())h+='</li>';h+='</ul>';listStack.pop()}}
  function closeAllLists(){closeLists(0)}
  function openListItem(depth,text){if(inTable){h+='</tbody></table>';inTable=false}while(listStack.length<depth+1){h+=listStack.length===0?'<ul class="prd-list">':'<ul class="prd-nested prd-level-'+listStack.length+'">';listStack.push(true);liOpenStack.push(false)}closeLists(depth+1);if(liOpenStack[depth])h+='</li>';liOpenStack[depth]=true;h+='<li>'+inlineFmt(text)}
  for(var j=0;j<lines.length;j++){
    var ln=lines[j],tr=ln.trim();
    if(!tr){closeAllLists();continue}
    if(/^---+$/.test(tr)){closeAllLists();h+='<hr>';continue}
    var hm=tr.match(/^(#{1,5})\s+(.+)$/);
    if(hm){closeAllLists();var id='h-'+heads.length;heads.push({id:id,text:hm[2],level:hm[1].length});h+='<h'+hm[1].length+' id="'+id+'">'+inlineFmt(hm[2])+'</h'+hm[1].length+'>';continue}
    if(/^\|(.+)\|$/.test(tr)){closeAllLists();if(!inTable){var nxt=(j+1<lines.length)?lines[j+1].trim():'';var isSep=/^\|[\s\-:]+\|$/.test(nxt);if(isSep){h+='<table class="prd-table"><thead><tr>';var hdrCells=tr.replace(/^\|/,'').replace(/\|$/,'').split('|');for(var ci=0;ci<hdrCells.length;ci++)h+='<th>'+inlineFmt(hdrCells[ci].trim())+'</th>';h+='</tr></thead><tbody>';inTable=true;j++;continue}h+='<table class="prd-table"><tbody>';inTable=true}if(/^\|[\s\-:]+\|$/.test(tr))continue;var cells=tr.replace(/^\|/,'').replace(/\|$/,'').split('|');h+='<tr>';for(var ci2=0;ci2<cells.length;ci2++)h+='<td>'+inlineFmt(cells[ci2].trim())+'</td>';h+='</tr>';continue}
    if(inTable){h+='</tbody></table>';inTable=false}
    var lm=ln.match(/^(\s*)- (.+)$/);
    if(lm){openListItem(Math.floor(lm[1].replace(/\t/g,'  ').length/2),lm[2]);continue}
    closeAllLists();h+='<p>'+inlineFmt(tr)+'</p>'
  }
  closeAllLists();if(inTable)h+='</tbody></table>';
  return {html:h,heads:heads};
}
function initPrd(){
  var md=document.getElementById('prdMdSource').textContent.trim();
  var rendered=renderMarkdown(md);
  document.getElementById('prdContent').innerHTML=rendered.html;
  var toc='<div class="prd-toc-title">目录</div>';
  rendered.heads.forEach(function(head){toc+="<div class=\"prd-toc-item "+(head.level>2?'sub':'')+"\" onclick=\"document.getElementById('"+head.id+"').scrollIntoView({behavior:'smooth',block:'start'})\">"+head.text+"</div>"});
  document.getElementById('prdToc').innerHTML=toc;
}

})();
